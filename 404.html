<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="images/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없어요 — 종족 연구소</title>
  <script>
    // 로컬은 '' (루트 상대), 실서버는 현재 origin 그대로 사용
    var _b = location.hostname === 'localhost' ? '' : location.origin;
    document.write('<link rel="stylesheet" href="' + _b + '/css/style.css">');
  </script>
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #F1F5F9;
      text-align: center;
    }
    .inner-404 {
      max-width: 400px;
      width: 100%;
    }
    .img-404 {
      margin-bottom: 12px;
    }
    .img-404 img {
      width: 200px;
      max-width: 100%;
      height: auto;
    }
    .label-404 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-mute);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .title-404 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px;
    }
    .desc-404 {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.75;
      margin: 0 0 28px;
    }
  </style>
</head>
<body>
  <div class="page-404">
    <div class="inner-404">
      <div class="img-404">
        <img id="_img404" src="" alt="404 공오의 방">
      </div>
      <div class="label-404">연구소 기록 조회 중...</div>
      <h1 class="title-404">해당 자료를 찾을 수 없습니다.</h1>
      <p class="desc-404">아무래도 존재하지 않는 구역에 들어오신 것 같네요.</p>
      <a id="_btn404" href="" class="btn-secondary">연구소로 돌아가기</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 경로 세팅
    var _b = location.hostname === 'localhost' ? '' : location.origin;
    document.getElementById('_img404').src  = _b + '/images/404_images.png';
    document.getElementById('_btn404').href = _b + '/pages/index.html';
    window._achBadgePath = _b + '/images/achievement-badge.png';

    // JS 파일 동적 로드
    function _loadScript(src, cb) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = cb || null;
      document.head.appendChild(s);
    }
    _loadScript(_b + '/js/auth.js', function() {
      _loadScript(_b + '/js/achievements.js', async function() {
        try {
          await window.awardAchievement?.('visit_404');
          var count = await window.incrementAchCounter?.('visit_404_count') ?? 0;
          if (count >= 3) await window.awardAchievement?.('visit_404_3');
        } catch (e) {
          console.error('[404 업적] 처리 실패:', e);
        }
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없어요 — 종족연구소</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .not-found-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: 40px 20px;
      gap: 16px;
    }
    .not-found-code {
      font-size: 72px;
      font-weight: 800;
      color: var(--color-primary, #6366f1);
      line-height: 1;
    }
    .not-found-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-text, #1e1b4b);
    }
    .not-found-desc {
      font-size: 14px;
      color: var(--color-muted, #6b7280);
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="pages/index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="pages/login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="not-found-wrap">
      <p class="not-found-code">404</p>
      <p class="not-found-title">페이지를 찾을 수 없어요</p>
      <p class="not-found-desc">주소가 잘못됐거나 존재하지 않는 페이지예요.</p>
      <a href="pages/index.html" class="btn-primary" style="margin-top:8px;">홈으로 돌아가기</a>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 종족연구소</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/achievements.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // visit_404 — 1회 방문
      await window.awardAchievement?.('visit_404');

      // visit_404_3 — 3회 방문
      const _vc = await window.incrementAchCounter?.('visit_404_count') || 0;
      if (_vc >= 3) window.awardAchievement?.('visit_404_3');
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없어요 — 종족 연구소</title>
  <script>if(location.hostname!=='localhost')document.write('<base href="/dogam/">');</script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #F1F5F9;
      text-align: center;
    }
    .inner-404 {
      max-width: 400px;
      width: 100%;
    }
    .img-404 {
      margin-bottom: 12px;
    }
    .img-404 img {
      width: 200px;
      max-width: 100%;
      height: auto;
    }
    .label-404 {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-mute);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .title-404 {
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 8px;
    }
    .desc-404 {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.75;
      margin: 0 0 28px;
    }
  </style>
</head>
<body>
  <div class="page-404">
    <div class="inner-404">
      <div class="img-404">
        <img src="images/404_images.png" alt="404 공오의 방">
      </div>
      <div class="label-404">연구소 기록 조회 중...</div>
      <h1 class="title-404">해당 자료를 찾을 수 없습니다.</h1>
      <p class="desc-404">아무래도 존재하지 않는 구역에 들어오신 것 같네요.</p>
      <a href="pages/index.html" class="btn-secondary">연구소로 돌아가기</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window._achBadgePath = 'images/achievement-badge.png';
  </script>
  <script src="js/auth.js"></script>
  <script src="js/achievements.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await window.awardAchievement?.('visit_404');
        const count = await window.incrementAchCounter?.('visit_404_count') ?? 0;
        if (count >= 3) {
          await window.awardAchievement?.('visit_404_3');
        }
      } catch (e) {
        console.error('[404 업적] 처리 실패:', e);
      }
    });
  </script>
</body>
</html>

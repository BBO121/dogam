<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — 도감</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">도감</a>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">

      <h1 class="auth-title">회원가입</h1>
      <p class="auth-subtitle">도감의 새로운 멤버가 되어보세요</p>

      <form class="auth-form">

        <div class="form-group">
          <label class="form-label">닉네임</label>
          <input type="text" class="form-input" placeholder="사용할 닉네임을 입력하세요">
          <p class="form-hint">다른 유저에게 보여지는 이름이에요</p>
        </div>

        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" class="form-input" placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" class="form-input" placeholder="8자 이상 입력하세요">
        </div>

        <div class="form-group">
          <label class="form-label">비밀번호 확인</label>
          <input type="password" class="form-input" placeholder="비밀번호를 다시 입력하세요">
        </div>

        <button type="submit" class="btn-submit">회원가입</button>

      </form>

      <p class="auth-switch">
        이미 계정이 있으신가요?
        <a href="login.html">로그인</a>
      </p>

    </div>
  </div>

  <!-- 푸터 -->
  <footer class="footer">
    <p>© 2026 도감</p>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>

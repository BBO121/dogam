<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뽀 — 도감</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">도감</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <!-- 사이드바 -->
    <aside class="sidebar">

      <nav class="sidebar-menu">
        <a href="index.html" class="sidebar-item">
          <span class="icon">🏠</span> 홈
        </a>
        <a href="character-list.html" class="sidebar-item"><span class="icon">📖</span> 전체 개체</a>
        <a href="species-list.html" class="sidebar-item"><span class="icon">🐾</span> 전체 종족
        </a>
        <a href="#" class="sidebar-item sidebar-item--login">
          <span class="icon">⭐</span> 내 캐릭터
        </a>
        <a href="#" class="sidebar-item sidebar-item--login">
          <span class="icon">👤</span> 내 정보
        </a>
      </nav>

      <div class="sidebar-divider"></div>

      <div class="sidebar-section-title">종족</div>
      <nav class="sidebar-species">
        <a href="species.html" class="sidebar-species-item">드래곤 <span>12</span></a>
        <a href="species.html" class="sidebar-species-item">요정 <span>8</span></a>
        <a href="species.html" class="sidebar-species-item">늑대인간 <span>5</span></a>
        <a href="species.html" class="sidebar-species-item">슬라임 <span>3</span></a>
        <a href="species.html" class="sidebar-species-item">엘프 <span>9</span></a>
        <a href="species.html" class="sidebar-species-item">골렘 <span>2</span></a>
        <a href="species-list.html" class="sidebar-species-all">전체보기</a>
      </nav>

    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main">

      <!-- 프로필 헤더 -->
      <section class="profile-header">
        <div class="profile-avatar"></div>
        <div class="profile-header-info">

          <div class="breadcrumb">
            <a href="index.html">홈</a>
            <span>/</span>
            <span>뽀</span>
          </div>

          <h1 class="profile-name">뽀</h1>

          <div class="profile-meta">
            <div class="meta-item">
              <span class="meta-label">가입일</span>
              <span class="meta-value">2026.01.10</span>
            </div>
          </div>

          <p class="profile-bio">드래곤을 좋아하는 유저입니다.</p>

          <div class="profile-stats">
            <div class="profile-stat">
              <span class="stat-value">2</span>
              <span class="stat-label">종족주</span>
            </div>
            <div class="profile-stat-divider"></div>
            <div class="profile-stat">
              <span class="stat-value">5</span>
              <span class="stat-label">보유 개체</span>
            </div>
          </div>

        </div>
      </section>

      <!-- 종족주인 종족 -->
      <section class="section">
        <div class="section-header">
          <h2>종족주 <span class="count-badge">2</span></h2>
        </div>
        <div class="species-grid">

          <a href="species.html" class="species-card">
            <div class="species-img"></div>
            <div class="species-info">
              <p class="species-name">드래곤</p>
              <p class="species-count">개체 12마리</p>
            </div>
          </a>

          <a href="species.html" class="species-card">
            <div class="species-img"></div>
            <div class="species-info">
              <p class="species-name">골렘</p>
              <p class="species-count">개체 2마리</p>
            </div>
          </a>

        </div>
      </section>

      <!-- 보유 개체 -->
      <section class="section">
        <div class="section-header">
          <h2>보유 개체 <span class="count-badge">5</span></h2>
        </div>
        <div class="character-grid">

          <a href="character.html" class="character-card">
            <div class="character-img"></div>
            <div class="character-info">
              <p class="character-name">루나</p>
              <p class="character-species">드래곤</p>
              <p class="character-owner">소유주: 뽀</p>
            </div>
          </a>

          <a href="character.html" class="character-card">
            <div class="character-img"></div>
            <div class="character-info">
              <p class="character-name">바루</p>
              <p class="character-species">골렘</p>
              <p class="character-owner">소유주: 뽀</p>
            </div>
          </a>

          <a href="character.html" class="character-card">
            <div class="character-img"></div>
            <div class="character-info">
              <p class="character-name">섀도</p>
              <p class="character-species">드래곤</p>
              <p class="character-owner">소유주: 뽀</p>
            </div>
          </a>

          <a href="character.html" class="character-card">
            <div class="character-img"></div>
            <div class="character-info">
              <p class="character-name">미르</p>
              <p class="character-species">드래곤</p>
              <p class="character-owner">소유주: 뽀</p>
            </div>
          </a>

          <a href="character.html" class="character-card">
            <div class="character-img"></div>
            <div class="character-info">
              <p class="character-name">크로</p>
              <p class="character-species">골렘</p>
              <p class="character-owner">소유주: 뽀</p>
            </div>
          </a>

        </div>
      </section>

    </main>
  </div>

  <!-- 푸터 -->
  <footer class="footer">
    <p>© 2026 도감</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>

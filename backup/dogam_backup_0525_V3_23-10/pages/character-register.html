<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개체 등록 — 도감</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">도감</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="register-wrap">

        <div class="breadcrumb" style="margin-bottom: 24px;">
          <a href="index.html">홈</a>
          <span>/</span>
          <span>개체 등록</span>
        </div>

        <h1 class="register-title">개체 등록</h1>
        <p class="register-subtitle">새로운 개체를 도감에 추가해요</p>

        <form class="register-form" id="registerForm">

          <!-- 이미지 -->
          <div class="form-group">
            <label class="form-label">이미지</label>
            <input type="file" id="imageFile" accept="image/*" style="display:none;">
            <div class="img-upload-box img-upload-box--portrait" id="uploadBox" onclick="document.getElementById('imageFile').click()">
              <img id="imagePreview" style="display:none; width:100%; height:100%; object-fit:cover; border-radius: var(--radius);">
              <div id="uploadPlaceholder">
                <p class="img-upload-text">클릭하여 이미지 업로드</p>
                <p class="img-upload-hint">권장 비율 3:4</p>
              </div>
            </div>
          </div>

          <!-- 이름 -->
          <div class="form-group">
            <label class="form-label">이름 <span class="required">*</span></label>
            <input type="text" id="charName" class="form-input" placeholder="개체 이름을 입력하세요">
          </div>

          <!-- 종족 -->
          <div class="form-group">
            <label class="form-label">종족</label>
            <input type="text" id="charSpecies" class="form-input" placeholder="예: 드래곤, 요정, 슬라임">
          </div>

          <!-- 소유주 -->
          <div class="form-group">
            <label class="form-label">소유주</label>
            <input type="text" id="charOwner" class="form-input" placeholder="닉네임 입력 (비워두면 본인 소유)">
            <p class="form-hint">비워두면 내 계정으로 등록돼요</p>
          </div>

          <!-- 설명 -->
          <div class="form-group">
            <label class="form-label">설명</label>
            <textarea id="charDesc" class="form-textarea" placeholder="이 개체에 대한 설명을 입력하세요" rows="4"></textarea>
          </div>

          <!-- 에러 -->
          <p class="auth-error" id="registerError"></p>

          <!-- 버튼 -->
          <div class="register-actions">
            <a href="character-list.html" class="btn-ghost">취소</a>
            <button type="submit" class="btn-secondary" id="submitBtn">등록하기</button>
          </div>

        </form>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 도감</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let currentUser = null;

    async function initPage() {
      const user = await getUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const role = user.user_metadata?.role;
      if (role !== 'admin' && role !== 'species_owner') {
        window.location.href = 'index.html';
        return;
      }

      currentUser = user;
    }

    // 이미지 미리보기
    document.getElementById('imageFile').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('imagePreview').src = ev.target.result;
        document.getElementById('imagePreview').style.display = 'block';
        document.getElementById('uploadPlaceholder').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // 등록 제출
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name     = document.getElementById('charName').value.trim();
      const species  = document.getElementById('charSpecies').value.trim();
      const ownerInput = document.getElementById('charOwner').value.trim();
      const desc     = document.getElementById('charDesc').value.trim();
      const file     = document.getElementById('imageFile').files[0];
      const errorEl  = document.getElementById('registerError');
      const btn      = document.getElementById('submitBtn');

      errorEl.textContent = '';

      if (!name) {
        errorEl.textContent = '이름을 입력해주세요.';
        return;
      }

      btn.textContent = '등록 중...';
      btn.disabled = true;

      const owner = ownerInput || currentUser.user_metadata?.nickname;

      // 이미지 업로드
      let image_url = null;
      if (file) {
        const ext      = file.name.split('.').pop();
        const fileName = `${Date.now()}_${name}.${ext}`;
        const { data: uploadData, error: uploadError } = await sb.storage
          .from('characters')
          .upload(fileName, file);

        if (uploadError) {
          errorEl.textContent = '이미지 업로드에 실패했어요.';
          btn.textContent = '등록하기';
          btn.disabled = false;
          return;
        }

        const { data: urlData } = sb.storage.from('characters').getPublicUrl(fileName);
        image_url = urlData.publicUrl;
      }

      // DB 저장
      const { error } = await sb.from('characters').insert({
        name,
        species_name: species || null,
        owner_nickname: owner,
        description: desc || null,
        image_url,
      });

      if (error) {
        errorEl.textContent = '등록에 실패했어요. 다시 시도해주세요.';
        btn.textContent = '등록하기';
        btn.disabled = false;
        return;
      }

      window.location.href = 'my-characters.html';
    });

    initPage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 종족 — 도감</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">도감</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div class="list-page-header">
          <div>
            <h1 class="list-page-title">내 종족</h1>
            <p class="list-page-count" id="speciesCount"></p>
          </div>
          <a href="species-register.html" class="btn-secondary" id="registerBtn" style="display:none;">+ 종족 등록</a>
        </div>

        <div class="species-grid species-grid--large" id="speciesGrid"></div>

        <div id="emptyState" class="empty-state-wrap" style="display:none;">
          <div class="empty-state-icon">🐾</div>
          <p class="empty-state-title">등록한 종족이 없어요</p>
          <p class="empty-state-desc">종족 등록 버튼으로 첫 종족을 만들어보세요.</p>
        </div>

      </div>

    </main>
  </div>

  <footer class="footer"><p>© 2026 도감</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/main.js"></script>
  <script>
    async function initPage() {
      const user = await getUser();
      if (!user) { window.location.href = 'login.html'; return; }

      const role     = user.user_metadata?.role;
      const nickname = user.user_metadata?.nickname;

      if (role === 'species_owner' || role === 'admin') {
        document.getElementById('registerBtn').style.display = 'inline-flex';
      }

      const { data, error } = await sb
        .from('species')
        .select('id, name, image_url, description')
        .eq('owner_nickname', nickname)
        .order('name');

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';

      if (error || !data || data.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      document.getElementById('speciesCount').textContent = `총 ${data.length}개의 종족`;

      document.getElementById('speciesGrid').innerHTML = data.map(s => `
        <a href="species-list.html?id=${s.id}" class="species-card">
          <div class="species-img"${s.image_url ? ` style="background-image:url('${s.image_url}');background-size:cover;background-position:center;"` : ''}></div>
          <div class="species-info">
            <p class="species-name">${s.name}</p>
            <p class="species-count">${s.description ? s.description.slice(0, 30) + (s.description.length > 30 ? '…' : '') : '설명 없음'}</p>
          </div>
        </a>
      `).join('');
    }

    initPage();
  </script>
</body>
</html>

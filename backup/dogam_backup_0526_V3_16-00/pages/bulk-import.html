<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개체 일괄 등록 — 도감</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .bulk-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .bulk-item-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
    }
    .bulk-thumb {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--sky-pale);
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-mute);
      font-size: 11px;
      text-align: center;
    }
    .bulk-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .bulk-name-input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
    }
    .bulk-name-input:focus { border-color: var(--sky); }
    .bulk-toggle-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text-sub);
      font-size: 13px;
      cursor: pointer;
    }
    .bulk-remove-btn {
      flex-shrink: 0;
      border: none;
      background: none;
      color: var(--text-mute);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }
    .bulk-item-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .bulk-item-body.open { display: block; }
    .bulk-item-body .form-group { margin-top: 14px; margin-bottom: 0; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">도감</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="register-wrap">

        <div class="breadcrumb" style="margin-bottom:24px;">
          <a href="index.html">홈</a>
          <span>/</span>
          <a href="species-list.html">전체 종족</a>
          <span>/</span>
          <a href="#" id="breadcrumbSpecies"></a>
          <span>/</span>
          <span>일괄 등록</span>
        </div>

        <h1 class="register-title">개체 일괄 등록</h1>
        <p class="register-subtitle" id="pageSubtitle">여러 개체를 한번에 등록해요</p>

        <!-- 공통 설정 -->
        <div class="register-form" style="margin-bottom:24px;">
          <p class="form-label" style="margin-bottom:12px;">공통 설정</p>

          <!-- 기본 디자이너 -->
          <div class="form-group">
            <label class="form-label">기본 디자이너 <span class="required">*</span></label>
            <div style="display:flex; gap:8px; margin-bottom:12px;">
              <button type="button" id="btnDefaultDesignerSite" onclick="setDefaultDesignerType('site')"
                style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--sky); background:var(--sky); color:#fff; font-size:13px; cursor:pointer;">
                사이트 유저
              </button>
              <button type="button" id="btnDefaultDesignerExternal" onclick="setDefaultDesignerType('external')"
                style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--border); background:#fff; color:var(--text-sub); font-size:13px; cursor:pointer;">
                사이트 밖 유저
              </button>
            </div>
            <div id="defaultDesignerSiteSection">
              <input type="text" id="defaultDesignerSearch" class="form-input" placeholder="닉네임으로 검색..." oninput="filterDefaultDesigners(this.value)" style="margin-bottom:8px;">
              <div id="defaultDesignerUserList" style="border:1px solid var(--border); border-radius:10px; max-height:160px; overflow-y:auto; background:#fff;">
                <p style="padding:12px; color:var(--text-mute); font-size:13px;">불러오는 중...</p>
              </div>
              <p id="defaultDesignerSelectedDisplay" style="margin-top:8px; font-size:13px; color:var(--sky-deep); display:none;"></p>
            </div>
            <div id="defaultDesignerExternalSection" style="display:none;">
              <input type="text" id="defaultDesignerExternalName" class="form-input" placeholder="디자이너 이름 입력">
            </div>
            <p class="form-hint" style="margin-top:8px;">개별 항목에서 따로 설정하지 않으면 이 디자이너로 등록돼요</p>
          </div>

          <!-- 기본 소유주 -->
          <div class="form-group">
            <label class="form-label">기본 소유주 <span class="required">*</span></label>
            <div style="display:flex; gap:8px; margin-bottom:12px;">
              <button type="button" id="btnDefaultOwnerSite" onclick="setDefaultOwnerType('site')"
                style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--sky); background:var(--sky); color:#fff; font-size:13px; cursor:pointer;">
                사이트 유저
              </button>
              <button type="button" id="btnDefaultOwnerExternal" onclick="setDefaultOwnerType('external')"
                style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--border); background:#fff; color:var(--text-sub); font-size:13px; cursor:pointer;">
                사이트 밖 유저
              </button>
            </div>
            <div id="defaultOwnerSiteSection">
              <input type="text" id="defaultOwnerSearch" class="form-input" placeholder="닉네임으로 검색..." oninput="filterDefaultOwners(this.value)" style="margin-bottom:8px;">
              <div id="defaultOwnerUserList" style="border:1px solid var(--border); border-radius:10px; max-height:160px; overflow-y:auto; background:#fff;">
                <p style="padding:12px; color:var(--text-mute); font-size:13px;">불러오는 중...</p>
              </div>
              <p id="defaultOwnerSelectedDisplay" style="margin-top:8px; font-size:13px; color:var(--sky-deep); display:none;"></p>
            </div>
            <div id="defaultOwnerExternalSection" style="display:none;">
              <input type="text" id="defaultOwnerExternalName" class="form-input" placeholder="소유주 이름 입력">
            </div>
            <p class="form-hint" style="margin-top:8px;">개별 항목에서 따로 설정하지 않으면 이 소유주로 등록돼요</p>
          </div>

          <div class="form-group">
            <label class="form-label">공통 설명 <span class="form-hint" style="display:inline; margin:0 0 0 6px;">선택사항</span></label>
            <textarea id="defaultDesc" class="form-textarea" rows="3" placeholder="모든 개체에 동일하게 들어갈 설명 (개별 항목에서 덮어쓸 수 있어요)"></textarea>
          </div>
        </div>

        <!-- 드래그 앤 드롭 존 -->
        <div id="dropZone" onclick="document.getElementById('dropFileInput').click()"
          style="border:2px dashed var(--border); border-radius:var(--radius); padding:32px 20px; text-align:center; cursor:pointer; margin-bottom:16px; transition:border-color 0.2s, background 0.2s;">
          <p style="font-size:14px; color:var(--text-sub); margin-bottom:6px;">이미지를 여기에 끌어다 놓거나 클릭해서 선택</p>
          <p style="font-size:12px; color:var(--text-mute);">여러 장 한번에 가능 — 파일명이 이름으로 자동 입력돼요</p>
        </div>
        <input type="file" id="dropFileInput" accept="image/*" multiple style="display:none;" onchange="handleDropFiles(this.files)">

        <!-- 개체 목록 -->
        <div id="itemList"></div>

        <!-- 추가 버튼 -->
        <button type="button" class="btn-field-add" onclick="addItem()" style="width:100%; margin-bottom:24px;">
          + 개체 추가
        </button>

        <!-- 진행 상태 -->
        <div id="progressWrap" style="display:none; margin-bottom:16px;">
          <div style="background:var(--border); border-radius:99px; height:8px; margin-bottom:8px; overflow:hidden;">
            <div id="progressBar" style="height:100%; background:var(--sky); width:0%; transition:width 0.3s; border-radius:99px;"></div>
          </div>
          <p id="progressText" style="font-size:13px; color:var(--text-sub);"></p>
        </div>

        <p class="auth-error" id="bulkError"></p>

        <div class="register-actions">
          <a href="#" id="cancelBtn" class="btn-ghost">취소</a>
          <button type="button" class="btn-secondary" id="submitBtn" onclick="submitAll()">일괄 등록하기</button>
        </div>

      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 도감</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const params      = new URLSearchParams(window.location.search);
    const speciesId   = params.get('species_id');
    const speciesName = params.get('species');

    let currentUser                 = null;
    let customFields                = [];
    let itemCount                   = 0;
    let allUsers                    = [];
    let defaultDesignerType         = 'site';
    let selectedDefaultDesignerNick = null;
    let defaultOwnerType            = 'site';
    let selectedDefaultOwnerNick    = null;

    document.getElementById('cancelBtn').href = speciesId ? `species.html?id=${speciesId}` : 'species-list.html';

    async function initPage() {
      const user = await getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      const role = user.user_metadata?.role;
      if (role !== 'admin' && role !== 'species_owner') { window.location.href = 'index.html'; return; }

      currentUser = user;

      if (speciesName) {
        const backHref = speciesId ? `species.html?id=${speciesId}` : 'species-list.html';
        document.getElementById('breadcrumbSpecies').textContent = speciesName;
        document.getElementById('breadcrumbSpecies').href = backHref;
        document.getElementById('pageSubtitle').textContent = `${speciesName}의 개체를 한번에 등록해요`;

        const { data: sp } = await sb.from('species').select('custom_fields').eq('name', speciesName).single();
        customFields = sp?.custom_fields || [];
      }

      await loadBulkUsers();

      // 기본 1개 추가
      addItem();
    }

    async function loadBulkUsers() {
      const myNick = currentUser.user_metadata?.nickname;
      const [c, s] = await Promise.all([
        sb.from('characters').select('owner_nickname').not('owner_nickname', 'is', null),
        sb.from('species').select('owner_nickname').not('owner_nickname', 'is', null),
      ]);
      const nickSet = new Set();
      if (myNick) nickSet.add(myNick);
      (c.data || []).forEach(r => nickSet.add(r.owner_nickname));
      (s.data || []).forEach(r => nickSet.add(r.owner_nickname));
      allUsers = [...nickSet].sort((a, b) => a.localeCompare(b, 'ko'));
      renderDefaultDesignerList(allUsers);
      renderDefaultOwnerList(allUsers);
      // 기본값: 소유주만 본인 선택
      if (myNick) selectDefaultOwner(myNick);
    }

    function renderDefaultDesignerList(list) {
      const el = document.getElementById('defaultDesignerUserList');
      el.innerHTML = list.length
        ? list.map(nick => `
            <div onclick="selectDefaultDesigner('${nick}')" id="ddItem_${nick}"
              style="padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--border);"
              onmouseover="this.style.background='var(--sky-pale)'" onmouseout="this.style.background= selectedDefaultDesignerNick==='${nick}' ? 'var(--sky-light)' : ''">
              ${nick}
            </div>`).join('')
        : '<p style="padding:12px; color:var(--text-mute); font-size:13px;">유저가 없어요</p>';
    }

    function selectDefaultDesigner(nick) {
      selectedDefaultDesignerNick = nick;
      document.querySelectorAll('#defaultDesignerUserList > div').forEach(el => {
        el.style.background = el.id === `ddItem_${nick}` ? 'var(--sky-light)' : '';
        el.style.fontWeight  = el.id === `ddItem_${nick}` ? '600' : '';
      });
      const disp = document.getElementById('defaultDesignerSelectedDisplay');
      disp.textContent = `선택됨: ${nick}`;
      disp.style.display = 'block';
    }

    function filterDefaultDesigners(q) {
      renderDefaultDesignerList(q ? allUsers.filter(n => n.includes(q)) : allUsers);
      if (selectedDefaultDesignerNick) selectDefaultDesigner(selectedDefaultDesignerNick);
    }

    function setDefaultDesignerType(type) {
      defaultDesignerType = type;
      const isSite = type === 'site';
      document.getElementById('defaultDesignerSiteSection').style.display    = isSite ? '' : 'none';
      document.getElementById('defaultDesignerExternalSection').style.display = isSite ? 'none' : '';
      document.getElementById('btnDefaultDesignerSite').style.cssText     = `flex:1; padding:8px; border-radius:8px; border:2px solid ${isSite ? 'var(--sky)' : 'var(--border)'}; background:${isSite ? 'var(--sky)' : '#fff'}; color:${isSite ? '#fff' : 'var(--text-sub)'}; font-size:13px; cursor:pointer;`;
      document.getElementById('btnDefaultDesignerExternal').style.cssText = `flex:1; padding:8px; border-radius:8px; border:2px solid ${isSite ? 'var(--border)' : 'var(--sky)'}; background:${isSite ? '#fff' : 'var(--sky)'}; color:${isSite ? 'var(--text-sub)' : '#fff'}; font-size:13px; cursor:pointer;`;
    }

    function renderDefaultOwnerList(list) {
      const el = document.getElementById('defaultOwnerUserList');
      el.innerHTML = list.length
        ? list.map(nick => `
            <div onclick="selectDefaultOwner('${nick}')" id="doItem_${nick}"
              style="padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--border);"
              onmouseover="this.style.background='var(--sky-pale)'" onmouseout="this.style.background= selectedDefaultOwnerNick==='${nick}' ? 'var(--sky-light)' : ''">
              ${nick}
            </div>`).join('')
        : '<p style="padding:12px; color:var(--text-mute); font-size:13px;">유저가 없어요</p>';
    }

    function selectDefaultOwner(nick) {
      selectedDefaultOwnerNick = nick;
      document.querySelectorAll('#defaultOwnerUserList > div').forEach(el => {
        el.style.background = el.id === `doItem_${nick}` ? 'var(--sky-light)' : '';
        el.style.fontWeight  = el.id === `doItem_${nick}` ? '600' : '';
      });
      const disp = document.getElementById('defaultOwnerSelectedDisplay');
      disp.textContent = `선택됨: ${nick}`;
      disp.style.display = 'block';
    }

    function filterDefaultOwners(q) {
      renderDefaultOwnerList(q ? allUsers.filter(n => n.includes(q)) : allUsers);
      if (selectedDefaultOwnerNick) selectDefaultOwner(selectedDefaultOwnerNick);
    }

    function setDefaultOwnerType(type) {
      defaultOwnerType = type;
      const isSite = type === 'site';
      document.getElementById('defaultOwnerSiteSection').style.display    = isSite ? '' : 'none';
      document.getElementById('defaultOwnerExternalSection').style.display = isSite ? 'none' : '';
      document.getElementById('btnDefaultOwnerSite').style.cssText     = `flex:1; padding:8px; border-radius:8px; border:2px solid ${isSite ? 'var(--sky)' : 'var(--border)'}; background:${isSite ? 'var(--sky)' : '#fff'}; color:${isSite ? '#fff' : 'var(--text-sub)'}; font-size:13px; cursor:pointer;`;
      document.getElementById('btnDefaultOwnerExternal').style.cssText = `flex:1; padding:8px; border-radius:8px; border:2px solid ${isSite ? 'var(--border)' : 'var(--sky)'}; background:${isSite ? '#fff' : 'var(--sky)'}; color:${isSite ? 'var(--text-sub)' : '#fff'}; font-size:13px; cursor:pointer;`;
    }

    function addItem() {
      const id = itemCount++;
      const div = document.createElement('div');
      div.className = 'bulk-item';
      div.id = `item_${id}`;

      const customFieldHTML = customFields.length ? `
        <div class="form-group">
          <label class="form-label" style="font-size:13px;">개체 항목</label>
          ${customFields.map(f => `
            <div style="margin-top:8px;">
              <label style="font-size:12px; color:var(--text-sub); display:block; margin-bottom:4px;">${f}</label>
              <input type="text" class="form-input custom-field-input" data-field="${f}" placeholder="${f} 입력" style="margin:0;">
            </div>
          `).join('')}
        </div>
      ` : '';

      div.innerHTML = `
        <div class="bulk-item-header">
          <div class="bulk-thumb" id="thumb_${id}" onclick="document.getElementById('file_${id}').click()">
            <span>이미지<br>추가</span>
          </div>
          <input type="file" id="file_${id}" accept="image/*" style="display:none;" onchange="onFileChange(this, ${id})">
          <input type="text" class="bulk-name-input" id="name_${id}" placeholder="개체 이름">
          <button type="button" class="bulk-toggle-btn" onclick="toggleBody(${id})">펼치기</button>
          <button type="button" class="bulk-remove-btn" onclick="removeItem(${id})">✕</button>
        </div>
        <div class="bulk-item-body" id="body_${id}">
          <div class="form-group">
            <label class="form-label" style="font-size:13px;">디자이너 <span class="form-hint" style="display:inline; margin:0 0 0 6px;">비워두면 공통 디자이너 적용</span></label>
            <input type="text" class="form-input" id="designer_${id}" placeholder="개별 디자이너 설정 (선택)">
          </div>
          <div class="form-group">
            <label class="form-label" style="font-size:13px;">소유주 <span class="form-hint" style="display:inline; margin:0 0 0 6px;">비워두면 공통 소유주 적용</span></label>
            <input type="text" class="form-input" id="owner_${id}" placeholder="개별 소유주 설정 (선택)">
          </div>
          <div class="form-group">
            <label class="form-label" style="font-size:13px;">설명</label>
            <textarea class="form-textarea" id="desc_${id}" rows="3" placeholder="설명 (선택사항)"></textarea>
          </div>
          ${customFieldHTML}
        </div>
      `;

      document.getElementById('itemList').appendChild(div);
    }

    function onFileChange(input, id) {
      const file = input.files[0];
      if (!file) return;

      // 파일명 → 이름 자동 입력
      const nameInput = document.getElementById(`name_${id}`);
      if (!nameInput.value) {
        nameInput.value = file.name.replace(/\.[^/.]+$/, '');
      }

      // 썸네일 미리보기
      const reader = new FileReader();
      reader.onload = (ev) => {
        const thumb = document.getElementById(`thumb_${id}`);
        thumb.innerHTML = `<img src="${ev.target.result}">`;
      };
      reader.readAsDataURL(file);
    }

    function toggleBody(id) {
      const body = document.getElementById(`body_${id}`);
      const btn  = body.previousElementSibling.querySelector('.bulk-toggle-btn');
      const isOpen = body.classList.toggle('open');
      btn.textContent = isOpen ? '접기' : '펼치기';
    }

    function removeItem(id) {
      const el = document.getElementById(`item_${id}`);
      if (el) el.remove();
    }

    async function submitAll() {
      const defaultDesc = document.getElementById('defaultDesc').value.trim();
      const errorEl    = document.getElementById('bulkError');
      const btn        = document.getElementById('submitBtn');
      errorEl.textContent = '';

      let defaultDesigner = null;
      if (defaultDesignerType === 'site') {
        defaultDesigner = selectedDefaultDesignerNick;
      } else {
        defaultDesigner = document.getElementById('defaultDesignerExternalName').value.trim() || null;
      }
      if (!defaultDesigner) { errorEl.textContent = '기본 디자이너를 설정해주세요.'; return; }

      let defaultOwner = null;
      if (defaultOwnerType === 'site') {
        defaultOwner = selectedDefaultOwnerNick;
      } else {
        defaultOwner = document.getElementById('defaultOwnerExternalName').value.trim() || null;
      }
      if (!defaultOwner) { errorEl.textContent = '기본 소유주를 설정해주세요.'; return; }

      const items = [...document.getElementById('itemList').querySelectorAll('.bulk-item')];
      if (!items.length) { errorEl.textContent = '등록할 개체가 없어요.'; return; }

      // 유효성 검사
      for (const item of items) {
        const id       = item.id.replace('item_', '');
        const name     = document.getElementById(`name_${id}`).value.trim();
        const designer = document.getElementById(`designer_${id}`)?.value.trim() || defaultDesigner;
        if (!name) { errorEl.textContent = '이름이 비어있는 항목이 있어요.'; return; }
        if (!designer) { errorEl.textContent = `"${name}" 항목의 디자이너를 입력해주세요.`; return; }
      }

      btn.disabled = true;
      btn.textContent = '등록 중...';

      const progressWrap = document.getElementById('progressWrap');
      const progressBar  = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      progressWrap.style.display = '';

      let done = 0;
      let failed = [];

      for (const item of items) {
        const id       = item.id.replace('item_', '');
        const name     = document.getElementById(`name_${id}`).value.trim();
        const designer = document.getElementById(`designer_${id}`)?.value.trim() || defaultDesigner;
        const owner    = document.getElementById(`owner_${id}`).value.trim() || defaultOwner;
        const desc     = document.getElementById(`desc_${id}`).value.trim() || defaultDesc;
        const file  = document.getElementById(`file_${id}`).files[0];

        progressText.textContent = `${done + 1} / ${items.length} 처리 중... (${name})`;

        try {
          // 이미지 업로드
          let image_url = null;
          if (file) {
            const blob     = await compressImage(file);
            const fileName = `${Date.now()}_${name}.jpg`;
            const { error: uploadError } = await sb.storage.from('images').upload(fileName, blob, { contentType: 'image/jpeg' });
            if (!uploadError) {
              const { data: urlData } = sb.storage.from('images').getPublicUrl(fileName);
              image_url = urlData.publicUrl;
            }
          }

          // 커스텀 필드 수집
          const customFieldValues = {};
          item.querySelectorAll('.custom-field-input').forEach(input => {
            const val = input.value.trim();
            if (val) customFieldValues[input.dataset.field] = val;
          });

          // DB 저장
          const { error } = await sb.from('characters').insert({
            name,
            species_name:        speciesName || null,
            designer_nickname:   designer || null,
            owner_nickname:      owner,
            description:         desc || null,
            image_url,
            custom_field_values: Object.keys(customFieldValues).length ? customFieldValues : null,
          });

          if (error) failed.push(name);
        } catch (e) {
          failed.push(name);
        }

        done++;
        progressBar.style.width = `${(done / items.length) * 100}%`;
      }

      if (failed.length) {
        errorEl.textContent = `실패한 항목: ${failed.join(', ')}`;
        btn.textContent = '일괄 등록하기';
        btn.disabled = false;
      } else {
        progressText.textContent = `완료! ${done}개 등록됐어요.`;
        setTimeout(() => {
          window.location.href = speciesId ? `species.html?id=${speciesId}` : 'species-list.html';
        }, 1200);
      }
    }

    function fillSlotWithFile(id, file) {
      document.getElementById(`name_${id}`).value = file.name.replace(/\.[^/.]+$/, '');
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById(`thumb_${id}`).innerHTML = `<img src="${ev.target.result}">`;
      };
      reader.readAsDataURL(file);
      try {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById(`file_${id}`).files = dt.files;
      } catch(e) {}
    }

    function handleDropFiles(files) {
      const imageFiles = [...files].filter(f => f.type.startsWith('image/'));
      let fileIndex = 0;

      // 빈 슬롯(이름 없고 이미지 없는 항목)부터 채우기
      const emptySlots = [...document.getElementById('itemList').querySelectorAll('.bulk-item')]
        .filter(item => {
          const id = item.id.replace('item_', '');
          return !document.getElementById(`thumb_${id}`).querySelector('img')
              && !document.getElementById(`name_${id}`).value;
        });

      for (const slot of emptySlots) {
        if (fileIndex >= imageFiles.length) break;
        fillSlotWithFile(slot.id.replace('item_', ''), imageFiles[fileIndex++]);
      }

      // 남은 파일은 새 항목으로 추가
      while (fileIndex < imageFiles.length) {
        const file = imageFiles[fileIndex++];
        const id = itemCount++;
        const div = document.createElement('div');
        div.className = 'bulk-item';
        div.id = `item_${id}`;

        const customFieldHTML = customFields.length ? `
          <div class="form-group">
            <label class="form-label" style="font-size:13px;">개체 항목</label>
            ${customFields.map(f => `
              <div style="margin-top:8px;">
                <label style="font-size:12px; color:var(--text-sub); display:block; margin-bottom:4px;">${f}</label>
                <input type="text" class="form-input custom-field-input" data-field="${f}" placeholder="${f} 입력" style="margin:0;">
              </div>
            `).join('')}
          </div>
        ` : '';

        div.innerHTML = `
          <div class="bulk-item-header">
            <div class="bulk-thumb" id="thumb_${id}" onclick="document.getElementById('file_${id}').click()">
              <span>이미지<br>추가</span>
            </div>
            <input type="file" id="file_${id}" accept="image/*" style="display:none;" onchange="onFileChange(this, ${id})">
            <input type="text" class="bulk-name-input" id="name_${id}" placeholder="개체 이름">
            <button type="button" class="bulk-toggle-btn" onclick="toggleBody(${id})">펼치기</button>
            <button type="button" class="bulk-remove-btn" onclick="removeItem(${id})">✕</button>
          </div>
          <div class="bulk-item-body" id="body_${id}">
            <div class="form-group">
              <label class="form-label" style="font-size:13px;">디자이너 <span class="form-hint" style="display:inline; margin:0 0 0 6px;">비워두면 공통 디자이너 적용</span></label>
              <input type="text" class="form-input" id="designer_${id}" placeholder="개별 디자이너 설정 (선택)">
            </div>
            <div class="form-group">
              <label class="form-label" style="font-size:13px;">소유주 <span class="form-hint" style="display:inline; margin:0 0 0 6px;">비워두면 공통 소유주 적용</span></label>
              <input type="text" class="form-input" id="owner_${id}" placeholder="개별 소유주 설정 (선택)">
            </div>
            <div class="form-group">
              <label class="form-label" style="font-size:13px;">설명</label>
              <textarea class="form-textarea" id="desc_${id}" rows="3" placeholder="설명 (선택사항)"></textarea>
            </div>
            ${customFieldHTML}
          </div>
        `;

        document.getElementById('itemList').appendChild(div);
        fillSlotWithFile(id, file);
      }

      document.getElementById('dropFileInput').value = '';
    }

    // 드래그 앤 드롭 이벤트
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = 'var(--sky)';
      dropZone.style.background  = 'var(--sky-pale)';
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = 'var(--border)';
      dropZone.style.background  = '';
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = 'var(--border)';
      dropZone.style.background  = '';
      handleDropFiles(e.dataTransfer.files);
    });

    initPage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>분양 — 도감</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .comments-section { margin-top:32px; }
    .comments-section h2 { font-size:16px; font-weight:700; margin-bottom:16px; }
    .comment-item {
      border:1px solid var(--border); border-radius:var(--radius);
      background:#fff; padding:14px 16px; margin-bottom:10px;
    }
    .comment-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .comment-author { font-size:13px; font-weight:600; }
    .comment-time   { font-size:12px; color:var(--text-mute); flex:1; }
    .comment-delete { border:none; background:none; font-size:12px; color:var(--text-mute); cursor:pointer; padding:0; }
    .comment-delete:hover { color:#ef4444; }
    .comment-content { font-size:14px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }
    .comment-reply-btn { border:none; background:none; font-size:12px; color:var(--sky-deep); cursor:pointer; padding:4px 0 0; }
    .replies { margin-top:10px; padding-left:16px; border-left:2px solid var(--border); display:flex; flex-direction:column; gap:8px; }
    .reply-item { padding:10px 12px; background:var(--sky-pale); border-radius:8px; }
    .reply-input-wrap { margin-top:10px; display:flex; flex-direction:column; gap:6px; }
    .reply-textarea {
      width:100%; border:1px solid var(--border); border-radius:8px;
      padding:8px 12px; font-size:13px; resize:none; outline:none; font-family:inherit;
    }
    .reply-textarea:focus { border-color:var(--sky); }
    .comment-input-area {
      margin-top:16px; border:1px solid var(--border); border-radius:var(--radius);
      background:#fff; padding:14px 16px; display:flex; flex-direction:column; gap:8px;
    }
    .comment-textarea {
      width:100%; border:1px solid var(--border); border-radius:8px;
      padding:10px 12px; font-size:14px; resize:none; outline:none; font-family:inherit;
    }
    .comment-textarea:focus { border-color:var(--sky); }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">도감</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div class="notice-detail-nav">
          <span id="navCount" class="notice-nav-count"></span>
          <a href="adoption.html" class="notice-nav-list-btn">목록보기</a>
        </div>

        <div class="adoption-detail-layout">

          <!-- 왼쪽: 이미지 -->
          <div class="adoption-detail-left">
            <div id="mainImg" class="adoption-detail-img-main"></div>
            <div id="extraImgsRow" class="adoption-detail-imgs-extra"></div>
          </div>

          <!-- 오른쪽: 정보 -->
          <div class="adoption-detail-right">

            <div style="display:flex; gap:8px; margin-bottom:12px;">
              <span id="typeBadge" class="adoption-type-badge"></span>
              <span id="statusBadge" class="adoption-status"></span>
            </div>

            <h1 id="detailCharName" class="adoption-detail-char-name"></h1>
            <p id="detailSpecies" class="adoption-detail-species"></p>

            <div class="notice-detail-meta" style="margin-top:8px; margin-bottom:20px;">
              <span id="detailAuthor"></span>
              <span class="notice-detail-sep">·</span>
              <span id="detailDate"></span>
            </div>

            <!-- 분양 정보 박스 -->
            <div id="adoptionInfoBox" class="adoption-info-box" style="display:none;"></div>

            <!-- 설명 -->
            <div id="descWrap" style="display:none; margin-top:20px;">
              <p class="adoption-section-label">설명</p>
              <div id="descContent" class="adoption-desc-content"></div>
            </div>

            <!-- 연락 수단 -->
            <div id="contactWrap" class="adoption-contact-box" style="display:none;">
              <span class="adoption-contact-label">연락 수단</span>
              <span id="contactContent"></span>
            </div>

            <!-- 분양하기 버튼 (작성자 전용, 무료/유료/기타) -->
            <div id="completeBtnWrap" style="display:none; margin-top:16px;">
              <button class="btn-secondary" style="width:100%;" onclick="openCompleteModal()">분양하기</button>
            </div>

            <!-- 확인하기 버튼 (낙찰자 전용) -->
            <div id="confirmBtnWrap" style="display:none; margin-top:16px;">
              <div style="background:#FFFBEB; border:1.5px solid #FCD34D; border-radius:var(--radius); padding:14px 16px; margin-bottom:12px;">
                <p style="font-size:13px; font-weight:700; color:#92400E; margin:0 0 4px;">낙찰 확인 요청</p>
                <p style="font-size:13px; color:#78350F; margin:0; line-height:1.5;">분양을 받으실 건가요? 확인하시면 캐릭터 소유권이 이전돼요.</p>
              </div>
              <button class="btn-secondary" style="width:100%;" onclick="confirmAdoption()">확인하기</button>
            </div>

          </div>
        </div>

        <!-- 경매 섹션 -->
        <div id="auctionSection" style="display:none;">
          <div class="adoption-bids-wrap">

            <div class="adoption-bids-header">
              <h2 class="adoption-section-title">입찰 현황</h2>
              <span id="bidCount" class="adoption-bid-count"></span>
            </div>

            <!-- 낙찰 결과 -->
            <div id="winnerBox" class="adoption-winner-box" style="display:none;"></div>

            <!-- 입찰 목록 -->
            <div id="bidList" class="adoption-bid-list"></div>

            <!-- 입찰 입력 -->
            <div id="bidInputWrap" class="adoption-bid-input-wrap" style="display:none;">
              <div style="position:relative; flex:1;">
                <input type="text" id="bidAmount" class="form-input" placeholder="0" inputmode="numeric"
                  oninput="const r=this.value.replace(/[^0-9]/g,''); this.value=r?Number(r).toLocaleString('ko-KR'):'';"
                  style="padding-right:36px;">
                <span style="position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--text-mute); pointer-events:none;">원</span>
              </div>
              <button onclick="submitBid()" class="btn-secondary">입찰하기</button>
            </div>
            <p class="auth-error" id="bidError"></p>

            <!-- 마감 버튼 (작성자 전용) -->
            <div id="closeWrap" style="display:none; margin-top:12px;">
              <button onclick="closeAuction()" class="btn-ghost">마감하기 (낙찰자 없음)</button>
            </div>

          </div>
        </div>

        <!-- 입찰현황 댓글 섹션 -->
        <div class="comments-section" id="commentsSection">
          <h2>입찰 현황</h2>
          <div id="commentList"><p class="page-loading">불러오는 중...</p></div>
          <div id="commentInputArea" class="comment-input-area" style="display:none;">
            <textarea id="commentTextarea" class="comment-textarea" rows="3" placeholder="입찰 내용이나 문의를 남겨주세요..."></textarea>
            <div style="display:flex; justify-content:flex-end;">
              <button onclick="submitComment()" class="btn-secondary" style="padding:8px 20px; font-size:13px;">등록</button>
            </div>
          </div>
          <p class="auth-error" id="commentError"></p>
        </div>

        <div class="notice-detail-bottom" style="justify-content:space-between;">
          <a href="adoption.html" class="btn-ghost">← 목록으로</a>
          <button id="deletePostBtn" class="btn-danger" style="display:none;" onclick="deletePost()">글 삭제</button>
        </div>

      </div>

    </main>
  </div>

  <!-- 분양하기 모달 -->
  <div class="modal-overlay" id="completeModal" style="display:none;">
    <div class="modal-card">
      <h3 class="modal-title">분양 완료 처리</h3>
      <p class="modal-desc">분양받은 유저의 닉네임을 입력해주세요.<br>해당 유저에게 캐릭터 소유권이 이전돼요.</p>
      <div class="form-group" style="margin-bottom:4px;">
        <input type="text" class="form-input" id="recipientInput" placeholder="받는 유저 닉네임">
      </div>
      <p class="auth-error" id="completeError"></p>
      <div class="modal-actions" style="margin-top:20px;">
        <button class="btn-ghost" onclick="closeCompleteModal()">취소</button>
        <button class="btn-secondary" id="confirmCompleteBtn" onclick="confirmComplete()">분양 완료</button>
      </div>
    </div>
  </div>

  <footer class="footer"><p>© 2026 도감</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const params     = new URLSearchParams(window.location.search);
    const adoptionId = params.get('id');
    let currentUser     = null;
    let currentAdoption = null;

    const TYPE_LABEL = { free: '무료', paid: '유료', auction: '경매', etc: '기타' };
    const TYPE_CLASS  = { free: 'adoption-type--free', paid: 'adoption-type--paid', auction: 'adoption-type--auction', etc: 'adoption-type--paid' };

    async function initPage() {
      if (!adoptionId) { window.location.href = 'adoption.html'; return; }

      currentUser = await getUser();

      const [{ data: adoption, error }, { count }] = await Promise.all([
        sb.from('adoptions').select('*').eq('id', adoptionId).single(),
        sb.from('adoptions').select('*', { count: 'exact', head: true }),
      ]);

      if (error || !adoption) { window.location.href = 'adoption.html'; return; }

      currentAdoption = adoption;
      document.title = `${adoption.character_name} 분양 — 도감`;
      if (count) document.getElementById('navCount').textContent = `분양 총 ${count}개`;

      renderMain(adoption);
      loadComments();

      if (adoption.adoption_type === 'auction') {
        document.getElementById('auctionSection').style.display = 'block';

        const [{ data: details }, { data: bids }] = await Promise.all([
          sb.from('auction_details').select('*').eq('adoption_id', adoptionId).single(),
          sb.from('auction_bids').select('*').eq('adoption_id', adoptionId).order('created_at', { ascending: false }),
        ]);

        renderAuctionInfo(details);
        renderBids(adoption, bids || []);
      }

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';
    }

    function renderMain(a) {
      // 메인 이미지
      const mainImg = document.getElementById('mainImg');
      if (a.image_url) {
        mainImg.style.backgroundImage    = `url('${a.image_url}')`;
        mainImg.style.backgroundSize     = 'cover';
        mainImg.style.backgroundPosition = 'center';
      }

      // 추가 이미지
      if (a.extra_images && a.extra_images.length > 0) {
        document.getElementById('extraImgsRow').innerHTML = a.extra_images.map(url =>
          `<div class="adoption-extra-img" style="background-image:url('${url}');background-size:cover;background-position:center;"></div>`
        ).join('');
      }

      // 뱃지
      const tb = document.getElementById('typeBadge');
      tb.textContent = TYPE_LABEL[a.adoption_type] || '';
      tb.className   = `adoption-type-badge ${TYPE_CLASS[a.adoption_type] || ''}`;

      const sb2 = document.getElementById('statusBadge');
      sb2.textContent = a.status || '분양중';
      sb2.className   = `adoption-status${
        a.status === '완료'       ? ' adoption-status--closed'  :
        a.status === '확인 대기중' ? ' adoption-status--pending' : ''}`;


      document.getElementById('detailCharName').textContent = a.character_name || '—';
      document.getElementById('detailSpecies').textContent  = a.species_name   || '—';
      document.getElementById('detailAuthor').textContent   = a.author         || '익명';

      const date = new Date(a.created_at).toLocaleDateString('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).replace(/\. /g, '.').replace(/\.$/, '');
      document.getElementById('detailDate').textContent = date;

      // 분양 정보 박스
      const infoBox = document.getElementById('adoptionInfoBox');
      if (a.adoption_type === 'free') {
        infoBox.innerHTML = '<span style="font-size:15px; font-weight:700; color:#16A34A;">무료 분양</span>';
        infoBox.style.display = 'block';
      } else if ((a.adoption_type === 'paid' || a.adoption_type === 'etc') && a.price) {
        infoBox.innerHTML = `<span style="font-size:20px; font-weight:800; color:var(--sky-deep);">${a.price}</span>`;
        infoBox.style.display = 'block';
      }

      // 설명
      if (a.description) {
        document.getElementById('descContent').innerHTML = a.description.replace(/\n/g, '<br>');
        document.getElementById('descWrap').style.display = 'block';
      }

      // 연락 수단
      if (a.contact) {
        document.getElementById('contactContent').textContent = a.contact;
        document.getElementById('contactWrap').style.display  = 'flex';
      }

      // 분양하기 버튼 (무료/유료/기타 + 작성자 + 분양중)
      const myNick   = currentUser?.user_metadata?.nickname;
      const isAuthor = currentUser && (currentUser.id === a.user_id || myNick === a.author);
      const isOpen   = a.status === '분양중';
      if (isAuthor && isOpen && (a.adoption_type === 'free' || a.adoption_type === 'paid' || a.adoption_type === 'etc')) {
        document.getElementById('completeBtnWrap').style.display = 'block';
      }

      // 확인하기 버튼 (낙찰자 + 확인 대기중)
      if (currentUser && myNick === a.winner_name && a.status === '확인 대기중') {
        document.getElementById('confirmBtnWrap').style.display = 'block';
      }

      // 삭제 버튼 (작성자 전용)
      if (isAuthor) {
        document.getElementById('deletePostBtn').style.display = 'inline-flex';
      }
    }

    function renderAuctionInfo(details) {
      if (!details) return;
      const closeLabel = details.close_method === 'date'
        ? (details.close_at
            ? `${new Date(details.close_at).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })} 마감`
            : '날짜 미정')
        : `마지막 입찰 후 ${details.close_hours}시간 마감`;

      const infoBox = document.getElementById('adoptionInfoBox');
      infoBox.innerHTML = `
        <div class="auction-info-grid">
          <div class="auction-info-item">
            <span class="auction-info-label">시작가</span>
            <span class="auction-info-value">${details.start_price}</span>
          </div>
          ${details.instant_price ? `
          <div class="auction-info-item">
            <span class="auction-info-label">즉분가</span>
            <span class="auction-info-value">${details.instant_price}</span>
          </div>` : ''}
          ${details.bid_unit ? `
          <div class="auction-info-item">
            <span class="auction-info-label">입찰 단위</span>
            <span class="auction-info-value">${details.bid_unit}</span>
          </div>` : ''}
          <div class="auction-info-item">
            <span class="auction-info-label">마감</span>
            <span class="auction-info-value">${closeLabel}</span>
          </div>
        </div>
      `;
      infoBox.style.display = 'block';
    }

    function renderBids(adoption, bids) {
      const isAuthor = currentUser && currentUser.id === adoption.user_id;
      const isOpen   = adoption.status === '분양중';

      document.getElementById('bidCount').textContent = `${bids.length}건`;

      // 낙찰 결과
      if (adoption.winner_name && adoption.status === '확인 대기중') {
        document.getElementById('winnerBox').innerHTML = `
          <div class="adoption-winner-inner">
            <span class="adoption-winner-trophy">⏳</span>
            <div>
              <p class="adoption-winner-label">낙찰 확인 대기 중</p>
              <p class="adoption-winner-name">${adoption.winner_name}</p>
              <p class="adoption-winner-bid">${adoption.winner_bid || ''}</p>
            </div>
          </div>
        `;
        document.getElementById('winnerBox').style.display = 'block';
      } else if (adoption.winner_name && adoption.status === '완료') {
        document.getElementById('winnerBox').innerHTML = `
          <div class="adoption-winner-inner">
            <span class="adoption-winner-trophy">🏆</span>
            <div>
              <p class="adoption-winner-label">낙찰자</p>
              <p class="adoption-winner-name">${adoption.winner_name}</p>
              <p class="adoption-winner-bid">${adoption.winner_bid || ''}</p>
            </div>
          </div>
        `;
        document.getElementById('winnerBox').style.display = 'block';
      }

      // 입찰 목록
      const listEl = document.getElementById('bidList');
      if (bids.length === 0) {
        listEl.innerHTML = '<p class="adoption-no-bids">아직 입찰이 없어요</p>';
      } else {
        listEl.innerHTML = bids.map(bid => `
          <div class="adoption-bid-row">
            <div class="adoption-bid-info">
              <span class="adoption-bid-name">${bid.bidder_name}</span>
              <span class="adoption-bid-amount">${bid.bid_amount}</span>
              <span class="adoption-bid-time">${timeAgo(bid.created_at)}</span>
            </div>
            ${isAuthor && isOpen ? `
              <button class="btn-award"
                data-name="${escAttr(bid.bidder_name)}"
                data-amount="${escAttr(bid.bid_amount)}"
                onclick="awardBid(this)">낙찰하기</button>
            ` : ''}
          </div>
        `).join('');
      }

      // 입찰 입력 (비작성자 + 로그인 + 분양중)
      if (!isAuthor && currentUser && isOpen) {
        document.getElementById('bidInputWrap').style.display = 'flex';
      }

      // 마감 버튼 (작성자 + 분양중)
      if (isAuthor && isOpen) {
        document.getElementById('closeWrap').style.display = 'block';
      }
    }

    function escAttr(str) {
      return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function timeAgo(dateStr) {
      const m = Math.floor((Date.now() - new Date(dateStr)) / 60000);
      if (m < 1)  return '방금 전';
      if (m < 60) return `${m}분 전`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}시간 전`;
      return `${Math.floor(h / 24)}일 전`;
    }

    async function submitBid() {
      const raw     = document.getElementById('bidAmount').value.replace(/,/g, '').trim();
      const errorEl = document.getElementById('bidError');
      errorEl.textContent = '';
      if (!raw) { errorEl.textContent = '입찰 금액을 입력해주세요.'; return; }

      const { error } = await sb.from('auction_bids').insert({
        adoption_id:  adoptionId,
        bidder_id:    currentUser.id,
        bidder_name:  currentUser.user_metadata?.nickname || '익명',
        bid_amount:   raw,
      });

      if (error) { errorEl.textContent = `입찰에 실패했어요. (${error.message})`; return; }
      document.getElementById('bidAmount').value = '';
      location.reload();
    }

    async function awardBid(btn) {
      const name   = btn.dataset.name;
      const amount = btn.dataset.amount;
      if (!confirm(`${name}님을 낙찰자로 선정할까요?\n확인 요청이 전송됩니다.`)) return;

      const { error } = await sb.from('adoptions').update({
        status:      '확인 대기중',
        winner_name: name,
        winner_bid:  amount,
      }).eq('id', adoptionId);

      if (error) { alert('오류가 발생했어요.'); return; }

      await sb.from('notifications').insert({
        user_nickname: name,
        type:          'auction_win',
        message:       `🏆 "${currentAdoption.character_name}" 경매에서 낙찰되셨어요! 확인해 주세요.`,
        link:          `adoption-detail.html?id=${adoptionId}`,
      });

      location.reload();
    }

    async function confirmAdoption() {
      if (!confirm('분양을 확인하시겠어요? 캐릭터 소유권이 이전돼요.')) return;

      const a      = currentAdoption;
      const myNick = currentUser?.user_metadata?.nickname;

      const { error } = await sb.from('adoptions').update({ status: '완료' }).eq('id', adoptionId);
      if (error) { alert('오류가 발생했어요.'); return; }

      await Promise.all([
        sb.from('characters')
          .update({ owner_nickname: myNick })
          .eq('name', a.character_name),
        logTransfer({
          character_name: a.character_name,
          species_name:   a.species_name,
          from_nickname:  a.author,
          to_nickname:    myNick,
          method:         '경매',
        }),
        sb.from('notifications').insert({
          user_nickname: a.author,
          type:          'adoption_complete',
          message:       `✅ "${a.character_name}" 분양이 완료됐어요! (${myNick}님 확인)`,
          link:          `adoption-detail.html?id=${adoptionId}`,
        }),
      ]);

      location.reload();
    }

    async function closeAuction() {
      if (!confirm('낙찰자 없이 경매를 마감할까요?')) return;
      await sb.from('adoptions').update({ status: '완료' }).eq('id', adoptionId);
      location.reload();
    }

    // ── 무료/유료 분양 완료 ──────────────────────────
    function openCompleteModal() {
      document.getElementById('recipientInput').value  = '';
      document.getElementById('completeError').textContent = '';
      document.getElementById('completeModal').style.display = 'flex';
      document.getElementById('recipientInput').focus();
    }

    function closeCompleteModal() {
      document.getElementById('completeModal').style.display = 'none';
    }

    async function confirmComplete() {
      const recipient = document.getElementById('recipientInput').value.trim();
      const errorEl   = document.getElementById('completeError');
      const btn       = document.getElementById('confirmCompleteBtn');

      if (!recipient) { errorEl.textContent = '닉네임을 입력해주세요.'; return; }

      btn.textContent = '처리 중...';
      btn.disabled    = true;
      errorEl.textContent = '';

      const a      = currentAdoption;
      const method = a.adoption_type === 'free' ? '무료분양' : '유료분양';

      const { error } = await sb.from('adoptions')
        .update({ status: '완료' })
        .eq('id', adoptionId);

      if (error) {
        errorEl.textContent = '오류가 발생했어요. 다시 시도해주세요.';
        btn.textContent = '분양 완료';
        btn.disabled    = false;
        return;
      }

      await Promise.all([
        sb.from('characters')
          .update({ owner_nickname: recipient })
          .eq('name', a.character_name),
        logTransfer({
          character_name: a.character_name,
          species_name:   a.species_name,
          from_nickname:  a.author,
          to_nickname:    recipient,
          method,
        }),
      ]);

      closeCompleteModal();
      location.reload();
    }

    // ── 댓글 / 대댓글 ──────────────────────────────────
    async function loadComments() {
      const { data } = await sb
        .from('adoption_comments')
        .select('*')
        .eq('adoption_id', adoptionId)
        .order('created_at', { ascending: true });

      renderComments(data || []);

      if (currentUser) {
        document.getElementById('commentInputArea').style.display = 'block';
      }
    }

    function renderComments(comments) {
      const myNick   = currentUser?.user_metadata?.nickname;
      const topLevel = comments.filter(c => !c.parent_id);
      const replies  = comments.filter(c =>  c.parent_id);
      const listEl   = document.getElementById('commentList');

      if (topLevel.length === 0) {
        listEl.innerHTML = '<p style="font-size:14px; color:var(--text-mute); padding:12px 0;">아직 입찰이 없어요</p>';
        return;
      }

      listEl.innerHTML = topLevel.map(c => {
        const isMine       = myNick === c.author_nickname;
        const childReplies = replies.filter(r => r.parent_id === c.id);

        return `
          <div class="comment-item" id="ci_${c.id}">
            <div class="comment-header">
              <span class="comment-author">${c.author_nickname}</span>
              <span class="comment-time">${timeAgo(c.created_at)}</span>
              ${isMine ? `<button class="comment-delete" onclick="deleteComment('${c.id}', false)">삭제</button>` : ''}
            </div>
            <p class="comment-content">${escapeHtml(c.content)}</p>
            ${currentUser ? `<button class="comment-reply-btn" onclick="toggleReply('${c.id}')">답글</button>` : ''}

            ${childReplies.length ? `
              <div class="replies">
                ${childReplies.map(r => {
                  const isMyReply = myNick === r.author_nickname;
                  return `
                    <div class="reply-item" id="ci_${r.id}">
                      <div class="comment-header">
                        <span class="comment-author">${r.author_nickname}</span>
                        <span class="comment-time">${timeAgo(r.created_at)}</span>
                        ${isMyReply ? `<button class="comment-delete" onclick="deleteComment('${r.id}', true)">삭제</button>` : ''}
                      </div>
                      <p class="comment-content">${escapeHtml(r.content)}</p>
                    </div>
                  `;
                }).join('')}
              </div>` : ''}

            <div class="reply-input-wrap" id="replyWrap_${c.id}" style="display:none;">
              <textarea class="reply-textarea" id="replyText_${c.id}" rows="2" placeholder="답글을 입력하세요..."></textarea>
              <div style="display:flex; gap:8px; justify-content:flex-end;">
                <button onclick="toggleReply('${c.id}')" class="btn-ghost" style="padding:6px 14px; font-size:12px;">취소</button>
                <button onclick="submitReply('${c.id}')" class="btn-secondary" style="padding:6px 14px; font-size:12px;">등록</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\n/g,'<br>');
    }

    function toggleReply(parentId) {
      const wrap = document.getElementById(`replyWrap_${parentId}`);
      const isOpen = wrap.style.display === 'block';
      wrap.style.display = isOpen ? 'none' : 'block';
      if (!isOpen) document.getElementById(`replyText_${parentId}`).focus();
    }

    async function submitComment() {
      const ta      = document.getElementById('commentTextarea');
      const content = ta.value.trim();
      const errorEl = document.getElementById('commentError');
      errorEl.textContent = '';
      if (!content) { errorEl.textContent = '내용을 입력해주세요.'; return; }

      const { error } = await sb.from('adoption_comments').insert({
        adoption_id:      adoptionId,
        author_nickname:  currentUser.user_metadata?.nickname || '익명',
        content,
      });
      if (error) { errorEl.textContent = '등록에 실패했어요.'; return; }
      ta.value = '';
      loadComments();
    }

    async function submitReply(parentId) {
      const ta      = document.getElementById(`replyText_${parentId}`);
      const content = ta.value.trim();
      if (!content) return;

      const { error } = await sb.from('adoption_comments').insert({
        adoption_id:      adoptionId,
        parent_id:        parentId,
        author_nickname:  currentUser.user_metadata?.nickname || '익명',
        content,
      });
      if (error) { alert('등록에 실패했어요.'); return; }
      loadComments();
    }

    async function deleteComment(id, isReply) {
      if (!confirm('댓글을 삭제할까요?')) return;
      await sb.from('adoption_comments').delete().eq('id', id);
      loadComments();
    }

    async function deletePost() {
      if (!confirm('분양 글을 삭제할까요? 되돌릴 수 없어요.')) return;

      const btn = document.getElementById('deletePostBtn');
      btn.textContent = '삭제 중...';
      btn.disabled = true;

      const [r1, r2, r3] = await Promise.all([
        sb.from('adoption_comments').delete().eq('adoption_id', adoptionId),
        sb.from('auction_bids').delete().eq('adoption_id', adoptionId),
        sb.from('auction_details').delete().eq('adoption_id', adoptionId),
      ]);
      const { error } = await sb.from('adoptions').delete().eq('id', adoptionId);

      if (error) {
        console.error('[delete error]', error);
        alert(`삭제 실패: ${error.message}`);
        btn.textContent = '글 삭제';
        btn.disabled = false;
        return;
      }

      window.location.href = 'adoption.html';
    }

    initPage();
  </script>
</body>
</html>

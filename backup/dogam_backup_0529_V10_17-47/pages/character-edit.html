<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개체 정보 수정 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    .quill-wrap .ql-toolbar {
      border-radius: 9px 9px 0 0;
      border: 1.5px solid var(--border);
      border-bottom: none;
      font-family: inherit;
    }
    .quill-wrap .ql-toolbar:focus-within,
    .quill-wrap:focus-within .ql-toolbar { border-color: var(--sky); }
    .quill-wrap .ql-container {
      border-radius: 0 0 9px 9px;
      border: 1.5px solid var(--border);
      min-height: 130px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.7;
    }
    .quill-wrap:focus-within .ql-container { border-color: var(--sky); }
    .quill-wrap .ql-editor { min-height: 130px; }
    .quill-wrap .ql-editor.ql-blank::before { color: #CBD5E1; font-style: normal; }


    /* 글씨 크기 드롭다운 라벨 */
    .ql-snow .ql-picker.ql-size .ql-picker-label::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item::before { content: '보통'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="12px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="12px"]::before { content: '작게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="14px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="14px"]::before { content: '조금 작게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="18px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="18px"]::before { content: '조금 크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="20px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="20px"]::before { content: '크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="24px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="24px"]::before { content: '더 크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="28px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="28px"]::before { content: '제목 크기'; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="register-wrap">

        <div class="breadcrumb" style="margin-bottom: 24px;">
          <a href="index.html">홈</a>
          <span>/</span>
          <a href="species-list.html">전체 종족</a>
          <span>/</span>
          <a href="#" id="breadcrumbSpecies"></a>
          <span>/</span>
          <a href="#" id="breadcrumbChar"></a>
          <span>/</span>
          <span>정보 수정</span>
        </div>

        <h1 class="register-title">개체 정보 수정</h1>
        <p class="register-subtitle" id="editSubtitle">개체 정보를 수정해요</p>

        <form class="register-form" id="editForm">

          <!-- 메인 이미지 -->
          <div class="form-group">
            <label class="form-label">메인 이미지 <span class="form-hint" style="display:inline; margin:0 0 0 6px;">썸네일로 사용돼요</span></label>
            <input type="file" id="imageFile" accept="image/*" style="display:none;">
            <div class="img-upload-box img-upload-box--portrait" id="uploadBox" onclick="document.getElementById('imageFile').click()">
              <img id="imagePreview" style="display:none; width:100%; height:100%; object-fit:cover; border-radius: var(--radius);">
              <div id="uploadPlaceholder">
                <p class="img-upload-text">클릭하여 이미지 업로드</p>
                <p class="img-upload-hint">권장 비율 3:4</p>
              </div>
            </div>
          </div>

          <!-- 추가 이미지 -->
          <div class="form-group">
            <label class="form-label">추가 이미지 <span class="form-hint" style="display:inline; margin:0 0 0 6px;">선택사항</span></label>
            <div id="extraImageList" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px;"></div>
            <input type="file" id="extraImageInput" accept="image/*" style="display:none;" multiple onchange="addExtraImages(this)">
            <button type="button" class="btn-field-add" onclick="document.getElementById('extraImageInput').click()">+ 이미지 추가</button>
          </div>

          <!-- 이름 -->
          <div class="form-group">
            <label class="form-label">이름 <span class="required">*</span></label>
            <input type="text" id="charName" class="form-input" placeholder="개체 이름을 입력하세요">
          </div>

          <!-- 디자이너 -->
          <div class="form-group">
            <label class="form-label">디자이너 <span class="required">*</span></label>

            <div style="display:flex; gap:8px; margin-bottom:12px;">
              <button type="button" id="btnDesignerSite" onclick="setDesignerType('site')"
                style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--sky); background:var(--sky); color:#fff; font-size:13px; cursor:pointer;">
                사이트 유저
              </button>
              <button type="button" id="btnDesignerExternal" onclick="setDesignerType('external')"
                style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--border); background:#fff; color:var(--text-sub); font-size:13px; cursor:pointer;">
                사이트 밖 유저
              </button>
            </div>

            <div id="designerSiteSection">
              <input type="text" id="designerSearch" class="form-input" placeholder="닉네임 또는 아이디로 검색..." oninput="filterDesigners(this.value)" style="margin-bottom:8px;">
              <div id="designerUserList" style="border:1px solid var(--border); border-radius:10px; max-height:200px; overflow-y:auto; background:#fff;">
                <p style="padding:12px; color:var(--text-mute); font-size:13px;">불러오는 중...</p>
              </div>
              <p id="designerSelectedDisplay" style="margin-top:8px; font-size:13px; color:var(--sky-deep); display:none;"></p>
            </div>

            <div id="designerExternalSection" style="display:none;">
              <input type="text" id="designerExternalName" class="form-input" placeholder="이름 입력" style="margin-bottom:8px;">
              <input type="text" id="designerExternalContact" class="form-input" placeholder="연락처 (트위터, 디스코드 등) — 선택사항">
            </div>
          </div>

          <!-- 소유주 -->
          <div class="form-group">
            <label class="form-label">소유주</label>

            <div style="display:flex; gap:8px; margin-bottom:12px;">
              <button type="button" id="btnSiteUser" onclick="setOwnerType('site')"
                style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--sky); background:var(--sky); color:#fff; font-size:13px; cursor:pointer;">
                사이트 유저
              </button>
              <button type="button" id="btnExternal" onclick="setOwnerType('external')"
                style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--border); background:#fff; color:var(--text-sub); font-size:13px; cursor:pointer;">
                사이트 밖 유저
              </button>
            </div>

            <div id="ownerSiteSection">
              <input type="text" id="ownerSearch" class="form-input" placeholder="닉네임 또는 아이디로 검색..." oninput="filterUsers(this.value)" style="margin-bottom:8px;">
              <div id="ownerUserList" style="border:1px solid var(--border); border-radius:10px; max-height:200px; overflow-y:auto; background:#fff;">
                <p style="padding:12px; color:var(--text-mute); font-size:13px;">불러오는 중...</p>
              </div>
              <p id="ownerSelectedDisplay" style="margin-top:8px; font-size:13px; color:var(--sky-deep); display:none;"></p>
            </div>

            <div id="ownerExternalSection" style="display:none;">
              <input type="text" id="ownerExternalName" class="form-input" placeholder="이름 입력" style="margin-bottom:8px;">
              <input type="text" id="ownerExternalContact" class="form-input" placeholder="연락처 (트위터, 디스코드 등) — 선택사항">
            </div>
          </div>

          <!-- 설명 -->
          <div class="form-group">
            <label class="form-label">설명</label>
            <textarea id="charDesc" class="form-textarea" placeholder="이 개체에 대한 설명을 입력하세요" rows="4"></textarea>
          </div>

          <!-- 종족 커스텀 필드 -->
          <div id="customFieldsSection" style="display:none;">
            <div class="char-info-divider" style="margin:8px 0 20px;"></div>
            <p class="form-label" style="margin-bottom:14px;">개체 항목</p>
            <div id="customFieldInputs"></div>
          </div>

          <!-- 분류 -->
          <div class="form-group">
            <label class="form-label">분류 <span class="form-hint-inline">선택사항 · 여러 개 추가 가능</span></label>
            <div id="addedCategories" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;"></div>
            <div id="categoryInputArea" style="display:none; padding:12px; border:1px solid var(--border); border-radius:10px; margin-bottom:10px;">
              <div id="colorSwatches" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;"></div>
              <input type="hidden" id="categoryColor" value="">
              <div style="display:flex; gap:8px; align-items:center; margin-bottom:10px;">
                <input type="text" id="categoryLabel" class="form-input" placeholder="분류 이름 (예: 희귀종, NPC)" style="flex:1;">
                <button type="button" onclick="confirmAddCategory()"
                  style="flex-shrink:0; padding:0 14px; height:38px; border:none; border-radius:8px; background:var(--sky); color:#fff; cursor:pointer; font-size:13px;">추가</button>
                <button type="button" onclick="cancelAddCategory()"
                  style="flex-shrink:0; padding:0 12px; height:38px; border:1px solid var(--border); border-radius:8px; background:#fff; color:var(--text-mute); cursor:pointer; font-size:12px;">취소</button>
              </div>
              <div id="existingCategoryChips" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
            </div>
            <button type="button" class="btn-field-add" onclick="showCategoryInput()">+ 분류 추가</button>
          </div>

          <!-- 민감한 요소 -->
          <div class="form-group">
            <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
              <label style="display:flex; align-items:center; gap:6px; cursor:pointer; white-space:nowrap; font-size:14px; font-weight:500; color:var(--text);">
                <input type="checkbox" id="isSensitive" style="width:16px; height:16px; cursor:pointer; accent-color:var(--sky); flex-shrink:0;">
                민감한 요소 포함
              </label>
              <input type="text" id="sensitiveNote" class="form-input" placeholder="시선공포, 쨍한색 등" style="flex:1; min-width:160px;">
            </div>
          </div>

          <!-- 섹션 (설정/관계/직접입력) -->
          <div class="form-group">
            <label class="form-label">섹션 <span class="form-hint-inline">탭으로 표시돼요 · 드래그로 순서 변경</span></label>
            <div id="sectionList"></div>
            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px;">
              <button type="button" id="btnAddSettings" class="btn-field-add" onclick="addSection('settings')">+ 설정</button>
              <button type="button" id="btnAddRelation" class="btn-field-add" onclick="addSection('relation')">+ 관계</button>
              <button type="button" id="btnAddCustom" class="btn-field-add" onclick="addSection('custom')">+ 직접입력</button>
            </div>
            <p id="customCountNote" style="font-size:12px; color:var(--text-mute); margin-top:6px; display:none;"></p>
          </div>

          <!-- 에러 -->
          <p class="auth-error" id="editError"></p>

          <!-- 버튼 -->
          <div class="register-actions">
            <a href="#" id="cancelBtn" class="btn-ghost">취소</a>
            <button type="submit" class="btn-secondary" id="submitBtn">저장하기</button>
          </div>

        </form>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/utils.js?v=2"></script>
  <script>
    const charId = new URLSearchParams(window.location.search).get('id');

    let currentUser          = null;
    let ownerType            = 'site';
    let selectedNick         = null;
    let designerType         = 'site';
    let selectedDesignerNick = null;
    let allUsers             = [];
    let currentImageUrl      = null;
    let addedCategories      = [];
    let existingExtraImages  = [];
    let removedExtraImages   = [];
    let newExtraFiles        = [];
    let allSpecies           = [];
    let sectionDragSrc       = null;
    const quillInstances     = new Map();

    // 글씨 크기 등록
    const SizeStyle = Quill.import('attributors/style/size');
    SizeStyle.whitelist = ['12px', '14px', '16px', '18px', '20px', '24px', '28px'];
    Quill.register(SizeStyle, true);

    const QUILL_TOOLBAR = [
      [{ size: ['12px', '14px', false, '18px', '20px', '24px', '28px'] }],
      ['bold', 'italic', 'underline'],
      [{ color: [] }],
      [{ align: [] }],
      [{ list: 'ordered' }, { list: 'bullet' }],
      ['link', 'clean'],
    ];

    // ── 섹션 관리 ──────────────────────────────
    function updateSectionAddButtons() {
      const cards = [...document.querySelectorAll('#sectionList .section-card')];
      const hasSettings   = cards.some(c => c.dataset.type === 'settings');
      const hasRelation   = cards.some(c => c.dataset.type === 'relation');
      const customCount   = cards.filter(c => c.dataset.type === 'custom').length;

      document.getElementById('btnAddSettings').style.display = hasSettings ? 'none' : '';
      document.getElementById('btnAddRelation').style.display = hasRelation ? 'none' : '';
      document.getElementById('btnAddCustom').style.display   = customCount >= 6 ? 'none' : '';

      const note = document.getElementById('customCountNote');
      note.style.display  = customCount > 0 ? '' : 'none';
      note.textContent    = `직접입력 ${customCount}/6`;
    }

    function addDragEvents(card) {
      const header = card.querySelector('.section-card-header');
      header.addEventListener('mousedown', () => { card.draggable = true; });
      card.addEventListener('dragstart', e => {
        sectionDragSrc = card;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => card.classList.add('dragging'), 0);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.section-card').forEach(c => c.classList.remove('drag-over'));
        card.draggable = false;
      });
      card.addEventListener('dragover', e => { e.preventDefault(); if (sectionDragSrc !== card) card.classList.add('drag-over'); });
      card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
      card.addEventListener('drop', e => {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (sectionDragSrc && sectionDragSrc !== card) {
          const list = document.getElementById('sectionList');
          const all  = [...list.children];
          list.insertBefore(sectionDragSrc, all.indexOf(sectionDragSrc) < all.indexOf(card) ? card.nextSibling : card);
        }
      });
    }

    function makeSettingsCard(data = null) {
      const div = document.createElement('div');
      div.className = 'section-card';
      div.dataset.type = 'settings';
      div.dataset.id   = 'settings';
      div.innerHTML = `
        <div class="section-card-header">
          <span class="section-drag-handle">⠿⠿</span>
          <span class="section-card-label">설정</span>
          <button type="button" onclick="removeSection(this)" style="background:none;border:none;color:var(--text-mute);cursor:pointer;font-size:16px;padding:0 2px;">✕</button>
        </div>
        <div class="section-card-body">
          <div class="quill-wrap"><div class="quill-editor-target"></div></div>
        </div>`;
      addDragEvents(div);
      return div;
    }

    function makeRelationCard(data = null) {
      const div = document.createElement('div');
      div.className = 'section-card';
      div.dataset.type = 'relation';
      div.dataset.id   = 'relation';
      div.innerHTML = `
        <div class="section-card-header">
          <span class="section-drag-handle">⠿⠿</span>
          <span class="section-card-label">관계</span>
          <button type="button" onclick="removeSection(this)" style="background:none;border:none;color:var(--text-mute);cursor:pointer;font-size:16px;padding:0 2px;">✕</button>
        </div>
        <div class="section-card-body">
          <div class="relation-list"></div>
          <button type="button" class="btn-field-add" onclick="addRelationItem(this.previousElementSibling)">+ 관계 추가</button>
        </div>`;
      addDragEvents(div);
      if (data?.relations?.length) {
        const list = div.querySelector('.relation-list');
        data.relations.forEach(r => addRelationItem(list, r));
      }
      return div;
    }

    function makeCustomCard(data = null) {
      const id = data?.id || 'custom_' + Date.now();
      const div = document.createElement('div');
      div.className = 'section-card';
      div.dataset.type = 'custom';
      div.dataset.id   = id;
      div.innerHTML = `
        <div class="section-card-header">
          <span class="section-drag-handle">⠿⠿</span>
          <span class="section-card-label">직접입력</span>
          <button type="button" onclick="removeSection(this)" style="background:none;border:none;color:var(--text-mute);cursor:pointer;font-size:16px;padding:0 2px;">✕</button>
        </div>
        <div class="section-card-body">
          <input type="text" class="form-input section-title-input" placeholder="제목을 입력하세요" value="${data?.title || ''}">
          <div class="quill-wrap"><div class="quill-editor-target"></div></div>
        </div>`;
      addDragEvents(div);
      return div;
    }

    function initCardQuill(card, content = '') {
      const target = card.querySelector('.quill-editor-target');
      if (!target) return;
      const id = card.dataset.id;
      const quill = new Quill(target, {
        theme: 'snow',
        placeholder: '내용을 작성하세요...',
        modules: { toolbar: QUILL_TOOLBAR },
      });
      if (content) quill.root.innerHTML = content;
      quillInstances.set(id, quill);
    }

    function addSection(type) {
      const cards = [...document.querySelectorAll('#sectionList .section-card')];
      if (type === 'settings' && cards.some(c => c.dataset.type === 'settings')) return;
      if (type === 'relation' && cards.some(c => c.dataset.type === 'relation')) return;
      if (type === 'custom' && cards.filter(c => c.dataset.type === 'custom').length >= 6) return;

      const card = type === 'settings' ? makeSettingsCard()
                 : type === 'relation' ? makeRelationCard()
                 : makeCustomCard();
      document.getElementById('sectionList').appendChild(card);
      initCardQuill(card);
      updateSectionAddButtons();
    }

    function removeSection(btn) {
      const card = btn.closest('.section-card');
      quillInstances.delete(card.dataset.id);
      card.remove();
      updateSectionAddButtons();
    }

    function addRelationItem(listEl, data = null) {
      const itemId = 'rel_' + Date.now() + '_' + Math.random().toString(36).slice(2, 5);
      const div = document.createElement('div');
      div.className = 'relation-item';
      div.innerHTML = `
        <div style="display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap;">
          <select class="form-input rel-species-select" style="flex:1; min-width:120px; padding:8px 10px;" onchange="loadRelChars(this, '${itemId}_chars')">
            <option value="">종족 선택</option>
            ${allSpecies.map(s => `<option value="${s.id}" data-name="${s.name}" ${data?.species_name === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}
          </select>
          <select class="form-input rel-char-select" id="${itemId}_chars" style="flex:1; min-width:120px; padding:8px 10px;" data-saved-id="${data?.char_id || ''}">
            <option value="">개체 선택</option>
          </select>
        </div>
        <input type="text" class="form-input rel-label" placeholder="관계 유형 (예: 친구, 라이벌)" value="${data?.relation_label || ''}">
        <div class="quill-wrap"><div class="rel-desc-quill-target"></div></div>
        <button type="button" onclick="this.closest('.relation-item').remove()" style="padding:4px 10px; border:1px solid #fca5a5; border-radius:6px; background:#fff; color:#ef4444; font-size:12px; cursor:pointer; font-family:inherit;">관계 삭제</button>`;
      listEl.appendChild(div);
      if (data?.species_name) loadRelChars(div.querySelector('.rel-species-select'), `${itemId}_chars`);

      // rel-desc Quill 초기화
      const relDescQ = new Quill(div.querySelector('.rel-desc-quill-target'), {
        theme: 'snow',
        placeholder: '설명 (선택사항)',
        modules: { toolbar: QUILL_TOOLBAR },
      });
      if (data?.description) relDescQ.root.innerHTML = data.description;
    }

    async function loadRelChars(speciesSelect, charSelectId) {
      const charSelect  = document.getElementById(charSelectId);
      if (!charSelect) return;
      const speciesName = speciesSelect.options[speciesSelect.selectedIndex]?.dataset?.name;
      const savedId     = charSelect.dataset.savedId;

      if (!speciesName) { charSelect.innerHTML = '<option value="">개체 선택</option>'; return; }

      charSelect.innerHTML = '<option value="">불러오는 중...</option>';
      const { data } = await sb.from('characters').select('id, name').eq('species_name', speciesName).order('name');
      charSelect.innerHTML = '<option value="">개체 선택</option>' +
        (data || []).map(c => `<option value="${c.id}" data-name="${c.name}" ${c.id === savedId ? 'selected' : ''}>${c.name}</option>`).join('');

    function collectSections() {
      const sections = [];
      document.querySelectorAll('#sectionList .section-card').forEach(card => {
        const type = card.dataset.type;
        const id   = card.dataset.id;
        if (type === 'settings') {
          const quill = quillInstances.get(id);
          const content = quill ? quill.root.innerHTML : '';
          const hasContent = quill && quill.getLength() > 1;
          if (hasContent) sections.push({ id, type, content });
        } else if (type === 'relation') {
          const relations = [];
          card.querySelectorAll('.relation-item').forEach(item => {
            const speciesOpt = item.querySelector('.rel-species-select option:checked');
            const charOpt    = item.querySelector('.rel-char-select option:checked');
            if (!charOpt?.value) return;
            relations.push({
              char_id:        charOpt.value,
              char_name:      charOpt.dataset.name || charOpt.textContent.trim(),
              species_name:   speciesOpt?.dataset?.name || '',
              relation_label: item.querySelector('.rel-label').value.trim(),
              description: (() => { const c = item.querySelector('.ql-container'); const q = c && Quill.find(c); return q && q.getLength() > 1 ? q.root.innerHTML : ''; })(),
            });
          });
          if (relations.length) sections.push({ id, type, relations });
        } else if (type === 'custom') {
          const title = card.querySelector('.section-title-input').value.trim();
          const quill = quillInstances.get(id);
          const content = quill ? quill.root.innerHTML : '';
          const hasContent = quill && quill.getLength() > 1;
          if (title || hasContent) sections.push({ id, type, title, content });
        }
      });
      return sections;
    }

        const card = s.type === 'settings' ? makeSettingsCard(s)
                   : s.type === 'relation' ? makeRelationCard(s)
                   : makeCustomCard(s);
        list.appendChild(card);
        initCardQuill(card, s.content || '');
      });
      updateSectionAddButtons();
    }

    function initColorSwatches(selected = '') {

      PRESET_COLORS.forEach(color => {
        const el = document.createElement('div');

        el.title = color;
        el.style.cssText = `width:28px; height:28px; border-radius:50%; background:${color}; cursor:pointer; flex-shrink:0; box-sizing:border-box; transition:box-shadow 0.1s; ${isSelected ? `box-shadow:0 0 0 2px #fff, 0 0 0 4px ${color};` : ''}`;

    function renderAddedCategories() {
      const container = document.getElementById('addedCategories');
      container.innerHTML = '';
      addedCategories.forEach((cat, idx) => {
        const r = parseInt(cat.color.slice(1,3),16), g = parseInt(cat.color.slice(3,5),16), b = parseInt(cat.color.slice(5,7),16);
        const tc = (0.299*r+0.587*g+0.114*b)/255 > 0.5 ? '#000' : '#fff';
        const chip = document.createElement('div');
        chip.style.cssText = `display:inline-flex; align-items:center; gap:6px; padding:5px 10px 5px 12px; border-radius:20px; background:${cat.color}; color:${tc}; font-size:13px; font-weight:600;`;

            </button>

    async function loadExistingCategories(speciesName) {
      if (!speciesName) return;
      const { data: chars } = await sb
        .from('characters')
        .select('char_categories')
        .eq('species_name', speciesName)
        .not('char_categories', 'is', null);
      if (!chars?.length) return;
      const seen = new Set();
      const unique = [];
      chars.forEach(c => (c.char_categories || []).forEach(cat => {
        if (!cat.label || seen.has(cat.label)) return;
        seen.add(cat.label);
        unique.push(cat);
      }));
      if (!unique.length) return;
      const container = document.getElementById('existingCategoryChips');
      unique.forEach(cat => {
        const r = parseInt(cat.color.slice(1,3),16), g = parseInt(cat.color.slice(3,5),16), b = parseInt(cat.color.slice(5,7),16);
        const tc = (0.299*r+0.587*g+0.114*b)/255 > 0.5 ? '#000' : '#fff';
        const chip = document.createElement('div');
        chip.style.cssText = `padding:5px 12px; border-radius:20px; background:${cat.color}; color:${tc}; font-size:12px; font-weight:600; cursor:pointer;`;
        chip.textContent = cat.label;
        chip.onclick = () => {
          document.getElementById('categoryLabel').value = cat.label;
          document.getElementById('categoryColor').value = cat.color;
          initColorSwatches(cat.color);
        };
        container.appendChild(chip);
      });
    }

    async function loadUsers(currentOwner, currentContact, currentDesigner, currentDesignerContact) {
      const { data } = await sb.rpc('get_all_users');
      allUsers = (data || [])
        .map(u => ({ nickname: u.nickname || '', loginId: u.login_id || u.nickname || '' }))
        .filter(u => u.nickname)
        .sort((a, b) => a.nickname.localeCompare(b.nickname, 'ko'));

      renderUserList([]);
      renderDesignerList([]);

      // 기존 소유주 판별
      if (allUsers.some(u => u.nickname === currentOwner)) {
        setOwnerType('site');
        selectUser(currentOwner);
      } else {
        setOwnerType('external');
        document.getElementById('ownerExternalName').value    = currentOwner || '';
        document.getElementById('ownerExternalContact').value = currentContact || '';
      }

      // 기존 디자이너 판별
      if (!currentDesigner) {
        // 없으면 기본값 site, 아무것도 선택 안함
      } else if (allUsers.some(u => u.nickname === currentDesigner)) {
        setDesignerType('site');
        selectDesigner(currentDesigner);
      } else {
        setDesignerType('external');
        document.getElementById('designerExternalName').value    = currentDesigner || '';
        document.getElementById('designerExternalContact').value = currentDesignerContact || '';
      }
    }

    // 새 추가 이미지 선택
    function addExtraImages(input) {
      const files = [...input.files];
      files.forEach(file => {
        newExtraFiles.push(file);
        const reader = new FileReader();
        const idx = newExtraFiles.length - 1;
        reader.onload = (ev) => {
          const box = document.createElement('div');
          box.style.cssText = 'position:relative; width:90px; height:90px; border-radius:8px; overflow:hidden; border:1px solid var(--border);';
          box.innerHTML = `

    function removeNewImage(btn, idx) {

      btn.closest('div').remove();

    // 저장
    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name    = document.getElementById('charName').value.trim();
      const desc    = document.getElementById('charDesc').value.trim();
      const file    = document.getElementById('imageFile').files[0];
      const errorEl = document.getElementById('editError');
      const btn     = document.getElementById('submitBtn');

      errorEl.textContent = '';
      if (!name) { errorEl.textContent = '이름을 입력해주세요.'; return; }

      let owner = null;
      let externalContact = null;
      if (ownerType === 'site') {
        if (!selectedNick) { errorEl.textContent = '소유주를 선택해주세요.'; return; }
        owner = selectedNick;
      } else {
        const externalName = document.getElementById('ownerExternalName').value.trim();
        if (!externalName) { errorEl.textContent = '소유주 이름을 입력해주세요.'; return; }
        owner = externalName;
        externalContact = document.getElementById('ownerExternalContact').value.trim();
      }

      // 디자이너 수집 (필수)
      let designer = null;
      let designer_contact = null;
      if (designerType === 'site') {
        if (!selectedDesignerNick) { errorEl.textContent = '디자이너를 선택해주세요.'; return; }
        designer = selectedDesignerNick;
      } else {
        designer = document.getElementById('designerExternalName').value.trim();
        if (!designer) { errorEl.textContent = '디자이너 이름을 입력해주세요.'; return; }
        designer_contact = document.getElementById('designerExternalContact').value.trim() || null;
      }

      btn.textContent = '저장 중...';
      btn.disabled = true;

      // 메인 이미지
      let image_url = currentImageUrl;
      if (file) {
        const blob = await compressImage(file);
        if (!blob) {
          errorEl.textContent = '이미지 처리에 실패했어요. 다른 이미지를 사용해보세요.';
          btn.textContent = '저장하기'; btn.disabled = false; return;
        }
        const ext      = file.name.split('.').pop().toLowerCase();
        const safeExt  = ['jpg','jpeg','png','gif','webp'].includes(ext) ? ext : 'jpg';
        const fileName = `${Date.now()}.${safeExt}`;
        const { error: uploadError } = await sb.storage.from('images').upload(fileName, blob, { contentType: `image/${safeExt === 'jpg' ? 'jpeg' : safeExt}` });
        if (uploadError) {
          console.error('[이미지 업로드 오류]', uploadError);
          errorEl.textContent = `메인 이미지 업로드에 실패했어요. (${uploadError.message})`;
          btn.textContent = '저장하기'; btn.disabled = false; return;
        }
        const { data: urlData } = sb.storage.from('images').getPublicUrl(fileName);
        image_url = urlData.publicUrl;
      }

      // 추가 이미지: 기존 중 삭제 안 된 것 + 새로 업로드한 것
      const keptImages = existingExtraImages.filter(url => !removedExtraImages.includes(url));
      const uploadedNew = [];
      for (const f of newExtraFiles.filter(f => f !== null)) {
        const blob     = await compressImage(f);
        const fileName = `${Date.now()}_extra_${Math.random().toString(36).slice(2)}.jpg`;
        const { error: uploadError } = await sb.storage.from('images').upload(fileName, blob, { contentType: 'image/jpeg' });
        if (uploadError) {
          errorEl.textContent = '추가 이미지 업로드에 실패했어요.';
          btn.textContent = '저장하기'; btn.disabled = false; return;
        }
        const { data: urlData } = sb.storage.from('images').getPublicUrl(fileName);
        uploadedNew.push(urlData.publicUrl);
      }
      const additional_images = [...keptImages, ...uploadedNew];

      // 커스텀 필드 값 수집
      const customFieldValues = {};
      document.querySelectorAll('.custom-field-input').forEach(input => {
        const val = input.value.trim();
        if (val) customFieldValues[input.dataset.field] = val;
      });

      const isSensitive   = document.getElementById('isSensitive').checked;
      const sensitiveNote = document.getElementById('sensitiveNote').value.trim();

      const sections = collectSections();

      const { error } = await sb.from('characters').update({
        name,
        designer_nickname:   designer,
        designer_contact:    designer_contact,
        owner_nickname:      owner,
        owner_contact:       externalContact || null,
        description:         desc || null,
        image_url,
        additional_images:   additional_images.length ? additional_images : null,
        custom_field_values: Object.keys(customFieldValues).length ? customFieldValues : null,
        char_categories:     addedCategories.length ? addedCategories : null,
        is_sensitive:        isSensitive,
        sensitive_note:      isSensitive ? (sensitiveNote || null) : null,
        char_sections:       sections.length ? sections : null,
      }).eq('id', charId);

      if (error) {
        errorEl.textContent = `저장에 실패했어요: ${error.message}`;
        btn.textContent = '저장하기'; btn.disabled = false; return;
      }

      window.location.href = `character.html?id=${charId}`;
    });

    initPage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">

      <h1 class="auth-title">로그인</h1>
      <p class="auth-subtitle">종족연구소에 오신 걸 환영해요</p>

      <form class="auth-form" id="loginForm">

        <div class="form-group">
          <label class="form-label">아이디</label>
          <input type="text" id="nickname" class="form-input" placeholder="아이디를 입력하세요" required>
        </div>

        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요" required>
        </div>

        <p class="auth-error" id="loginError"></p>

        <button type="submit" class="btn-submit" id="loginBtn">로그인</button>

      </form>

      <div class="auth-divider"><span>또는</span></div>

      <p class="auth-switch">
        아직 계정이 없으신가요?
        <a href="signup.html">회원가입</a>
      </p>

    </div>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nickname = document.getElementById('nickname').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('loginError');
      const btn      = document.getElementById('loginBtn');

      btn.textContent = '로그인 중...';
      btn.disabled = true;
      errorEl.textContent = '';

      const { error } = await signIn(nickname, password);

      if (error) {
        errorEl.textContent = '아이디 또는 비밀번호가 올바르지 않아요';
        btn.textContent = '로그인';
        btn.disabled = false;
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>

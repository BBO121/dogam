<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어드민 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div style="padding: 24px 0 0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
          <h1 class="list-page-title" style="margin:0;">어드민</h1>
          <a href="terms-edit.html" class="btn-ghost" style="font-size:13px;">약관 편집</a>
        </div>

        <!-- 탭 -->
        <div class="profile-tabs">
          <button class="profile-tab active" data-tab="Notices">공지 관리</button>
          <button class="profile-tab" data-tab="Guides">가이드 관리</button>
          <button class="profile-tab" data-tab="Users">유저 관리</button>
          <button class="profile-tab" data-tab="Species">종족 관리</button>
          <button class="profile-tab" data-tab="Characters">개체 관리</button>
          <button class="profile-tab" data-tab="Adoptions">분양 관리</button>
        </div>

        <!-- 공지 관리 탭 -->
        <div id="tabNotices" class="tab-content">

          <section class="section">
            <!-- 작성 버튼 -->
            <div class="section-header">
              <h2 class="settings-section-title" style="margin-bottom:0;">공지 목록</h2>
              <button class="btn-secondary" onclick="toggleWriteForm()">+ 새 공지 작성</button>
            </div>

            <!-- 인라인 작성 폼 -->
            <div id="writeForm" class="admin-write-form" style="display:none;">
              <div class="form-group">
                <label class="notice-pin-label">
                  <input type="checkbox" id="isPinned" class="notice-pin-check">
                  <span>상단 고정</span>
                </label>
              </div>
              <div class="form-group">
                <label class="form-label">제목 <span class="required">*</span></label>
                <input type="text" id="noticeTitle" class="form-input" placeholder="공지 제목">
              </div>
              <div class="form-group">
                <label class="form-label">내용 <span class="required">*</span></label>
                <textarea id="noticeContent" class="form-textarea" rows="6" placeholder="공지 내용"></textarea>
              </div>
              <p class="auth-error" id="writeError"></p>
              <div class="form-actions" style="gap:8px; display:flex; justify-content:flex-end;">
                <button class="btn-ghost" onclick="toggleWriteForm()">취소</button>
                <button class="btn-secondary" id="writeSubmitBtn" onclick="submitNotice()">등록</button>
              </div>
            </div>

            <!-- 공지 목록 -->
            <div id="noticeTableWrap" style="margin-top: 16px;">
              <div class="admin-card-list" id="noticeTableBody"></div>
              <p id="noticeEmpty" class="empty-state" style="display:none;">등록된 공지가 없어요.</p>
            </div>
            <div id="pgNotices"></div>
          </section>

        </div>

        <!-- 가이드 관리 탭 -->
        <div id="tabGuides" class="tab-content" style="display:none;">

          <section class="section">
            <div class="section-header">
              <h2 class="settings-section-title" style="margin-bottom:0;">가이드 목록</h2>
              <a href="guide-write.html" class="btn-secondary">+ 새 가이드 작성</a>
            </div>

            <!-- 가이드 목록 -->
            <div id="guideTableWrap" style="margin-top: 16px;">
              <div class="admin-card-list" id="guideTableBody"></div>
              <p id="guideEmpty" class="empty-state" style="display:none;">등록된 가이드가 없어요.</p>
            </div>
            <div id="pgGuides"></div>
          </section>

        </div>

        <!-- 유저 관리 탭 -->
        <div id="tabUsers" class="tab-content" style="display:none;">
          <section class="section">
            <h2 class="settings-section-title">유저 목록</h2>
            <div class="admin-card-list" id="userTableBody"></div>
            <p id="userEmpty" class="empty-state" style="display:none;">유저가 없어요.</p>
            <div id="pgUsers"></div>
          </section>
        </div>

        <!-- 종족 관리 탭 -->
        <div id="tabSpecies" class="tab-content" style="display:none;">
          <section class="section">
            <h2 class="settings-section-title">종족 목록</h2>
            <div class="admin-card-list" id="speciesTableBody"></div>
            <p id="speciesAdminEmpty" class="empty-state" style="display:none;">등록된 종족이 없어요.</p>
            <div id="pgSpecies"></div>
          </section>
        </div>

        <!-- 개체 관리 탭 -->
        <div id="tabCharacters" class="tab-content" style="display:none;">
          <section class="section">
            <div class="section-header" style="margin-bottom:12px;">
              <h2 class="settings-section-title" style="margin-bottom:0;">개체 목록</h2>
              <input type="text" class="list-search" id="charAdminSearch" placeholder="이름 검색" style="width:200px;" oninput="filterAdminChars(this.value)">
            </div>
            <div class="admin-card-list" id="charTableBody"></div>
            <p id="charAdminEmpty" class="empty-state" style="display:none;">등록된 개체가 없어요.</p>
            <div id="pgChars"></div>
          </section>
        </div>

        <!-- 분양 관리 탭 -->
        <div id="tabAdoptions" class="tab-content" style="display:none;">
          <section class="section">
            <div class="section-header" style="margin-bottom:12px;">
              <h2 class="settings-section-title" style="margin-bottom:0;">분양 목록</h2>
              <input type="text" class="list-search" id="adoptionAdminSearch" placeholder="캐릭터명 / 작성자 검색" style="width:220px;" oninput="filterAdminAdoptions(this.value)">
            </div>
            <div class="admin-card-list" id="adoptionTableBody"></div>
            <p id="adoptionAdminEmpty" class="empty-state" style="display:none;">등록된 분양글이 없어요.</p>
            <div id="pgAdoptions"></div>
          </section>
        </div>

      </div>
    </main>
  </div>

  <!-- 관리자 개체 이전 모달 -->
  <div id="adminTransferModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:500; align-items:center; justify-content:center; padding:16px;">
    <div style="background:#fff; border-radius:16px; padding:24px; width:min(100%, 400px); max-height:85vh; display:flex; flex-direction:column; gap:14px; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <h3 style="margin:0; font-size:16px; font-weight:700;">소유권 이전 (관리자)</h3>
      <p id="adminTransferInfo" style="margin:0; font-size:13px; color:var(--text-sub);"></p>
      <div>
        <p style="font-size:12px; font-weight:600; color:var(--text-sub); margin-bottom:6px;">닉네임으로 검색</p>
        <input type="text" class="form-input" id="adminTransferSearch" placeholder="닉네임 입력..." oninput="filterAdminTransferUsers(this.value)" autocomplete="off">
      </div>
      <div id="adminTransferUserList" style="border:1px solid var(--border); border-radius:10px; max-height:200px; overflow-y:auto; background:#fff;">
        <p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>
      </div>
      <p id="adminTransferSelectedDisplay" style="margin:0; font-size:13px; color:var(--sky-deep); display:none;"></p>
      <p class="auth-error" id="adminTransferError"></p>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeAdminTransferModal()">취소</button>
        <button class="btn-secondary" id="adminTransferConfirmBtn" onclick="confirmAdminTransfer()">이전하기</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.1</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let adminUser = null;

    const noticePager   = createPager(renderNoticeRows,   'pgNotices');
    const guidePager    = createPager(renderGuideRows,    'pgGuides');
    const userPager     = createPager(renderUserRows,     'pgUsers');
    const speciesPager  = createPager(renderSpeciesRows,  'pgSpecies');
    const charPager     = createPager(renderCharRows,     'pgChars');
    const adoptionPager = createPager(renderAdoptionRows, 'pgAdoptions');

    async function initPage() {
      const user = await getUser();
      const role = user?.user_metadata?.role;

      console.log('[admin access]', {
        role,
        isAdminOrStaffExists: typeof window.isAdminOrStaff,
        result: window.isAdminOrStaff?.(role),
        metadata: user?.user_metadata,
      });

      if (!user || (role !== 'admin' && role !== 'staff')) {
        window.location.href = 'index.html';
        return;
      }
      adminUser = user;

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';

      loadNotices();
      loadUsers();
    }

    // ── 탭 전환 ──────────────────────────────
    const tabLoaded = {};
    document.querySelectorAll('.profile-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.profile-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById('tab' + btn.dataset.tab).style.display = 'block';
        if (btn.dataset.tab === 'Guides' && !tabLoaded.Guides) {
          tabLoaded.Guides = true; loadGuides();
        }
        if (btn.dataset.tab === 'Species' && !tabLoaded.Species) {
          tabLoaded.Species = true; loadAdminSpecies();
        }
        if (btn.dataset.tab === 'Characters' && !tabLoaded.Characters) {
          tabLoaded.Characters = true; loadAdminChars();
        }
        if (btn.dataset.tab === 'Adoptions' && !tabLoaded.Adoptions) {
          tabLoaded.Adoptions = true; loadAdminAdoptions();
        }
      });
    });

    // ── 공지 관리 ────────────────────────────
    function renderNoticeRows(slice) {
      document.getElementById('noticeTableBody').innerHTML = slice.map(n => {
        const date = new Date(n.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');
        return `
          <div class="admin-card-row">
            <div class="admin-card-left">
              ${n.is_pinned ? '<span class="notice-pin" style="flex-shrink:0;">고정</span>' : ''}
              <a href="notice-detail.html?id=${n.id}" class="admin-card-name">${n.title}</a>
            </div>
            <div class="admin-card-right">
              <span class="admin-card-date">${date}</span>
              <button class="admin-btn-edit" onclick="location.href='notice-write.html?edit=${n.id}'">수정</button>
              <button class="admin-btn-delete" onclick="deleteNotice(${n.id})">삭제</button>
            </div>
          </div>`;
      }).join('');
    }

    async function loadNotices() {
      const { data, error } = await sb
        .from('notices')
        .select('*')
        .order('is_pinned', { ascending: false })
        .order('created_at', { ascending: false });

      const empty = document.getElementById('noticeEmpty');

      if (error || !data || data.length === 0) {
        document.getElementById('noticeTableBody').innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      noticePager.load(data);
    }

    function toggleWriteForm() {
      const form = document.getElementById('writeForm');
      const isOpen = form.style.display === 'none';
      form.style.display = isOpen ? 'block' : 'none';
      if (!isOpen) {
        document.getElementById('noticeTitle').value = '';
        document.getElementById('noticeContent').value = '';
        document.getElementById('isPinned').checked = false;
        document.getElementById('writeError').textContent = '';
      }
    }

    async function submitNotice() {
      const title    = document.getElementById('noticeTitle').value.trim();
      const content  = document.getElementById('noticeContent').value.trim();
      const isPinned = document.getElementById('isPinned').checked;
      const errorEl  = document.getElementById('writeError');
      const btn      = document.getElementById('writeSubmitBtn');

      errorEl.textContent = '';
      if (!title)   { errorEl.textContent = '제목을 입력해주세요.'; return; }
      if (!content) { errorEl.textContent = '내용을 입력해주세요.'; return; }

      btn.textContent = '등록 중...';
      btn.disabled = true;

      const { error } = await sb.from('notices').insert({
        title, content,
        is_pinned: isPinned,
        author: adminUser?.user_metadata?.nickname || '관리자',
      });

      if (error) {
        console.error('[notice insert error]', error);
        errorEl.textContent = `등록에 실패했어요. (${error.message})`;
      } else {
        toggleWriteForm();
        loadNotices();
      }

      btn.textContent = '등록';
      btn.disabled = false;
    }

    async function deleteNotice(id) {
      if (!confirm('정말 삭제할까요?')) return;
      await sb.from('notices').delete().eq('id', id);
      loadNotices();
    }

    // ── 가이드 관리 ──────────────────────────
    function renderGuideRows(slice) {
      document.getElementById('guideTableBody').innerHTML = slice.map(g => {
        const date = new Date(g.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');
        return `
          <div class="admin-card-row">
            <div class="admin-card-left">
              ${g.is_pinned ? '<span class="notice-pin" style="flex-shrink:0;">고정</span>' : ''}
              <a href="guide-detail.html?id=${g.id}" class="admin-card-name">${g.title}</a>
            </div>
            <div class="admin-card-right">
              <span class="admin-card-date">${date}</span>
              <button class="admin-btn-edit" onclick="location.href='guide-write.html?edit=${g.id}'">수정</button>
              <button class="admin-btn-delete" onclick="deleteGuide(${g.id})">삭제</button>
            </div>
          </div>`;
      }).join('');
    }

    async function loadGuides() {
      const { data, error } = await sb
        .from('guides')
        .select('*')
        .order('is_pinned', { ascending: false })
        .order('created_at', { ascending: false });

      const empty = document.getElementById('guideEmpty');

      if (error || !data || data.length === 0) {
        document.getElementById('guideTableBody').innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      guidePager.load(data);
    }

    async function deleteGuide(id) {
      if (!confirm('정말 삭제할까요?')) return;
      await sb.from('guides').delete().eq('id', id);
      loadGuides();
    }

    // ── 유저 관리 ────────────────────────────
    const TESTERS = ['Moulow', 'moulow', 'Sawol'];

    function adminUserPriority(u) {
      if (u.login_id === 'admin')          return 0;
      if (u.role === 'admin')              return 1;
      if (u.role === 'staff')              return 2;
      if (TESTERS.includes(u.nickname))    return 3;
      if (u.role === 'species_owner')      return 4;
      return 5;
    }

    function sortAdminUsers(list) {
      return [...list].sort((a, b) => {
        const diff = adminUserPriority(a) - adminUserPriority(b);
        if (diff !== 0) return diff;
        return (a.nickname || a.login_id || '').localeCompare(b.nickname || b.login_id || '', 'ko');
      });
    }

    function renderUserRows(slice) {
      document.getElementById('userTableBody').innerHTML = slice.map(u => {
        const date = new Date(u.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');
        const roleLabel      = u.role === 'admin' ? '관리자' : u.role === 'staff' ? '스태프' : u.role === 'species_owner' ? '종족주' : '일반유저';
        const roleBadgeClass = u.role === 'admin' ? 'badge-admin' : u.role === 'staff' ? 'badge-staff' : u.role === 'species_owner' ? 'badge-species-owner' : 'badge-user';
        const safeNick = (u.nickname || '').replace(/'/g, "\\'");
        const actions = u.role === 'admin' ? '' : `
          <div class="admin-card-actions">
            ${u.role === 'species_owner'
              ? `<button class="admin-btn-revoke" onclick="setRole('${u.id}', '')">권한 회수</button>`
              : `<button class="admin-btn-grant" onclick="setRole('${u.id}', 'species_owner')">종족주 임명</button>`}
            <button class="admin-btn-delete" onclick="deleteUser('${u.id}', '${safeNick}')">삭제</button>
          </div>`;
        return `
          <div class="admin-card-row" id="user-row-${u.id}">
            <div class="admin-card-left">
              <span class="${roleBadgeClass}">${roleLabel}</span>
              <span class="admin-card-name">${u.nickname || '—'}</span>
            </div>
            <div class="admin-card-right">
              <span class="admin-card-date">${date}</span>
              ${actions}
            </div>
          </div>`;
      }).join('');
    }

    async function loadUsers() {
      const { data, error } = await sb.rpc('get_all_users');
      const empty = document.getElementById('userEmpty');

      if (error || !data || data.length === 0) {
        document.getElementById('userTableBody').innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      console.log('[get_all_users 첫번째 row]', data[0]);
      userPager.load(sortAdminUsers(data));
    }

    async function setRole(userId, role) {
      const label = role === 'species_owner' ? '종족주 임명' : '권한 회수';
      if (!confirm(`${label}할까요?`)) return;

      const { error } = await sb.rpc('set_user_role', {
        target_id: userId,
        new_role: role,
      });

      if (error) {
        alert('변경에 실패했어요.\n\n' + error.message);
        console.error('[setRole error]', error);
        return;
      }
      loadUsers();
    }

    async function deleteUser(userId, nickname) {
      if (!confirm(`"${nickname}" 유저를 삭제할까요?\n개체·종족·이전 내역의 닉네임은 (알수없음)으로 바뀌어요.`)) return;

      await Promise.all([
        sb.from('characters').update({ owner_nickname: '(알수없음)', owner_user_id: null }).eq('owner_user_id', userId),
        sb.from('characters').update({ designer_nickname: '(알수없음)' }).eq('designer_nickname', nickname),
        sb.from('species').update({ owner_nickname: '(알수없음)', owner_user_id: null }).eq('owner_user_id', userId),
        sb.from('character_transfers').update({ from_nickname: '(알수없음)' }).eq('from_nickname', nickname),
        sb.from('character_transfers').update({ to_nickname: '(알수없음)' }).eq('to_nickname', nickname),
      ]);

      const { error } = await sb.rpc('delete_user', { target_id: userId });
      if (error) { alert('계정 삭제에 실패했어요.'); return; }
      loadUsers();
    }

    // ── 종족 관리 ────────────────────────────
    function renderSpeciesRows(slice) {
      document.getElementById('speciesTableBody').innerHTML = slice.map(s => {
        const date = new Date(s.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');
        return `
          <div class="admin-card-row" id="species-row-${s.id}">
            <div class="admin-card-left">
              <a href="species.html?id=${s.id}" class="admin-card-name">${s.name}</a>
              <span class="admin-card-meta">${s.owner_nickname || '—'}</span>
            </div>
            <div class="admin-card-right">
              <span class="admin-card-date">${date}</span>
              <button class="admin-btn-edit" onclick="location.href='species-edit.html?id=${s.id}'">수정</button>
              <button class="admin-btn-delete" onclick="deleteSpecies('${s.id}', '${s.name.replace(/'/g, "\\'")}')">삭제</button>
            </div>
          </div>`;
      }).join('');
    }

    async function loadAdminSpecies() {
      const { data, error } = await sb
        .from('species')
        .select('id, name, owner_nickname, created_at')
        .order('created_at', { ascending: false });

      const empty = document.getElementById('speciesAdminEmpty');

      if (error || !data || data.length === 0) {
        document.getElementById('speciesTableBody').innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      speciesPager.load(data);
    }

    async function deleteSpecies(id, name) {
      if (!confirm(`"${name}" 종족을 삭제할까요?\n소속 개체도 함께 삭제돼요.`)) return;
      const { error } = await sb.rpc('admin_delete_species', { species_id: id, p_species_name: name });
      if (error) { alert('삭제에 실패했어요: ' + error.message); return; }
      loadAdminSpecies();
    }

    // ── 개체 관리 ────────────────────────────
    let allAdminChars = [];

    function renderCharRows(slice) {
      document.getElementById('charTableBody').innerHTML = slice.map(c => {
        const date = new Date(c.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');
        const safeName = c.name.replace(/'/g, "\\'");
        const safeNick = (c.owner_nickname || '').replace(/'/g, "\\'");
        return `
          <div class="admin-card-row" id="char-row-${c.id}">
            <div class="admin-card-left">
              <a href="character.html?id=${c.id}" class="admin-card-name">${c.name}</a>
              <span class="admin-card-meta">${[c.species_name, c.owner_nickname].filter(Boolean).join(' · ')}</span>
            </div>
            <div class="admin-card-right">
              <span class="admin-card-date">${date}</span>
              <button class="admin-btn-edit" onclick="location.href='character-edit.html?id=${c.id}'">수정</button>
              <button class="admin-btn-edit" onclick="openAdminTransferModal('${c.id}', '${safeName}', '${safeNick}')">이전</button>
              <button class="admin-btn-delete" onclick="deleteChar('${c.id}', '${safeName}')">삭제</button>
            </div>
          </div>`;
      }).join('');
    }

    async function loadAdminChars() {
      const { data, error } = await sb
        .from('characters')
        .select('id, name, species_name, owner_nickname, owner_user_id, created_at')
        .order('created_at', { ascending: false });

      const empty = document.getElementById('charAdminEmpty');

      if (error || !data || data.length === 0) {
        document.getElementById('charTableBody').innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      allAdminChars = data;
      charPager.load(data);
    }

    function filterAdminChars(q) {
      const qLow = q.toLowerCase();
      const filtered = q
        ? allAdminChars.filter(c =>
            c.name.toLowerCase().includes(qLow) ||
            (c.species_name || '').toLowerCase().includes(qLow) ||
            (c.owner_nickname || '').toLowerCase().includes(qLow))
        : allAdminChars;
      charPager.load(filtered);
    }

    async function deleteChar(id, name) {
      if (!confirm(`"${name}" 개체를 삭제할까요?`)) return;
      const { error } = await sb.from('characters').delete().eq('id', id);
      if (error) { alert('삭제에 실패했어요.'); return; }
      allAdminChars = allAdminChars.filter(c => String(c.id) !== String(id));
      charPager.load(allAdminChars);
    }

    // ── 관리자 개체 이전 ──────────────────────
    let _adminTransferCharId   = null;
    let _adminTransferCharName = null;
    let _adminTransferToNick   = null;
    let _adminTransferToId     = null;
    let _adminAllUsers         = [];

    async function openAdminTransferModal(charId, charName, currentOwner) {
      _adminTransferCharId   = charId;
      _adminTransferCharName = charName;
      _adminTransferToNick   = null;
      _adminTransferToId     = null;

      document.getElementById('adminTransferInfo').textContent = `"${charName}" — 현재 소유주: ${currentOwner || '—'}`;
      document.getElementById('adminTransferSearch').value = '';
      document.getElementById('adminTransferUserList').innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>';
      document.getElementById('adminTransferSelectedDisplay').style.display = 'none';
      document.getElementById('adminTransferError').textContent = '';
      document.getElementById('adminTransferConfirmBtn').textContent = '이전하기';
      document.getElementById('adminTransferConfirmBtn').disabled = false;
      document.getElementById('adminTransferModal').style.display = 'flex';

      if (!_adminAllUsers.length) {
        const { data } = await sb.rpc('get_all_users');
        _adminAllUsers = (data || []).filter(u => u.nickname).sort((a, b) => a.nickname.localeCompare(b.nickname, 'ko'));
      }
    }

    function closeAdminTransferModal() {
      document.getElementById('adminTransferModal').style.display = 'none';
    }

    function filterAdminTransferUsers(q) {
      const el = document.getElementById('adminTransferUserList');
      if (!q) { el.innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>'; return; }
      const qLow = q.toLowerCase();
      const matched = _adminAllUsers.filter(u => u.nickname.toLowerCase().includes(qLow)).slice(0, 20);
      if (!matched.length) { el.innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">일치하는 유저가 없어요</p>'; return; }
      el.innerHTML = matched.map(u => `
        <div onclick="selectAdminTransferUser('${u.nickname.replace(/'/g, "\\'")}', '${u.id}')"
          style="padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--border); transition:background 0.1s;"
          onmouseover="this.style.background='var(--sky-pale)'" onmouseout="this.style.background=''">
          ${u.nickname}
        </div>`).join('');
    }

    function selectAdminTransferUser(nick, userId) {
      _adminTransferToNick = nick;
      _adminTransferToId   = userId;
      document.querySelectorAll('#adminTransferUserList > div').forEach(el => el.style.background = '');
      event.currentTarget.style.background = 'var(--sky-light)';
      const disp = document.getElementById('adminTransferSelectedDisplay');
      disp.textContent = `선택됨: ${nick}`;
      disp.style.display = 'block';
    }

    async function confirmAdminTransfer() {
      const errorEl = document.getElementById('adminTransferError');
      const btn     = document.getElementById('adminTransferConfirmBtn');
      errorEl.textContent = '';

      if (!_adminTransferToNick) { errorEl.textContent = '이전받을 유저를 선택해주세요.'; return; }
      if (!confirm(`"${_adminTransferCharName}"의 소유권을\n${_adminTransferToNick}님에게 이전할까요?`)) return;

      btn.textContent = '이전 중...';
      btn.disabled = true;

      const { data: updated, error } = await sb.from('characters').update({
        owner_nickname: _adminTransferToNick,
        owner_user_id:  _adminTransferToId || null,
        owner_contact:  null,
        owner_is_offsite: false,
      }).eq('id', _adminTransferCharId).select('id');

      if (error || !updated?.length) {
        errorEl.textContent = error?.message || '이전에 실패했어요.';
        btn.textContent = '이전하기';
        btn.disabled = false;
        return;
      }

      const char = allAdminChars.find(c => String(c.id) === String(_adminTransferCharId));
      if (char) { char.owner_nickname = _adminTransferToNick; char.owner_user_id = _adminTransferToId; }

      closeAdminTransferModal();
      charPager.load(allAdminChars);
    }

    // ── 분양 관리 ────────────────────────────
    const TYPE_LABEL_ADMIN = { free: '무료', paid: '유료', auction: '경매', etc: '기타' };
    let allAdminAdoptions = [];

    function renderAdoptionRows(slice) {
      document.getElementById('adoptionTableBody').innerHTML = slice.map(a => {
        const date = new Date(a.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');
        const typeLabel   = TYPE_LABEL_ADMIN[a.adoption_type] || a.adoption_type || '—';
        const statusColor = a.status === '완료' ? 'color:var(--text-mute)' : 'color:var(--sky-dark)';
        return `
          <div class="admin-card-row" id="adoption-row-${a.id}">
            <div class="admin-card-left">
              <a href="adoption-detail.html?id=${a.id}" class="admin-card-name">${a.character_name || '—'}</a>
              <span class="admin-card-meta">${[a.species_name, a.author].filter(Boolean).join(' · ')} · ${typeLabel} · <span style="${statusColor}">${a.status || '분양중'}</span></span>
            </div>
            <div class="admin-card-right">
              <span class="admin-card-date">${date}</span>
              <button class="admin-btn-delete" onclick="deleteAdoption('${a.id}', '${(a.character_name || '').replace(/'/g, "\\'")}')">삭제</button>
            </div>
          </div>`;
      }).join('');
    }

    async function loadAdminAdoptions() {
      const { data, error } = await sb
        .from('adoptions')
        .select('id, character_name, species_name, adoption_type, status, author, created_at')
        .order('created_at', { ascending: false });

      const empty = document.getElementById('adoptionAdminEmpty');

      if (error || !data || data.length === 0) {
        document.getElementById('adoptionTableBody').innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      allAdminAdoptions = data;
      adoptionPager.load(data);
    }

    function filterAdminAdoptions(q) {
      const qLow = q.toLowerCase();
      const filtered = q
        ? allAdminAdoptions.filter(a =>
            (a.character_name || '').toLowerCase().includes(qLow) ||
            (a.species_name   || '').toLowerCase().includes(qLow) ||
            (a.author         || '').toLowerCase().includes(qLow))
        : allAdminAdoptions;
      adoptionPager.load(filtered);
    }

    async function deleteAdoption(id, name) {
      if (!confirm(`"${name}" 분양글을 삭제할까요?`)) return;
      const { data: deleted, error } = await sb.from('adoptions').delete().eq('id', id).select('id');
      if (error) { alert('삭제에 실패했어요: ' + error.message); return; }
      if (!deleted?.length) { alert('삭제 권한이 없어요.\nSupabase에서 관리자 DELETE 정책을 추가해주세요.'); return; }
      allAdminAdoptions = allAdminAdoptions.filter(a => String(a.id) !== String(id));
      adoptionPager.load(allAdminAdoptions);
    }

    initPage();
  </script>
</body>
</html>

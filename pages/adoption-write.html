<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>분양 글 작성 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="register-wrap">

        <div class="breadcrumb" style="margin-bottom:24px;">
          <a href="index.html">홈</a><span>/</span>
          <a href="adoption.html">분양</a><span>/</span>
          <span>작성</span>
        </div>

        <h1 class="register-title">분양 글 작성</h1>

        <p class="auth-error" id="noCharsMsg" style="display:none; margin-bottom:16px;"></p>

        <form class="register-form" id="adoptionForm">

          <!-- 캐릭터 선택 -->
          <div class="form-group">
            <label class="form-label">분양할 캐릭터 <span class="required">*</span></label>
            <select id="characterSelect" class="form-input" onchange="onCharSelect(this.value)">
              <option value="">불러오는 중...</option>
            </select>
            <div id="charPreview" style="display:none; margin-top:10px; width:100px; height:100px; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border);">
              <img id="charPreviewImg" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <p id="resaleWarning" style="display:none; margin-top:8px; font-size:13px; color:#92400e; background:#fffbeb; border:1px solid #fde68a; border-radius:8px; padding:8px 12px;">⚠ 재분양 불가 설정 되어있는 개체입니다. 유의해주세요!</p>
          </div>

          <!-- 분양 형식 -->
          <div class="form-group">
            <label class="form-label">분양 형식 <span class="required">*</span></label>
            <div class="owner-type-tabs">
              <button type="button" class="owner-tab active" id="type-free"    onclick="setType('free')">무료</button>
              <button type="button" class="owner-tab"        id="type-paid"    onclick="setType('paid')">유료</button>
              <button type="button" class="owner-tab"        id="type-auction" onclick="setType('auction')">경매</button>
              <button type="button" class="owner-tab"        id="type-etc"     onclick="setType('etc')">기타</button>
            </div>
          </div>

          <!-- 무료 서브 옵션 -->
          <div class="form-group" id="freeSubOptions">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
              <label class="form-label" style="margin:0;">진행 방식</label>
              <p id="freeNormalNotice" class="form-hint" style="display:block; margin:0;">댓글 또는 연락수단을 통해 원하시는 방식으로 자유롭게 진행해주세요.</p>
            </div>
            <div class="owner-type-tabs">
              <button type="button" class="owner-tab active" id="free-normal"     onclick="setFreeType('normal')">일반</button>
              <button type="button" class="owner-tab"        id="free-random"     onclick="setFreeType('random')">랜덤 추첨</button>
              <button type="button" class="owner-tab"        id="free-first_come" onclick="setFreeType('first_come')">선착순</button>
            </div>
          </div>

          <!-- 무료: 추첨/선착순 날짜 -->
          <div class="form-group" id="raffleAtField" style="display:none;">
            <label class="form-label" id="raffleAtLabel">추첨 날짜/시간 <span class="required">*</span></label>
            <input type="datetime-local" id="raffleAt" class="form-input">
            <p class="form-hint" id="raffleAtHint"></p>
          </div>

          <!-- 유료: 가격 -->
          <div class="form-group" id="paidFields" style="display:none;">
            <label class="form-label" id="priceLabel">가격 <span class="required">*</span></label>
            <div style="display:flex; align-items:center; gap:8px;">
              <input type="text" id="price" class="form-input" inputmode="numeric"
                oninput="this.value=this.value.replace(/[^0-9]/g,'')"
                placeholder="금액 입력" style="flex:1;">
              <span style="font-size:14px; color:var(--text-sub); white-space:nowrap;">원</span>
            </div>
          </div>

          <!-- 경매 필드 -->
          <div id="auctionFields" style="display:none;">

            <div class="form-group">
              <label class="form-label">시작가 <span class="required">*</span></label>
              <div style="display:flex; align-items:center; gap:8px;">
                <input type="text" id="startPrice" class="form-input" placeholder="0" inputmode="numeric"
                  oninput="fmtNum(this)" style="flex:1;">
                <span style="font-size:14px; color:var(--text-sub); white-space:nowrap;">원</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">즉시 낙찰가 <span class="required">*</span></label>
              <div style="display:flex; align-items:center; gap:8px;">
                <input type="text" id="instantPrice" class="form-input" placeholder="0" inputmode="numeric"
                  oninput="fmtNum(this)" style="flex:1;">
                <span style="font-size:14px; color:var(--text-sub); white-space:nowrap;">원</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">입찰 단위 <span class="required">*</span></label>
              <div style="display:flex; align-items:center; gap:8px;">
                <input type="text" id="bidUnit" class="form-input" placeholder="0" inputmode="numeric"
                  oninput="fmtNum(this)" style="flex:1;">
                <span style="font-size:14px; color:var(--text-sub); white-space:nowrap;">원</span>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">마감 방법</label>
              <div class="owner-type-tabs">
                <button type="button" class="owner-tab active" id="closeMethodDate"    onclick="setCloseMethod('date')">날짜 지정</button>
                <button type="button" class="owner-tab"        id="closeMethodLastBid" onclick="setCloseMethod('last_bid')">마지막 입찰 후</button>
              </div>
            </div>

            <div class="form-group" id="closeDateField">
              <label class="form-label">마감 날짜</label>
              <input type="datetime-local" id="closeAt" class="form-input">
              <p class="form-hint" style="color:#b45309; margin-top:6px;">
                ⚠️ 자동으로 닫히지 않으니 날짜와 시간을 확인하여 꼭 직접 분양확정 해주세요!
              </p>
            </div>

            <div class="form-group" id="closeHoursField" style="display:none;">
              <label class="form-label">마지막 입찰 후 마감</label>
              <div style="display:flex; align-items:center; gap:10px;">
                <input type="number" id="closeHours" class="form-input" min="1" max="168" placeholder="24" style="max-width:120px;">
                <span style="font-size:14px; color:var(--text-sub);">시간 후 마감</span>
              </div>
              <p class="form-hint" style="color:#b45309; margin-top:6px;">
                ⚠️ 자동으로 닫히지 않으니 꼭 직접 분양확정 해주세요!
              </p>
            </div>

          </div>

          <!-- 기타: 조건 -->
          <div class="form-group" id="etcFields" style="display:none;">
            <label class="form-label">조건</label>
            <input type="text" id="etcPrice" class="form-input" placeholder="예) 리퀘, arpg 재화 등 — 없으면 비워두세요">
          </div>

          <!-- 추가 이미지 -->
          <div class="form-group">
            <label class="form-label">추가 이미지</label>
            <div style="display:flex; flex-direction:column; gap:8px;">
              <input type="text" id="extraImg1" class="form-input" placeholder="이미지 URL (선택)">
              <input type="text" id="extraImg2" class="form-input" placeholder="이미지 URL (선택)">
              <input type="text" id="extraImg3" class="form-input" placeholder="이미지 URL (선택)">
            </div>
            <p class="form-hint">최대 3장까지 추가 가능해요</p>
          </div>

          <!-- 설명 -->
          <div class="form-group">
            <label class="form-label">설명</label>
            <textarea id="description" class="form-textarea" rows="6" placeholder="분양 관련 설명 (선택)"></textarea>
          </div>

          <!-- 연락 수단 -->
          <div class="form-group">
            <label class="form-label">연락 수단</label>
            <input type="text" id="contact" class="form-input" placeholder="예) 트위터(X): @xxx / 디스코드: xxx#0000">
          </div>

          <p class="auth-error" id="writeError"></p>

          <div class="register-actions">
            <a href="adoption.html" class="btn-ghost">취소</a>
            <button type="submit" class="btn-secondary" id="submitBtn">등록하기</button>
          </div>

        </form>
      </div>
    </main>
  </div>

  <footer class="footer"><p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.3</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let selectedType        = 'free';
    let selectedFreeType    = 'normal';
    let selectedCloseMethod = 'date';
    let myCharacters        = [];
    let mySlots             = [];
    let speciesRulesMap     = {};

    function fmtNum(el) {
      const raw = el.value.replace(/[^0-9]/g, '');
      el.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
    }

    function getRawNum(id) {
      return document.getElementById(id).value.replace(/,/g, '').trim() || null;
    }

    function onCharSelect(val) {
      const preview = document.getElementById('charPreview');
      const img     = document.getElementById('charPreviewImg');

      if (!val) { preview.style.display = 'none'; document.getElementById('resaleWarning').style.display = 'none'; return; }

      const isSlot = val.startsWith('s:');
      const rawId  = val.slice(2);

      if (isSlot) {
        const slot = mySlots.find(s => String(s.id) === rawId);
        const imgUrl = slot?.thumbnail_url || slot?.image_url;
        if (imgUrl) { img.src = imgUrl; preview.style.display = 'block'; } else { preview.style.display = 'none'; }
        document.getElementById('resaleWarning').style.display = 'none';
      } else {
        const char = myCharacters.find(c => String(c.id) === rawId);
        if (char?.image_url) { img.src = char.image_url; preview.style.display = 'block'; } else { preview.style.display = 'none'; }
        const sp = speciesRulesMap[char?.species_name] || {};
        const finalAllowResale = char ? (char.allow_resale ?? sp.allow_resale ?? true) : true;
        document.getElementById('resaleWarning').style.display = (char && !finalAllowResale) ? 'block' : 'none';
      }
    }

    function setType(type) {
      selectedType = type;
      ['free', 'paid', 'auction', 'etc'].forEach(t =>
        document.getElementById(`type-${t}`).classList.toggle('active', t === type)
      );

      document.getElementById('freeSubOptions').style.display = type === 'free'    ? 'block' : 'none';
      document.getElementById('paidFields').style.display     = type === 'paid'    ? 'block' : 'none';
      document.getElementById('auctionFields').style.display  = type === 'auction' ? 'block' : 'none';
      document.getElementById('etcFields').style.display      = type === 'etc'     ? 'block' : 'none';

      // 무료가 아닐 때 추첨 날짜 필드 숨김
      if (type !== 'free') {
        document.getElementById('raffleAtField').style.display = 'none';
      } else {
        setFreeType(selectedFreeType);
      }
    }

    function setFreeType(freeType) {
      selectedFreeType = freeType;
      ['normal', 'random', 'first_come'].forEach(t =>
        document.getElementById(`free-${t}`).classList.toggle('active', t === freeType)
      );

      const raffleField = document.getElementById('raffleAtField');
      const raffleLabel = document.getElementById('raffleAtLabel');
      const raffleHint  = document.getElementById('raffleAtHint');

      const normalNotice = document.getElementById('freeNormalNotice');
      if (freeType === 'random') {
        raffleField.style.display  = 'block';
        normalNotice.style.display = 'none';
        raffleLabel.innerHTML      = '추첨 날짜/시간 <span class="required">*</span>';
        raffleHint.textContent     = '이 날짜/시간이 지나면 신청이 마감되고 분양자에게 추첨 버튼이 활성화돼요.';
      } else if (freeType === 'first_come') {
        raffleField.style.display  = 'block';
        normalNotice.style.display = 'none';
        raffleLabel.innerHTML      = '선착순 시작 날짜/시간 <span class="required">*</span>';
        raffleHint.textContent     = '이 날짜/시간이 지나면 [분양받기] 버튼이 활성화돼요.';
      } else {
        raffleField.style.display  = 'none';
        normalNotice.style.display = 'block';
      }
    }

    function setCloseMethod(method) {
      selectedCloseMethod = method;
      document.getElementById('closeMethodDate').classList.toggle('active',    method === 'date');
      document.getElementById('closeMethodLastBid').classList.toggle('active', method === 'last_bid');
      document.getElementById('closeDateField').style.display    = method === 'date'     ? 'block' : 'none';
      document.getElementById('closeHoursField').style.display   = method === 'last_bid' ? 'block' : 'none';
    }

    async function initPage() {
      const user = await getUser();
      if (!user) {
        window.location.href = 'adoption.html';
        return;
      }
      await loadCharacters(user);
    }

    async function loadCharacters(user) {
      // 내 종족 id 목록 (디자인권 분양 권한은 종족주에게만)
      const { data: mySpecies } = await sb.from('species')
        .select('id').eq('owner_user_id', user.id);
      const mySpeciesIds = (mySpecies || []).map(s => s.id);

      const slotsQuery = mySpeciesIds.length > 0
        ? sb.from('slots').select('id, name, slot_number, species_id, image_url, thumbnail_url, status')
            .in('species_id', mySpeciesIds).eq('status', 'active')
            .order('slot_number', { ascending: true, nullsFirst: false })
        : { data: [] };

      const [{ data: chars }, { data: slots }, { data: activeAdoptions }, { data: allSpecies }] = await Promise.all([
        sb.from('characters').select('id, name, species_name, image_url, thumbnail_url, allow_free_adoption, allow_resale, allow_paid_adoption, allow_other_adoption')
          .eq('owner_user_id', user.id).neq('owner_is_offsite', true).order('name'),
        slotsQuery,
        sb.from('adoptions').select('character_id, slot_id').in('status', ['분양중', '확인 대기중']),
        sb.from('species').select('id, name, allow_free_adoption, allow_resale, allow_paid_adoption, allow_other_adoption'),
      ]);

      speciesRulesMap = Object.fromEntries((allSpecies || []).map(s => [s.name, s]));

      // 슬롯에 종족명 붙이기
      const speciesIdToName = Object.fromEntries((allSpecies || []).map(s => [s.id, s.name]));
      const activeCharIds = new Set((activeAdoptions || []).map(a => a.character_id).filter(Boolean));
      const activeSlotIds = new Set((activeAdoptions || []).map(a => a.slot_id).filter(Boolean));

      myCharacters = (chars || []).filter(c => !activeCharIds.has(c.id));
      mySlots      = (slots  || [])
        .filter(s => !activeSlotIds.has(s.id))
        .map(s => ({ ...s, speciesName: speciesIdToName[s.species_id] || '' }));

      const hasItems = myCharacters.length > 0 || mySlots.length > 0;
      if (!hasItems) {
        showNoChars('분양 가능한 캐릭터 또는 디자인권이 없어요.');
        return;
      }

      const select = document.getElementById('characterSelect');
      let html = '<option value="">선택하세요</option>';

      if (myCharacters.length > 0) {
        html += '<optgroup label="캐릭터">' +
          myCharacters.map(c =>
            `<option value="c:${c.id}">${c.name}${c.species_name ? ` (${c.species_name})` : ''}</option>`
          ).join('') + '</optgroup>';
      }

      if (mySlots.length > 0) {
        html += '<optgroup label="디자인권">' +
          mySlots.map(s =>
            `<option value="s:${s.id}">[디자인권${s.speciesName ? `-${s.speciesName}` : ''}] ${s.name}${s.slot_number ? ` (${s.slot_number})` : ''}</option>`
          ).join('') + '</optgroup>';
      }

      select.innerHTML = html;
    }

    function showNoChars(msg) {
      document.getElementById('noCharsMsg').textContent = msg;
      document.getElementById('noCharsMsg').style.display = 'block';
      document.getElementById('adoptionForm').style.display = 'none';
    }

    document.getElementById('adoptionForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const selectedVal = document.getElementById('characterSelect').value;
      const errorEl     = document.getElementById('writeError');
      const btn         = document.getElementById('submitBtn');
      errorEl.textContent = '';

      if (!selectedVal) { errorEl.textContent = '캐릭터 또는 디자인권을 선택해주세요.'; return; }

      const isSlot = selectedVal.startsWith('s:');
      const rawId  = selectedVal.slice(2);
      const charId = isSlot ? null : rawId;

      // 유료 필수 검증
      if (selectedType === 'paid' && !document.getElementById('price').value.trim()) {
        errorEl.textContent = '가격을 입력해주세요.'; return;
      }

      // 경매 필수 검증
      if (selectedType === 'auction') {
        if (!document.getElementById('startPrice').value.trim())   { errorEl.textContent = '시작가를 입력해주세요.'; return; }
        if (!document.getElementById('instantPrice').value.trim()) { errorEl.textContent = '즉시 낙찰가를 입력해주세요.'; return; }
        if (!document.getElementById('bidUnit').value.trim())      { errorEl.textContent = '입찰 단위를 입력해주세요.'; return; }
        const closeHours = document.getElementById('closeHours').value.trim();
        if (selectedCloseMethod === 'last_bid' && (!closeHours || Number(closeHours) <= 0)) {
          errorEl.textContent = '마지막 입찰 후 마감 시간을 입력해주세요.'; return;
        }
      }

      // 무료 추첨/선착순 날짜 필수 검증
      if (selectedType === 'free' && selectedFreeType !== 'normal') {
        if (!document.getElementById('raffleAt').value) {
          errorEl.textContent = '날짜/시간을 입력해주세요.'; return;
        }
      }

      // 분양 규칙 검증 (캐릭터만 적용, 슬롯은 제외)
      const char = isSlot ? null : myCharacters.find(c => String(c.id) === rawId);
      const slot = isSlot ? mySlots.find(s => String(s.id) === rawId) : null;
      const item = char || slot;
      if (!item) { errorEl.textContent = '선택한 항목을 찾을 수 없어요.'; return; }

      if (!isSlot) {
        const sp = speciesRulesMap[char?.species_name] || {};
        if (selectedType === 'free' && !(char.allow_free_adoption ?? sp.allow_free_adoption ?? true)) {
          errorEl.textContent = '무료분양 불가능 개체입니다!'; return;
        }
        if ((selectedType === 'paid' || selectedType === 'auction') && !(char.allow_paid_adoption ?? sp.allow_paid_adoption ?? true)) {
          errorEl.textContent = '유료분양 불가능 개체입니다!'; return;
        }
        if (selectedType === 'etc' && !(char.allow_other_adoption ?? sp.allow_other_adoption ?? true)) {
          errorEl.textContent = '기타분양 불가능 개체입니다!'; return;
        }
      }

      btn.textContent = '등록 중...';
      btn.disabled = true;

      const user    = await getUser();
      const extraImages = [1,2,3]
        .map(i => document.getElementById(`extraImg${i}`).value.trim())
        .filter(Boolean);

      // 가격 결정
      let priceValue = null;
      if (selectedType === 'paid') {
        priceValue = document.getElementById('price').value.trim() || null;
      } else if (selectedType === 'etc') {
        priceValue = document.getElementById('etcPrice').value.trim() || null;
      }

      // 무료 서브타입
      const freeType = (selectedType === 'free' && selectedFreeType !== 'normal') ? selectedFreeType : null;
      const raffleAtRaw = freeType ? (document.getElementById('raffleAt').value || null) : null;
      const raffleAt = raffleAtRaw ? new Date(raffleAtRaw).toISOString() : null;

      const { data: adoption, error } = await sb.from('adoptions').insert({
        character_id:   isSlot ? null        : item.id,
        slot_id:        isSlot ? item.id     : null,
        character_name: item.name,
        species_name:   isSlot ? item.speciesName : item.species_name,
        image_url:      item.image_url    || null,
        thumbnail_url:  item.thumbnail_url || null,
        adoption_type:  selectedType,
        free_type:      freeType,
        raffle_at:      raffleAt,
        price:          priceValue,
        extra_images:   extraImages.length ? extraImages : null,
        description:    document.getElementById('description').value.trim() || null,
        contact:        document.getElementById('contact').value.trim() || null,
        status:         '분양중',
        author:         user?.user_metadata?.display_name || user?.user_metadata?.nickname || '익명',
        user_id:        user?.id,
      }).select().single();

      if (error) {
        console.error('[adoption insert error]', error);
        errorEl.textContent = `등록에 실패했어요. (${error.message})`;
        btn.textContent = '등록하기';
        btn.disabled = false;
        return;
      }

      if (selectedType === 'auction') {
        await sb.from('auction_details').insert({
          adoption_id:   adoption.id,
          start_price:   getRawNum('startPrice'),
          instant_price: getRawNum('instantPrice'),
          bid_unit:      getRawNum('bidUnit'),
          close_method:  selectedCloseMethod,
          close_at:      selectedCloseMethod === 'date'     ? (document.getElementById('closeAt').value || null) : null,
          close_hours:   selectedCloseMethod === 'last_bid' ? (parseInt(document.getElementById('closeHours').value) || null) : null,
        });
      }

      await window.awardAchievement?.('first_adoption', { pending: true });
      window.location.href = `adoption-detail.html?id=${adoption.id}`;
    });

    initPage();
  </script>
</body>
</html>

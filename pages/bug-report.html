<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="../images/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>버그리포트 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div style="padding-top: 24px; margin-bottom: 20px;">
          <h1 class="list-page-title">버그리포트</h1>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-top:6px;">
            <p class="list-page-count" id="bugCount" style="margin-top:0;"></p>
            <a href="bug-report-write.html" class="btn-secondary">버그 신고하기</a>
          </div>
        </div>

        <div id="bugList"></div>
        <div id="paginationWrap"></div>

        <div id="emptyState" class="empty-state-wrap" style="display:none;">
          <div class="empty-state-icon">🐛</div>
          <p class="empty-state-title">버그 신고 내역이 없어요</p>
          <p class="empty-state-desc">발견한 버그가 있으면 알려주세요!</p>
        </div>

      </div>

    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; <a href="credits.html">운영진</a> &nbsp;·&nbsp; ver.2.0</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const STATUS_STYLE = {
      '접수됨': 'background:#f1f5f9;color:#64748b',
      '확인중': 'background:#e0f2fe;color:#0284c7',
      '해결됨': 'background:#dcfce7;color:#166534',
      '중복':   'background:#fef3c7;color:#92400e',
    };

    let isAdminUser = false;
    let idToNick = {};

    async function initPage() {
      const user = await getUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      isAdminUser = isAdminOrStaff(user.user_metadata?.role);

      let query = sb.from('bug_reports').select('*').order('created_at', { ascending: false });
      if (!isAdminUser) {
        query = query.eq('user_id', user.id);
      }

      const [{ data, error }, { data: userList }] = await Promise.all([
        query,
        isAdminUser ? sb.rpc('get_all_users') : Promise.resolve({ data: null }),
      ]);
      if (userList) userList.forEach(u => { if (u.id && u.nickname) idToNick[u.id] = u.nickname; });

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';

      if (error || !data || data.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      document.getElementById('bugCount').textContent = `총 ${data.length}건`;

      pager.load(data);
    }

    function renderItems(list) {
      const container = document.getElementById('bugList');
      container.className = 'notice-list';
      container.innerHTML = list.map(item => {
        const date = new Date(item.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');
        const statusStyle = STATUS_STYLE[item.status] || STATUS_STYLE['접수됨'];
        return `
          <a class="notice-item" href="bug-report-detail.html?id=${item.id}">
            <div class="notice-header-left" style="gap:8px;">
              <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;${statusStyle}">${item.status || '접수됨'}</span>
              <span class="notice-title">${item.title}</span>
              ${isAdminUser ? `<span style="font-size:12px;color:var(--text-mute);">${idToNick[item.user_id] || item.nickname}</span>` : ''}
            </div>
            <div class="notice-header-right">
              <span class="notice-date">${date}</span>
              <span class="notice-arrow-right">›</span>
            </div>
          </a>
        `;
      }).join('');
    }

    const pager = createPager(renderItems);

    initPage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 개체 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <section class="section">

        <div class="list-page-header">
          <div>
            <h1 class="list-page-title">전체 개체</h1>
            <p class="list-page-count" id="charCount">불러오는 중...</p>
          </div>
        </div>

        <!-- 검색 + 필터 + 정렬 -->
        <div class="list-controls">
          <input type="text" class="list-search" id="searchInput" placeholder="개체 이름으로 검색">
          <select class="list-sort" id="speciesFilter">
            <option value="">전체 종족</option>
          </select>
          <select class="list-sort" id="sortSelect">
            <option value="recent">최근 등록순</option>
            <option value="name">이름순</option>
          </select>
        </div>

        <div class="character-grid" id="characterGrid">
          <p class="page-loading">불러오는 중...</p>
        </div>
        <div id="paginationWrap"></div>

        <p id="noResult" style="display:none; padding:40px 0; color:var(--text-mute); font-size:14px;">
          검색 결과가 없어요.
        </p>
      </section>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.2</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let allChars      = [];
    let idToNick      = {};
    let isInitialLoad = true;
    let ownerParamId = null;
    const _qs          = new URLSearchParams(window.location.search);
    const ownerParam   = _qs.get('owner');
    const ownerIdParam = _qs.get('owner_id'); // UUID 기준 조회
    const pager = createPager(render);

    async function loadCharacters() {
      const [{ data, error }, { data: userList }] = await Promise.all([
        sb.from('characters')
          .select('id, name, species_name, owner_nickname, owner_user_id, image_url, thumbnail_url, created_at, is_sensitive, sensitive_note')
          .order('created_at', { ascending: false }),
        sb.rpc('get_all_users'),
      ]);

      if (error || !data) {
        document.getElementById('characterGrid').innerHTML = '<p class="page-loading">불러오기 실패</p>';
        return;
      }

      if (userList) userList.forEach(u => { if (u.id && u.nickname) idToNick[u.id] = u.nickname; });

      if (ownerIdParam) {
        // login_id → UUID 조회 (URL에 UUID 비노출)
        const foundUser = (userList || []).find(u =>
          u.login_id?.toLowerCase() === ownerIdParam.toLowerCase()
        );
        ownerParamId = foundUser?.id || null;
        const displayLabel = foundUser?.nickname || ownerIdParam;
        document.querySelector('.list-page-title').textContent = `${displayLabel}의 개체`;
      } else if (ownerParam && userList) {
        const found = userList.find(u => u.nickname === ownerParam);
        ownerParamId = found?.id || null;
      }

      allChars = data;

      if (!ownerIdParam && ownerParam) {
        document.querySelector('.list-page-title').textContent = `${ownerParam}의 개체`;
      }

      if (isInitialLoad) {
        const p    = new URLSearchParams(location.search);
        const urlQ = p.get('q'); const sp = p.get('species'); const sort = p.get('sort');
        if (urlQ) document.getElementById('searchInput').value  = urlQ;
        if (sp)   document.getElementById('speciesFilter').value = sp;
        if (sort) document.getElementById('sortSelect').value    = sort;
      }

      // 종족 필터 옵션 생성
      const species = [...new Set(data.map(c => c.species_name).filter(Boolean))].sort((a,b) => a.localeCompare(b,'ko'));
      const filterEl = document.getElementById('speciesFilter');
      species.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        filterEl.appendChild(opt);
      });

      applyFilter();
    }

    function applyFilter() {
      const q      = document.getElementById('searchInput').value.trim();
      const sp     = document.getElementById('speciesFilter').value;
      const sort   = document.getElementById('sortSelect').value;

      const qLow = q.toLowerCase();
      let list = allChars.filter(c =>
        (!q          || c.name.toLowerCase().includes(qLow)) &&
        (!sp         || c.species_name === sp) &&
        (!(ownerParam || ownerIdParam) || (ownerParamId ? c.owner_user_id === ownerParamId : c.owner_nickname === ownerParam))
      );

      if (sort === 'name') list = [...list].sort((a,b) => a.name.localeCompare(b.name,'ko'));

      document.getElementById('charCount').textContent = `총 ${list.length}개의 개체`;
      document.getElementById('noResult').style.display = list.length ? 'none' : 'block';

      if (!list.length) {
        document.getElementById('characterGrid').innerHTML = '';
        document.getElementById('paginationWrap').innerHTML = '';
        if (q) window.awardAchievement?.('no_char_search');
        return;
      }

      if (isInitialLoad) {
        isInitialLoad = false;
        pager.init(list);
      } else {
        const url  = new URL(location.href);
        const q    = document.getElementById('searchInput').value.trim();
        const sp   = document.getElementById('speciesFilter').value;
        const sort = document.getElementById('sortSelect').value;
        if (q)    url.searchParams.set('q', q);           else url.searchParams.delete('q');
        if (sp)   url.searchParams.set('species', sp);    else url.searchParams.delete('species');
        if (sort) url.searchParams.set('sort', sort);     else url.searchParams.delete('sort');
        url.searchParams.delete('page');
        history.replaceState(null, '', url);
        pager.load(list);
      }
    }

    function render(data) {
      const grid = document.getElementById('characterGrid');
      if (!data.length) { grid.innerHTML = ''; return; }

      grid.innerHTML = data.map(c => `
        <a href="character.html?id=${c.id}" class="character-card">
          ${c.is_sensitive && c.image_url ? `
          <div style="position:relative; overflow:hidden; border-radius:var(--radius);">
            <div class="character-img blurred" style="background-image:url('${c.thumbnail_url || c.image_url}'); background-size:cover; background-position:center;"></div>
            <div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${c.sensitive_note ? '<span class="sensitive-overlay-note">' + c.sensitive_note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>
          </div>` : `
          <div class="character-img" ${(c.thumbnail_url || c.image_url) ? `style="background-image:url('${c.thumbnail_url || c.image_url}'); background-size:cover; background-position:center;"` : ''}></div>`}
          <div class="character-info">
            <p class="character-name">${c.name}</p>
            <p class="character-species">${c.species_name || ''}</p>
            <p class="character-owner">소유주: ${(c.owner_user_id && idToNick[c.owner_user_id]) || c.owner_nickname || '—'}</p>
          </div>
        </a>
      `).join('');
    }

    function revealSensitive(overlayEl, e) {
      e.stopPropagation(); e.preventDefault();
      const wrap = overlayEl.parentElement;
      wrap.querySelectorAll('.blurred').forEach(el => el.classList.remove('blurred'));
      overlayEl.remove();
    }

    document.getElementById('searchInput').addEventListener('input', applyFilter);
    document.getElementById('speciesFilter').addEventListener('change', applyFilter);
    document.getElementById('sortSelect').addEventListener('change', applyFilter);

    loadCharacters();
  </script>
</body>
</html>

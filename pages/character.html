<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개체 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div id="charContent">
        <p class="page-loading">불러오는 중...</p>
      </div>

    </main>
  </div>

  <!-- 소유권 이전 모달 -->
  <div id="transferModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:500; align-items:center; justify-content:center; padding:16px;">
    <div style="background:#fff; border-radius:16px; padding:24px; width:min(100%, 380px); max-height:80vh; display:flex; flex-direction:column; gap:14px; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <h3 style="margin:0; font-size:16px; font-weight:700;">소유권 이전</h3>
      <p id="transferInfo" style="margin:0; font-size:13px; color:var(--text-sub);"></p>
      <input type="text" class="form-input" id="transferSearch" placeholder="닉네임으로 검색..." oninput="filterTransferUsers(this.value)" autocomplete="off">
      <div id="transferUserList" style="border:1px solid var(--border); border-radius:10px; max-height:180px; overflow-y:auto; background:#fff;">
        <p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>
      </div>
      <p id="transferSelectedDisplay" style="margin:0; font-size:13px; color:var(--sky-deep); display:none;"></p>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeTransferModal()">취소</button>
        <button class="btn-secondary" id="transferConfirmBtn" onclick="confirmTransfer()">이전하기</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.2</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const charId = new URLSearchParams(window.location.search).get('id');
    let afterDeleteHref = 'species-list.html';

    // 원본 이미지 토글 상태
    let _showingOriginal        = false;
    let _origImgUrl             = null;
    let _wmImgUrl               = null;
    let _origAdditionalUrls     = null;  // original_additional_images (on-demand 로드)

    async function toggleOriginalImage() {
      const btn   = document.getElementById('imgToggleBtn');
      const label = document.getElementById('imgStateLabel');
      const imgEl = document.getElementById('charMainImg');
      if (!imgEl) return;

      if (!_showingOriginal) {
        if (!_origImgUrl) {
          btn.textContent = '불러오는 중...';
          btn.disabled    = true;
          const { data, error } = await sb.from('characters')
            .select('original_image_url, original_additional_images').eq('id', charId).single();
          if (error || !data?.original_image_url) {
            btn.textContent = '원본 이미지 없음';
            return;
          }
          _origImgUrl         = data.original_image_url;
          _origAdditionalUrls = data.original_additional_images || null;
        }
        _wmImgUrl         = imgEl.src;
        imgEl.src         = _origImgUrl;
        label.textContent = '원본 이미지를 보고 있습니다.';
        btn.textContent   = '워터마크 이미지 보기';
        btn.disabled      = false;
        _showingOriginal  = true;

        // 추가 이미지도 원본으로 전환 (original이 있는 인덱스만)
        document.querySelectorAll('[data-extra-idx]').forEach(el => {
          const idx     = parseInt(el.dataset.extraIdx);
          const origUrl = _origAdditionalUrls?.[idx];
          if (origUrl) {
            el.dataset.wmSrc = el.src;
            el.src = origUrl;
          }
        });
      } else {
        imgEl.src         = _wmImgUrl;
        label.textContent = '워터마크 이미지를 보고 있습니다.';
        btn.textContent   = '원본 이미지 보기';
        _showingOriginal  = false;

        // 추가 이미지도 워터마크본으로 복원
        document.querySelectorAll('[data-extra-idx]').forEach(el => {
          if (el.dataset.wmSrc) {
            el.src = el.dataset.wmSrc;
            delete el.dataset.wmSrc;
          }
        });
      }
    }

    // 소유권 이전 모달 상태
    let _siteNicks      = new Set();
    let _nickToId       = {};
    let _idToNick       = {};
    let _charData       = null;
    let _transferToNick = null;

    function openTransferModal() {
      _transferToNick = null;
      document.getElementById('transferInfo').textContent = `현재 소유주: ${_charData.owner_nickname}`;
      document.getElementById('transferSearch').value = '';
      document.getElementById('transferUserList').innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>';
      document.getElementById('transferSelectedDisplay').style.display = 'none';
      document.getElementById('transferConfirmBtn').textContent = '이전하기';
      document.getElementById('transferConfirmBtn').disabled = false;
      document.getElementById('transferModal').style.display = 'flex';
    }

    function closeTransferModal() {
      document.getElementById('transferModal').style.display = 'none';
    }

    function filterTransferUsers(q) {
      const el = document.getElementById('transferUserList');
      if (!q) {
        el.innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>';
        return;
      }
      const qLow = q.toLowerCase();
      const matched = [..._siteNicks].filter(n => n.toLowerCase().includes(qLow)).slice(0, 20);
      if (!matched.length) {
        el.innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">일치하는 유저가 없어요</p>';
        return;
      }
      el.innerHTML = matched.map(nick => `
        <div onclick="selectTransferUser('${nick.replace(/'/g,"\\'")}');this.parentElement.querySelectorAll('div').forEach(d=>d.style.background='');this.style.background='var(--sky-light)';this.style.fontWeight='600';"
          style="padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--border); transition:background 0.1s;"
          onmouseover="if('${nick.replace(/'/g,"\\'")}' !== (_transferToNick||''))this.style.background='var(--sky-pale)'"
          onmouseout="if('${nick.replace(/'/g,"\\'")}' !== (_transferToNick||''))this.style.background=''">
          ${nick}
        </div>
      `).join('');
    }

    function selectTransferUser(nick) {
      _transferToNick = nick;
      document.getElementById('transferSelectedDisplay').textContent = `선택됨: ${nick}`;
      document.getElementById('transferSelectedDisplay').style.display = 'block';
    }

    async function confirmTransfer() {
      if (!_transferToNick) { alert('이전받을 유저를 선택해주세요.'); return; }
      if (!confirm(`"${_charData.name}"의 소유권을\n${_charData.owner_nickname} → ${_transferToNick}\n으로 이전할까요?`)) return;

      const btn = document.getElementById('transferConfirmBtn');
      btn.textContent = '이전 중...';
      btn.disabled = true;

      const targetUserId = _nickToId[_transferToNick] || null;
      console.log('[소유권 이전] 대상 닉네임:', _transferToNick, '/ UUID:', targetUserId);

      const { data: updated, error } = await sb.from('characters').update({
        owner_nickname:   _transferToNick,
        owner_user_id:    targetUserId,
        owner_is_offsite: false,
        owner_contact:    null,
      }).eq('id', charId).select('id');

      console.log('[소유권 이전] update 결과 — data:', updated, '/ error:', error);

      if (error || !updated?.length) {
        alert('이전에 실패했어요: ' + (error?.message || 'DB에 반영되지 않았어요. Supabase에서 SQL을 먼저 실행했는지 확인해주세요.'));
        btn.textContent = '이전하기';
        btn.disabled = false;
        return;
      }

      await logTransfer({
        character_name: _charData.name,
        species_name:   _charData.species_name || '',
        from_nickname:  _charData.owner_nickname,
        from_user_id:   _charData.owner_user_id || null,
        to_nickname:    _transferToNick,
        to_user_id:     _nickToId[_transferToNick] || null,
        method:         '종족주 소유권이전',
      });

      closeTransferModal();
      window.location.reload();
    }

    function switchCharSection(idx) {
      document.querySelectorAll('#charSecNav .guide-tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
      document.querySelectorAll('#charSecPanels .guide-tab-panel').forEach((p, i) => p.classList.toggle('active', i === idx));
    }

    function revealSensitive(overlayEl, e) {
      e.stopPropagation();
      e.preventDefault();
      const wrap = overlayEl.parentElement;
      wrap.querySelectorAll('.blurred').forEach(el => el.classList.remove('blurred'));
      overlayEl.remove();
    }

    async function cancelPendingTransfer() {
      if (!confirm('이전 요청을 취소할까요?')) return;
      const { error } = await sb.from('characters').update({ pending_transfer: null }).eq('id', charId);
      if (error) { alert('취소에 실패했어요.'); return; }
      window.location.reload();
    }

    async function deleteCharacter() {
      if (!confirm('정말 이 개체를 삭제할까요? 되돌릴 수 없어요.')) return;
      const { error } = await sb.from('characters').delete().eq('id', charId);
      if (error) { alert('삭제에 실패했어요.'); return; }
      window.location.href = afterDeleteHref;
    }

    if (!charId) {
      document.getElementById('charContent').innerHTML = '<p class="page-loading">잘못된 접근이에요.</p>';
    } else {
      loadCharacter();
    }

    async function loadCharacter() {
      const user = await getUser();
      const userNickname = user?.user_metadata?.display_name || user?.user_metadata?.nickname || null;
      const isAdminUser  = isAdminOrStaff(user?.user_metadata?.role);

      // original_image_url 제외 — 권한자가 토글 시 on-demand 조회
      const CHAR_SELECT = 'id,name,species_name,image_url,thumbnail_url,additional_images,owner_nickname,owner_user_id,owner_is_offsite,owner_contact,designer_nickname,designer_contact,char_number,description,owner_description,is_sensitive,sensitive_note,char_sections,custom_field_values,char_categories,allow_free_adoption,allow_resale,allow_paid_adoption,allow_other_adoption,pending_transfer';
      const [{ data: c, error }, { data: siteUserData }] = await Promise.all([
        sb.from('characters').select(CHAR_SELECT).eq('id', charId).single(),
        sb.rpc('get_all_users'),
      ]);

      if (error || !c) {
        document.getElementById('charContent').innerHTML = '<p class="page-loading">개체를 찾을 수 없어요.</p>';
        return;
      }

      const siteNicks = new Set((siteUserData || []).map(u => u.nickname).filter(Boolean));
      _nickToId = Object.fromEntries((siteUserData || []).filter(u => u.nickname && u.id).map(u => [u.nickname, u.id]));
      _idToNick = Object.fromEntries((siteUserData || []).filter(u => u.id && u.nickname).map(u => [u.id, u.nickname]));
      _siteNicks = siteNicks;
      _charData  = c;

      document.title = `${c.name} — 종족연구소`;

      const userId  = user?.id || null;
      const isOwner = !!(userId && c.owner_user_id && userId === c.owner_user_id);

      // 종족 페이지 링크용 species id 조회 + 종족주 판별
      let speciesHref = 'species-list.html';
      let isSpeciesOwner = false;
      let sp = null;
      console.log('[DEBUG] userId:', userId);
      console.log('[DEBUG] c.owner_is_offsite:', c.owner_is_offsite, '| type:', typeof c.owner_is_offsite);
      console.log('[DEBUG] c.owner_user_id:', c.owner_user_id);
      console.log('[DEBUG] c.species_name:', c.species_name);
      if (c.species_name) {
        const { data: spData } = await sb.from('species').select('id, owner_nickname, owner_user_id, allow_free_adoption, allow_resale, allow_paid_adoption, allow_other_adoption, custom_fields').eq('name', c.species_name).single();
        sp = spData;
        console.log('[DEBUG] sp:', sp);
        if (sp) {
          speciesHref = `species.html?id=${sp.id}`;
          isSpeciesOwner = !!(userId && sp.owner_user_id && userId === sp.owner_user_id);
        }
      }
      console.log('[DEBUG] isOwner:', isOwner);
      console.log('[DEBUG] isSpeciesOwner:', isSpeciesOwner);
      console.log('[DEBUG] 버튼 표시 조건:', isOwner || (isSpeciesOwner && c.owner_is_offsite));
      let categoryBadgeHtml = '';
      if (c.char_categories?.length) {
        const badges = c.char_categories.map(cat => {
          const r = parseInt(cat.color.slice(1,3),16), g = parseInt(cat.color.slice(3,5),16), b = parseInt(cat.color.slice(5,7),16);
          const tc = (0.299*r+0.587*g+0.114*b)/255 > 0.5 ? '#000' : '#fff';
          return `<span style="display:inline-block; padding:3px 12px; border-radius:20px; background:${cat.color}; color:${tc}; font-size:12px; font-weight:600;">${cat.label}</span>`;
        }).join('');
        categoryBadgeHtml = `<div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;">${badges}</div>`;
      }
      afterDeleteHref = speciesHref;

      // 관계 섹션에 사용할 상대 캐릭터 정보 미리 로드
      let relationCharsMap = {};
      const relSection = (c.char_sections || []).find(s => s.type === 'relation');
      if (relSection?.relations?.length) {
        const relIds = relSection.relations.map(r => r.char_id).filter(Boolean);
        if (relIds.length) {
          const { data: relChars } = await sb.from('characters').select('id, name, image_url, species_name').in('id', relIds);
          (relChars || []).forEach(rc => { relationCharsMap[rc.id] = rc; });
        }
      }

      const canViewOriginal  = isOwner || isSpeciesOwner; // 소유 관계만 토글 표시
      const autoShowOriginal = isOwner || isSpeciesOwner;

      const registeredDate = new Date(c.created_at).toLocaleDateString('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).replace(/\. /g, '.').replace(/\.$/, '');

      const additionalImgs = (c.additional_images || []).map((url, idx) => `
        <div style="width:100%; border-radius:var(--radius); overflow:hidden; margin-top:10px; ${c.is_sensitive ? 'position:relative;' : ''}">
          <img src="${url}" data-extra-idx="${idx}" class="${c.is_sensitive ? 'blurred' : ''}" style="width:100%; display:block; object-fit:cover;">
          ${c.is_sensitive ? `<div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${c.sensitive_note ? '<span class="sensitive-overlay-note">' + c.sensitive_note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>` : ''}
        </div>
      `).join('');

      const adoptionRulesHtml = [
        { label: '재분양',    charVal: c.allow_resale,         spVal: sp?.allow_resale         },
        { label: '무료분양',  charVal: c.allow_free_adoption,  spVal: sp?.allow_free_adoption  },
        { label: '유료/경매', charVal: c.allow_paid_adoption,  spVal: sp?.allow_paid_adoption  },
        { label: '기타분양',  charVal: c.allow_other_adoption, spVal: sp?.allow_other_adoption },
      ].map(({ label, charVal, spVal }) => {
        const isCharSet = charVal !== null && charVal !== undefined;
        const finalVal  = isCharSet ? charVal : (spVal ?? true);
        const source    = isCharSet ? '개체 개별 설정' : '종족 설정';
        const color     = finalVal ? 'var(--sky-deep)' : '#ef4444';
        return `<div class="char-info-row">
          <span class="char-info-label">${label}</span>
          <span class="char-info-value"><span style="font-weight:600; color:${color};">${finalVal ? '가능' : '불가능'}</span><span style="font-size:11px; color:var(--text-mute); margin-left:4px;">(${source})</span></span>
        </div>`;
      }).join('');

      const ownerDisplayNick = (!c.owner_is_offsite && c.owner_user_id && _idToNick[c.owner_user_id])
        ? _idToNick[c.owner_user_id] : c.owner_nickname;

      document.getElementById('charContent').innerHTML = `
        <div class="char-page-header">
          <div class="breadcrumb">
            ${c.species_name ? `<a href="${speciesHref}">${c.species_name}</a><span>/</span>` : ''}
            <span>${c.name}</span>
          </div>
          <h1 class="char-page-name">${c.name}</h1>
        </div>

        <div class="char-body">
          <div class="char-img-wrap">
            <div class="char-img-area">
              ${c.image_url
                ? (c.is_sensitive
                    ? `<div style="position:relative; overflow:hidden; border-radius:var(--radius);"><img id="charMainImg" src="${c.image_url}" alt="${c.name}" class="blurred" style="width:100%; height:auto; display:block;"><div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${c.sensitive_note ? '<span class="sensitive-overlay-note">' + c.sensitive_note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div></div>`
                    : `<img id="charMainImg" src="${c.image_url}" alt="${c.name}" style="width:100%; height:auto; display:block;">`)
                : ''}
            </div>
            ${canViewOriginal ? `
            <div style="margin-top:8px; text-align:center; font-size:12px; color:var(--text-mute);">
              <span id="imgStateLabel">${autoShowOriginal ? '불러오는 중...' : '워터마크 이미지를 보고 있습니다.'}</span>
              <button id="imgToggleBtn" onclick="toggleOriginalImage()" style="margin-left:6px; background:none; border:none; color:var(--sky-deep); font-size:12px; cursor:pointer; text-decoration:underline; font-family:inherit; padding:0;">${autoShowOriginal ? '' : '원본 이미지 보기'}</button>
            </div>` : ''}
            ${additionalImgs}
          </div>

          <aside class="char-info-panel">
            ${c.pending_transfer ? `
            <div style="padding:10px 14px; background:#fffbeb; border:1px solid #fde68a; border-radius:10px; margin-bottom:12px; font-size:13px; color:#92400e; font-weight:500;">
              이전 확인 중 · <strong>${c.pending_transfer.to}</strong>님에게
            </div>` : ''}
            ${categoryBadgeHtml}
            ${c.species_name ? `
            <div class="char-info-row">
              <span class="char-info-label">종족</span>
              <a href="${speciesHref}" class="char-info-value char-info-link">${c.species_name}</a>
            </div>` : ''}
            ${c.char_number ? `
            <div class="char-info-row">
              <span class="char-info-label">개체번호</span>
              <span class="char-info-value">${c.char_number}</span>
            </div>` : ''}
            ${c.designer_nickname ? `
            <div class="char-info-row">
              <span class="char-info-label">디자이너</span>
              <span class="char-info-value">${siteNicks.has(c.designer_nickname)
                ? `<a href="profile.html?user=${encodeURIComponent(c.designer_nickname)}" style="color:inherit;text-decoration:none;">${c.designer_nickname}</a>`
                : `<span style="display:inline-block;font-size:10px;font-weight:600;color:#555;background:#e8e8e8;border-radius:4px;padding:1px 5px;margin-right:5px;vertical-align:middle;line-height:1.6;">Site-OFF</span>${c.designer_nickname}`
              }${c.designer_contact ? ` <span style="color:var(--text-mute);font-size:12px;">(${c.designer_contact})</span>` : ''}</span>
            </div>` : ''}
            <div class="char-info-row">
              <span class="char-info-label">소유주</span>
              <span class="char-info-value">${c.owner_nickname
                ? (c.owner_is_offsite
                    ? `${isSpeciesOwner ? `<button onclick="openTransferModal()" style="flex-shrink:0;font-size:12px;font-weight:700;color:var(--sky-deep);background:var(--sky-light);border:1px solid var(--sky);border-radius:6px;padding:5px 14px;cursor:pointer;font-family:inherit;margin-right:6px;vertical-align:middle;">소유권 이전</button>` : ''}<span style="display:inline-block;font-size:10px;font-weight:600;color:#555;background:#e8e8e8;border-radius:4px;padding:1px 5px;margin-right:5px;vertical-align:middle;line-height:1.6;">Site-OFF</span>${c.owner_nickname}`
                    : (c.owner_user_id
                        ? `<a href="profile.html?user=${encodeURIComponent(ownerDisplayNick)}" style="color:inherit;text-decoration:none;">${ownerDisplayNick}</a>`
                        : `${ownerDisplayNick}`))
                : '—'
              }${c.owner_contact ? ` <span style="color:var(--text-mute);font-size:12px;">(${c.owner_contact})</span>` : ''}</span>
            </div>
            <div class="char-info-row">
              <span class="char-info-label">등록일</span>
              <span class="char-info-value">${registeredDate}</span>
            </div>

            <div class="char-info-divider"></div>
            <p class="char-info-label" style="margin-bottom:6px; font-weight:700;">📜 분양 규칙</p>
            ${adoptionRulesHtml}

            ${c.description ? `
            <div class="char-info-divider"></div>
            <p class="char-info-desc">${c.description}</p>` : ''}

            ${c.owner_description ? `
            <div class="char-info-divider"></div>
            <p class="char-info-desc">${c.owner_description}</p>` : ''}

            ${(() => {
              if (!c.custom_field_values) return '';
              const validKeys = Array.isArray(sp?.custom_fields) && sp.custom_fields.length
                ? sp.custom_fields
                : Object.keys(c.custom_field_values);
              const rows = validKeys
                .filter(k => c.custom_field_values[k])
                .map(k => `
                  <div class="char-info-row">
                    <span class="char-info-label">${k}</span>
                    <span class="char-info-value">${c.custom_field_values[k]}</span>
                  </div>`).join('');
              return rows ? `<div class="char-info-divider"></div>${rows}` : '';
            })()}

            ${isOwner || isSpeciesOwner ? `
            <div class="char-info-divider"></div>
            <div style="display:flex; justify-content:${isOwner ? 'space-between' : 'flex-end'}; align-items:center;">
              ${isOwner ? `<button onclick="deleteCharacter()" style="padding:8px 16px; border:1px solid #fca5a5; border-radius:8px; background:#fff; color:#ef4444; font-size:13px; cursor:pointer; font-family:inherit;">개체 삭제</button>` : ''}
              <div style="display:flex; gap:8px;">
                ${isOwner ? (c.pending_transfer
                  ? `<button onclick="cancelPendingTransfer()" style="padding:6px 14px; border:1px solid #fde68a; border-radius:8px; background:#fffbeb; color:#92400e; font-size:13px; cursor:pointer;">이전 취소</button>`
                  : `<a href="character-transfer.html?id=${charId}" class="btn-ghost">개체 이전</a>`)
                  : ''}
                ${isSpeciesOwner && c.owner_is_offsite ? `<button onclick="openTransferModal()" class="btn-ghost">소유권 이전</button>` : ''}
                <a href="character-edit.html?id=${charId}" class="btn-ghost">개체 정보 수정</a>
              </div>
            </div>` : ''}
          </aside>
        </div>

        ${c.char_sections?.length ? `
        <div class="char-sections">
          <div class="guide-tabs">
            <div class="guide-tab-nav" id="charSecNav">
              ${c.char_sections.map((s, i) => `
                <button class="guide-tab-btn${i === 0 ? ' active' : ''}" onclick="switchCharSection(${i})">
                  ${s.type === 'settings' ? '설정' : s.type === 'relation' ? '관계' : (s.title || '직접입력')}
                </button>`).join('')}
            </div>
            <div class="guide-tab-panels" id="charSecPanels">
              ${c.char_sections.map((s, i) => {
                let inner = '';
                if (s.type === 'settings') {
                  inner = `<div class="guide-section-text ql-display">${typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(s.content || '') : (s.content || '')}</div>`;
                } else if (s.type === 'relation') {
                  const makeAvatar = (imgUrl, name) => imgUrl
                    ? `<img src="${imgUrl}" class="relation-avatar" alt="${name}">`
                    : `<div class="relation-avatar-placeholder">${(name||'?')[0]}</div>`;
                  inner = (s.relations || []).length
                    ? s.relations.map(r => {
                        const rc = relationCharsMap[r.char_id] || {};
                        return `
                        <div class="relation-card">
                          <div class="relation-card-duo">
                            <div class="relation-char-side">
                              ${makeAvatar(c.image_url, c.name)}
                              <span class="relation-char-name">${c.name}</span>
                              <span class="relation-char-species">${c.species_name || ''}</span>
                            </div>
                            <div class="relation-center">
                              ${r.relation_label ? `<span class="relation-type-badge">${r.relation_label}</span>` : ''}
                              <span class="relation-arrows">↔</span>
                            </div>
                            <div class="relation-char-side relation-char-side--right">
                              ${makeAvatar(rc.image_url, r.char_name)}
                              <a href="character.html?id=${r.char_id}" class="relation-char-name">${r.char_name}</a>
                              <span class="relation-char-species">${r.species_name || ''}</span>
                            </div>
                          </div>
                          ${r.description ? `<div class="relation-card-desc ql-display">${typeof DOMPurify!=='undefined' ? DOMPurify.sanitize(r.description) : r.description}</div>` : ''}
                        </div>`;
                      }).join('')
                    : '<p style="color:var(--text-mute);font-size:13px;">등록된 관계가 없어요.</p>';
                } else {
                  inner = `<div class="guide-section-text ql-display">${typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(s.content || '') : (s.content || '')}</div>`;
                }
                return `<div class="guide-tab-panel${i === 0 ? ' active' : ''}">${inner}</div>`;
              }).join('')}
            </div>
          </div>
        </div>` : ''}
      `;

      // 본인 소유/종족 개체는 원본 이미지를 기본으로 표시
      if (autoShowOriginal) {
        toggleOriginalImage();
      }

      if (charId === '30') {
        const _v = await window.incrementAchCounter?.('gong_o_visit') || 0;
        if (_v >= 1)   window.awardAchievement?.('gong_o_visit_1');
        if (_v >= 5)   window.awardAchievement?.('gong_o_visit_5');
        if (_v >= 20)  window.awardAchievement?.('gong_o_visit_20');
        if (_v >= 100) window.awardAchievement?.('gong_o_visit_100');
      }
    }
  </script>
</body>
</html>

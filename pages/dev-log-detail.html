<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개발일지 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .notice-detail-content .ql-align-center  { text-align: center; }
    .notice-detail-content .ql-align-right   { text-align: right; }
    .notice-detail-content .ql-align-justify { text-align: justify; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <!-- 상단 네비 -->
        <div class="notice-detail-nav">
          <span id="navCount" class="notice-nav-count"></span>
          <a href="dev-log.html" class="notice-nav-list-btn">목록보기</a>
        </div>

        <!-- 본문 -->
        <article class="notice-detail-article">

          <div>
            <div id="detailPin"></div>
            <h1 id="detailTitle" class="notice-detail-title"></h1>
            <div class="notice-detail-meta">
              <span id="detailAuthor"></span>
              <span class="notice-detail-sep">·</span>
              <span id="detailDate"></span>
            </div>
          </div>

          <div class="notice-detail-divider"></div>

          <div id="detailContent" class="notice-detail-content"></div>

        </article>

        <!-- 관리자 수정/삭제 버튼 -->
        <div id="adminActions" style="display:none; margin-top:16px; display:none; justify-content:flex-end; gap:8px;">
          <a id="editBtn" href="#" class="btn-ghost">수정</a>
          <button onclick="deleteNote()" style="padding:8px 16px; border:1px solid #fca5a5; border-radius:8px; background:#fff; color:#ef4444; font-size:13px; cursor:pointer; font-family:inherit;">삭제</button>
        </div>

        <!-- 하단 목록 버튼 -->
        <div class="notice-detail-bottom">
          <a href="dev-log.html" class="btn-ghost">← 목록으로</a>
        </div>

      </div>

    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; <a href="credits.html">운영진</a> &nbsp;·&nbsp; ver.2.0</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const noteId = params.get('id');

    async function initPage() {
      if (!noteId) { window.location.href = 'dev-log.html'; return; }

      const [{ data, error }, { count }, userResult] = await Promise.all([
        sb.from('dev_logs').select('*').eq('id', noteId).single(),
        sb.from('dev_logs').select('*', { count: 'exact', head: true }),
        getUser(),
      ]);

      if (error || !data) { window.location.href = 'dev-log.html'; return; }

      const user = userResult;

      document.title = `${data.title} — 종족연구소`;

      if (count) {
        document.getElementById('navCount').textContent = `개발일지 총 ${count}개`;
      }

      if (data.is_pinned) {
        document.getElementById('detailPin').innerHTML =
          '<span class="notice-pin" style="display:inline-block; margin-bottom:10px;">고정</span>';
      }

      document.getElementById('detailTitle').textContent = data.title;
      document.getElementById('detailAuthor').textContent = data.author || '관리자';

      const date = new Date(data.created_at).toLocaleDateString('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).replace(/\. /g, '.').replace(/\.$/, '');
      document.getElementById('detailDate').textContent = date;

      document.getElementById('detailContent').innerHTML = DOMPurify.sanitize(data.content);

      if (isAdminOrStaff(user?.user_metadata?.role)) {
        const actions = document.getElementById('adminActions');
        document.getElementById('editBtn').href = `dev-log-write.html?edit=${noteId}`;
        actions.style.display = 'flex';
      }

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';

      window.awardAchievement?.('first_dev_log');
    }

    async function deleteNote() {
      if (!confirm('이 개발일지를 삭제할까요?')) return;
      const { error } = await sb.from('dev_logs').delete().eq('id', noteId);
      if (error) { alert('삭제에 실패했어요: ' + error.message); return; }
      window.location.href = 'dev-log.html';
    }

    initPage();
  </script>
</body>
</html>

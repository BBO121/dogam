<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가이드 작성 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    .quill-wrap .ql-toolbar {
      border-radius: 9px 9px 0 0;
      border: 1.5px solid var(--border);
      border-bottom: none;
      font-family: inherit;
    }
    .quill-wrap .ql-toolbar:focus-within,
    .quill-wrap:focus-within .ql-toolbar { border-color: var(--sky); }
    .quill-wrap .ql-container {
      border-radius: 0 0 9px 9px;
      border: 1.5px solid var(--border);
      min-height: 240px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.7;
    }
    .quill-wrap:focus-within .ql-container { border-color: var(--sky); }
    .quill-wrap .ql-editor { min-height: 240px; }
    .quill-wrap .ql-editor.ql-blank::before { color: #CBD5E1; font-style: normal; }
    .ql-snow .ql-picker.ql-size .ql-picker-label::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item::before { content: '보통'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="12px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="12px"]::before { content: '작게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="14px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="14px"]::before { content: '조금 작게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="18px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="18px"]::before { content: '조금 크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="20px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="20px"]::before { content: '크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="24px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="24px"]::before { content: '더 크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="28px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="28px"]::before { content: '제목 크기'; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="register-wrap">

        <div class="breadcrumb" style="margin-bottom: 24px;">
          <a href="index.html">홈</a>
          <span>/</span>
          <a href="guide.html">가이드</a>
          <span>/</span>
          <span>작성</span>
        </div>

        <h1 class="register-title">가이드 작성</h1>

        <form class="register-form" id="guideForm">

          <div class="form-group">
            <label class="notice-pin-label">
              <input type="checkbox" id="isPinned" class="notice-pin-check">
              <span>상단 고정</span>
            </label>
            <p class="form-hint">체크하면 가이드 목록 최상단에 고정돼요</p>
          </div>

          <div class="form-group">
            <label class="form-label">제목 <span class="required">*</span></label>
            <input type="text" id="guideTitle" class="form-input" placeholder="가이드 제목을 입력하세요">
          </div>

          <div class="form-group">
            <label class="form-label">내용 <span class="required">*</span></label>
            <div class="quill-wrap">
              <div id="guideContentEditor"></div>
            </div>
          </div>

          <p class="auth-error" id="writeError"></p>

          <div class="register-actions">
            <a href="guide.html" class="btn-ghost">취소</a>
            <button type="submit" class="btn-secondary" id="submitBtn">등록하기</button>
          </div>

        </form>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const SizeStyle = Quill.import('attributors/style/size');
    SizeStyle.whitelist = ['12px', '14px', '16px', '18px', '20px', '24px', '28px'];
    Quill.register(SizeStyle, true);

    const quill = new Quill('#guideContentEditor', {
      theme: 'snow',
      placeholder: '가이드 내용을 입력하세요',
      modules: {
        toolbar: [
          [{ size: ['12px', '14px', false, '18px', '20px', '24px', '28px'] }],
          ['bold', 'italic', 'underline'],
          [{ color: [] }],
          [{ align: [] }],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['link', 'clean'],
        ],
      },
    });

    async function initPage() {
      const user = await getUser();
      if (!user || user.user_metadata?.role !== 'admin') {
        window.location.href = 'index.html';
        return;
      }
    }

    document.getElementById('guideForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title    = document.getElementById('guideTitle').value.trim();
      const content  = quill.root.innerHTML.trim();
      const isEmpty  = quill.getText().trim().length === 0;
      const isPinned = document.getElementById('isPinned').checked;
      const errorEl  = document.getElementById('writeError');
      const btn      = document.getElementById('submitBtn');

      errorEl.textContent = '';

      if (!title)   { errorEl.textContent = '제목을 입력해주세요.'; return; }
      if (isEmpty)  { errorEl.textContent = '내용을 입력해주세요.'; return; }

      btn.textContent = '등록 중...';
      btn.disabled = true;

      const user = await getUser();
      const { error } = await sb.from('guides').insert({
        title,
        content,
        is_pinned: isPinned,
        author: user?.user_metadata?.nickname || '관리자',
      });

      if (error) {
        console.error('[guide insert error]', error);
        errorEl.textContent = `등록에 실패했어요. (${error.message})`;
        btn.textContent = '등록하기';
        btn.disabled = false;
        return;
      }

      window.location.href = 'guide.html';
    });

    initPage();
  </script>
</body>
</html>

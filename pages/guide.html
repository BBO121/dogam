     [ 블록 타입 ]

     │                                                         │
     │ { type: 'terms',                                        │

     │   → 용어 카드 목록.                                      │
     │                                                         │
     │ { type: 'tip',                                          │
     │   title: '박스 제목 (선택)',                              │
     │   text: '본문 (선택)',                                    │
     │   items: ['항목1', '항목2', ...] }                       │

     │                                                         │
     │ { type: 'warn', text: '...' }                           │
     │   → 노란 경고 박스.                                      │
     │                                                         │
     │ { type: 'faq',                                          │

  ============================================================ */

  /* ============================================================
     렌더링 (수정 불필요)
  ============================================================ */

  function renderBlock(block) {
    switch (block.type) {

      case 'paragraph':
        return `<p>${block.text}</p>`;

      case 'image':
        return `
          <figure class="guide-static-figure">
            <img src="${block.src}" alt="${block.alt || ''}" class="guide-static-img" loading="lazy">
            ${block.caption ? `<figcaption class="guide-static-caption">${block.caption}</figcaption>` : ''}
          </figure>`;

      case 'terms':
        return `
          <div class="guide-static-term-list">
            ${block.items.map(item => `
              <div class="guide-static-term-item">
                <span class="guide-static-term-label">${item.label}</span>
                <span class="guide-static-term-desc">${item.desc}</span>
              </div>`).join('')}
          </div>`;

      case 'tip':
        return `
          <div class="guide-static-tip">
            ${block.title ? `<strong>${block.title}</strong>` : ''}
            ${block.text  ? `<p>${block.text}</p>` : ''}
            ${block.items ? `<ul>${block.items.map(i => `<li>${i}</li>`).join('')}</ul>` : ''}
          </div>`;

      case 'warn':
        return `<div class="guide-static-tip guide-static-tip--warn">${block.text}</div>`;

      case 'faq':
        return `
          <div class="guide-static-faq-list">
            ${block.items.map(item => `
              <details class="guide-static-faq-item">
                <summary class="guide-static-faq-q">${item.q}</summary>
                <p class="guide-static-faq-a">${item.a}</p>
              </details>`).join('')}
          </div>`;

      default:
        return '';
    }
  }

  function renderGuide() {
    document.getElementById('guideToc').innerHTML =
      guideSections.map(s =>
        `<a href="#${s.id}" class="guide-static-toc-item">${s.title}</a>`
      ).join('');

    document.getElementById('guideBody').innerHTML =
      guideSections.map((s, i) => `
        <section id="${s.id}" class="guide-static-section${i === 0 ? ' guide-static-section--first' : ''}">
          <div class="guide-static-section-header">
            <span class="guide-static-section-num">${s.number}</span>
            <h2 class="guide-static-section-title">${s.title}</h2>
          </div>
          <div class="guide-static-section-content">
            ${s.blocks.map(renderBlock).join('')}
          </div>
        </section>`
      ).join('');
  }

  renderGuide();
  window.awardAchievement?.('first_guide');

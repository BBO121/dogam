<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="../images/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종족 연구소 (Species Lab)</title>

  <!-- SEO -->
  <meta name="description" content="종족과 개체를 기록하고 관리하는 아카이브">

  <!-- Open Graph (카카오톡, 디스코드, 페이스북 등) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bbo121.github.io/dogam/">
  <meta property="og:title" content="종족 연구소 (Species Lab)">
  <meta property="og:description" content="종족과 개체를 기록하고 관리하는 아카이브">
  <meta property="og:image" content="https://bbo121.github.io/dogam/images/og-thumbnail.jpg">
  <meta property="og:locale" content="ko_KR">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="종족 연구소 (Species Lab)">
  <meta name="twitter:description" content="종족과 개체를 기록하고 관리하는 아카이브">
  <meta name="twitter:image" content="https://bbo121.github.io/dogam/images/og-thumbnail.jpg">

  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
        
      </nav>
    </div>
  </header>

  <!-- 상단 이벤트 배너 -->
  <div class="top-banner" id="topBanner" style="display:none;">
    <ul class="banner-list" id="bannerList"></ul>
    <button class="close-btn"><i class="ico ico-close"></i></button>
  </div>


  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <!-- 메인 콘텐츠 -->
    <main class="main">

      <!-- 검색 -->
      <div class="search-wrap">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="개체, 종족, 유저 검색..."
            autocomplete="off"
          >
          <svg class="search-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
            <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <ul class="search-dropdown" id="searchDropdown"></ul>
        </div>
      </div>

      <!-- 공지/업데이트 바 묶음 -->
      <div style="display:flex; flex-direction:column; gap:3px; margin-bottom:16px;">
        <div class="notice-bar" id="noticeBar" style="display:none; margin-bottom:0;">
          <span class="notice-bar-label">공지</span>
          <a class="notice-bar-title" id="noticeBarTitle" href="notice.html"></a>
          <a class="notice-bar-more" href="notice.html">전체보기 ›</a>
        </div>
        <div id="updateNoteBar"></div>
      </div>

      <!-- 종족 섹션 -->
      <section class="section">
        <div class="section-header">
          <h2>종족</h2>
          <a href="species-list.html" class="btn-more">전체보기</a>
        </div>
        <div class="species-grid" id="speciesGrid">
          <p class="page-loading" id="speciesLoading" style="padding:20px 0;">불러오는 중...</p>
        </div>
      </section>

      <!-- 분양 섹션 -->
      <section class="section">
        <div class="section-header">
          <h2>분양</h2>
          <a href="adoption.html" class="btn-more">전체보기</a>
        </div>
        <div class="adoption-grid" id="adoptionGrid">
          <p class="page-loading" id="adoptionLoading" style="padding:20px 0;">불러오는 중...</p>
        </div>
        <p id="adoptionEmpty" style="display:none; color:var(--text-mute); font-size:14px; padding:20px 0;">등록된 분양 글이 없어요.</p>
      </section>

    </main>
  </div>

  <!-- 푸터 -->
  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; <a href="credits.html">운영진</a> &nbsp;·&nbsp; ver.2.1</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const TYPE_LABEL = { free: '무료', paid: '유료', auction: '경매', etc: '기타' };
    const TYPE_CLASS  = { free: 'adoption-type--free', paid: 'adoption-type--paid', auction: 'adoption-type--auction', etc: 'adoption-type--paid' };

    async function loadIndex() {
      const [
        { data: speciesList },
        { data: adoptionList },
        { data: noticeList },
        { data: updateNoteList },
      ] = await Promise.all([
        sb.from('species').select('id, name, image_url, is_sensitive, sensitive_note').order('created_at', { ascending: false }).limit(18),
        sb.from('adoptions').select('id, character_name, species_name, adoption_type, status, image_url, thumbnail_url, characters(is_sensitive, sensitive_note)').or('status.is.null,status.neq.완료').order('created_at', { ascending: false }).limit(8),
        sb.from('notices').select('id, title').order('is_pinned', { ascending: false }).order('created_at', { ascending: false }).limit(1),
        sb.from('update_notes').select('id, title').eq('is_pinned', true).order('created_at', { ascending: false }).limit(2),
      ]);

      // 공지 바 렌더
      if (noticeList && noticeList.length > 0) {
        const bar = document.getElementById('noticeBar');
        const titleEl = document.getElementById('noticeBarTitle');
        titleEl.textContent = noticeList[0].title;
        titleEl.href = `notice-detail.html?id=${noticeList[0].id}`;
        bar.style.display = 'flex';
      }

      // 업데이트노트 바 렌더
      if (updateNoteList && updateNoteList.length > 0) {
        document.getElementById('updateNoteBar').innerHTML = updateNoteList.map((n, i) => `
          <div class="notice-bar" style="display:flex; margin-bottom:0;">
            <span class="notice-bar-label">업데이트</span>
            <a class="notice-bar-title" href="update-note-detail.html?id=${n.id}">${n.title}</a>
            ${i === 0 ? `<a class="notice-bar-more" href="update-note.html">전체보기 ›</a>` : ''}
          </div>
        `).join('');
      }

      // 종족 렌더
      const speciesGrid    = document.getElementById('speciesGrid');
      const speciesLoading = document.getElementById('speciesLoading');
      speciesLoading.remove();

      if (!speciesList || speciesList.length === 0) {
        speciesGrid.innerHTML = '<p style="color:var(--text-mute);font-size:14px;padding:20px 0;">등록된 종족이 없어요.</p>';
      } else {
        speciesGrid.innerHTML = speciesList.map(s => `
          <a href="species.html?id=${s.id}" class="species-card">
            ${s.is_sensitive && s.image_url ? `
            <div style="position:relative; overflow:hidden; border-radius:var(--radius);">
              <div class="species-img blurred" style="background-image:url('${s.image_url}');background-size:cover;background-position:center;"></div>
              <div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${s.sensitive_note ? '<span class="sensitive-overlay-note">' + s.sensitive_note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>
            </div>` : `
            <div class="species-img"${s.image_url ? ` style="background-image:url('${s.image_url}');background-size:cover;background-position:center;"` : ''}></div>`}
            <div class="species-info">
              <p class="species-name">${s.name}</p>
            </div>
          </a>
        `).join('');

        function revealSensitive(overlayEl, e) {
          e.stopPropagation(); e.preventDefault();
          const wrap = overlayEl.parentElement;
          wrap.querySelectorAll('.blurred').forEach(el => el.classList.remove('blurred'));
          overlayEl.remove();
        }

        function buildSensitiveOverlay(note) {
          return `<div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${note ? '<span class="sensitive-overlay-note">' + note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>`;
        }

2      }

      // 분양 렌더
      document.getElementById('adoptionLoading').remove();

      if (!adoptionList || adoptionList.length === 0) {
        document.getElementById('adoptionEmpty').style.display = 'block';
      } else {
        document.getElementById('adoptionGrid').innerHTML = adoptionList.map(a => {
          const isSensitive   = a.characters?.is_sensitive === true;
          const sensitiveNote = a.characters?.sensitive_note || null;
          const typeLabel = TYPE_LABEL[a.adoption_type] || '';
          const typeClass = TYPE_CLASS[a.adoption_type] || '';
          const closed    = a.status === '완료';

          const cardImg = a.thumbnail_url || a.image_url;
          const stamp = closed ? `<img src="../images/adoption-complete.png" class="adoption-stamp" alt="분양완료">` : '';
          let cardImgHtml;
          if (isSensitive && cardImg) {
            cardImgHtml = `<div class="adoption-card-img"><div style="position:absolute;inset:0;background-image:url('${cardImg}');background-size:cover;background-position:center;" class="blurred"></div>${buildSensitiveOverlay(sensitiveNote)}</div>`;
          } else {
            const imgStyle = cardImg ? `background-image:url('${cardImg}');background-size:cover;background-position:center;` : '';
            cardImgHtml = `<div class="adoption-card-img" style="${imgStyle}"></div>`;
          }

          return `
            <a class="adoption-card${closed ? ' adoption-card--closed' : ''}" href="adoption-detail.html?id=${a.id}">
              ${cardImgHtml}
              ${stamp}
              <div class="adoption-card-info">
                <div class="adoption-card-badges">
                  <span class="adoption-type-badge ${typeClass}">${typeLabel}</span>
                  <span class="adoption-status ${closed ? 'adoption-status--closed' : ''}">${a.status || '분양중'}</span>
                </div>
                <p class="adoption-card-charname">${a.character_name || '—'}</p>
                <p class="adoption-card-species">${a.species_name || '—'}</p>
              </div>
            </a>
          `;
        }).join('');
      }
    }

    loadIndex();

    // ── 상단 이벤트 배너 (롤링 티커) ──────────────────
    const BANNER_ROLL_INTERVAL = 4000;
    const EVENT_BANNER_HIDE_UNTIL_KEY = 'eventBannerHiddenUntil';
    const EVENT_BANNER_HIDE_IDS_KEY   = 'eventBannerHiddenIds';
    let currentBannerIds = [];

    // 다음 KST(UTC+9) 자정의 실제 epoch(ms) 타임스탬프
    function getNextKstMidnightMs() {
      const KST_OFFSET_MS = 9 * 60 * 60 * 1000;
      const shifted = new Date(Date.now() + KST_OFFSET_MS);
      const nextMidnightShifted = Date.UTC(
        shifted.getUTCFullYear(),
        shifted.getUTCMonth(),
        shifted.getUTCDate() + 1,
        0, 0, 0
      );
      return nextMidnightShifted - KST_OFFSET_MS;
    }

    function readHiddenBannerState() {
      try {
        const until = Number(localStorage.getItem(EVENT_BANNER_HIDE_UNTIL_KEY));
        return {
          until: Number.isFinite(until) ? until : 0,
          ids: localStorage.getItem(EVENT_BANNER_HIDE_IDS_KEY) || '',
        };
      } catch {
        return { until: 0, ids: '' };
      }
    }

    function clearHiddenBannerState() {
      try {
        localStorage.removeItem(EVENT_BANNER_HIDE_UNTIL_KEY);
        localStorage.removeItem(EVENT_BANNER_HIDE_IDS_KEY);
      } catch {}
    }

    function saveHiddenBannerState(ids) {
      try {
        localStorage.setItem(EVENT_BANNER_HIDE_UNTIL_KEY, String(getNextKstMidnightMs()));
        localStorage.setItem(EVENT_BANNER_HIDE_IDS_KEY, ids.join(','));
      } catch {}
    }

    function bannerHref(b) {
      if (b.link_url) return b.link_url;
      if (b.event_id) return `event-detail.html?id=${b.event_id}`;
      return null; // 연결안함 — 클릭 비활성화
    }

    function buildBannerMarqueeItem(banner, hasLink) {
      const item = document.createElement('span');
      item.className = 'banner-marquee-item';

      const mainText = document.createElement('span');
      mainText.className = 'banner-main-text';
      mainText.textContent = banner.text;
      item.appendChild(mainText);

      // 연결이 없으면 show_cta가 true여도 CTA를 표시하지 않음
      if (banner.show_cta && hasLink) {
        const cta = document.createElement('span');
        cta.className = 'banner-cta';
        cta.textContent = banner.cta_text || '자세히 보기 ▶';
        item.appendChild(cta);
      }

      return item;
    }

    function applyBannerMarquee(link, track) {
      // 이전에 붙였던 복제본 제거 후 원본 1벌 폭으로 재측정
      while (track.children.length > 1) track.removeChild(track.lastChild);
      track.classList.remove('banner-marquee');

      // 문구가 배너 폭보다 길 때만 marquee 적용 (모바일 CSS에서만 실제로 흐름)
      if (track.scrollWidth > link.clientWidth) {
        track.classList.add('banner-marquee');
        // 뉴스 티커처럼 공백 없이 이어지도록 동일 문구를 1벌 더 복제
        track.appendChild(track.firstChild.cloneNode(true));
      }
    }

    function renderBannerItem(bannerList, banner, animate) {
      const li = document.createElement('li');
      if (animate) li.classList.add('banner-rolling');

      const href = bannerHref(banner);
      const hasLink = !!href;
      // 연결이 없으면 클릭 불가능한 span으로, 있으면 a로 렌더링
      const wrapper = document.createElement(hasLink ? 'a' : 'span');
      if (hasLink) wrapper.href = href;
      wrapper.className = 'banner-link';

      const track = document.createElement('span');
      track.className = 'banner-track';
      track.appendChild(buildBannerMarqueeItem(banner, hasLink));

      wrapper.appendChild(track);
      li.appendChild(wrapper);
      bannerList.innerHTML = '';
      bannerList.appendChild(li);

      requestAnimationFrame(() => applyBannerMarquee(wrapper, track));
    }

    async function initEventBanner() {
      const topBanner  = document.getElementById('topBanner');
      const bannerList = document.getElementById('bannerList');

      const { data, error } = await sb
        .from('event_banners')
        .select('*')
        .eq('is_active', true)
        .order('sort_order', { ascending: true })
        .order('created_at', { ascending: false });

      if (error || !data) return;

      const nowMs = Date.now();
      const banners = data.filter(b => {
        if (b.starts_at && new Date(b.starts_at).getTime() > nowMs) return false;
        if (b.ends_at && new Date(b.ends_at).getTime() < nowMs) return false;
        return true;
      });

      if (banners.length === 0) return;

      currentBannerIds = banners.map(b => b.id);

      const hidden = readHiddenBannerState();
      const idsMatch = hidden.ids === currentBannerIds.join(',');
      if (hidden.until && nowMs < hidden.until && idsMatch) {
        return; // 사용자가 오늘 숨김 처리했고, 그 사이 배너 구성도 안 바뀜
      }
      if (hidden.until) clearHiddenBannerState(); // 만료됐거나 배너 구성이 바뀌었으면 정리

      topBanner.style.display = 'flex';
      let idx = 0;
      renderBannerItem(bannerList, banners[idx], false);

      if (banners.length > 1) {
        setInterval(() => {
          idx = (idx + 1) % banners.length;
          renderBannerItem(bannerList, banners[idx], true);
        }, BANNER_ROLL_INTERVAL);
      }
    }

    initEventBanner();

    // 창 크기/orientation 변경 시 marquee 재판정
    window.addEventListener('resize', () => {
      const link = document.querySelector('#bannerList .banner-link');
      const track = link?.querySelector('.banner-track');
      if (link && track) applyBannerMarquee(link, track);
    });

    // 배너 닫기 기능
    const closeBtn = document.querySelector('.close-btn');
    const topBannerEl = document.getElementById('topBanner');

    closeBtn.addEventListener('click', () => {
      topBannerEl.classList.add('hidden');
      saveHiddenBannerState(currentBannerIds);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="../images/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 분양 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div class="list-page-header">
          <div>
            <h1 class="list-page-title">내 분양</h1>
            <p class="list-page-count"><span id="adoptionCount">0</span>개의 분양 내역</p>
          </div>
          <a href="adoption-write.html" class="btn-secondary" id="writeBtn" style="display:none;">글 작성</a>
        </div>

        <div id="adoptionList"></div>
        <div id="paginationWrap"></div>

        <div id="emptyState" class="empty-state-wrap" style="display:none;">
          <div class="empty-state-icon">🐾</div>
          <p class="empty-state-title">분양 내역이 없어요</p>
          <p class="empty-state-desc">아직 등록한 분양 글이 없어요.</p>
        </div>

      </div>

    </main>
  </div>

  <footer class="footer"><p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; <a href="credits.html">운영진</a> &nbsp;·&nbsp; ver.2.1</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const TYPE_LABEL  = { free: '무료', paid: '유료', auction: '경매', etc: '기타' };
    const TYPE_CLASS  = { free: 'adoption-type--free', paid: 'adoption-type--paid', auction: 'adoption-type--auction', etc: 'adoption-type--paid' };
    const FREE_SUB    = { random: '랜덤 추첨', first_come: '선착순' };

    async function initPage() {
      const user = await getUser();
      if (!user) { window.location.href = 'login.html'; return; }

      const role = user.user_metadata?.role;

      if (role === 'species_owner' || isAdminOrStaff(role)) {
        document.getElementById('writeBtn').style.display = 'inline-flex';
      }

      const { data, error } = await sb
        .from('adoptions')
        .select('*')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';

      if (error || !data || data.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      document.getElementById('adoptionCount').textContent = data.length;
      pager.load(data);
    }

    function renderList(list) {
      const container = document.getElementById('adoptionList');
      container.innerHTML = list.map(a => {
        const isClosed   = a.status === '완료';
        const typeLabel  = TYPE_LABEL[a.adoption_type] || '';
        const typeClass  = TYPE_CLASS[a.adoption_type] || '';
        const freeSub    = a.free_type ? FREE_SUB[a.free_type] : '';
        const imgStyle   = a.image_url
          ? `background-image:url('${a.image_url}');background-size:cover;background-position:center;`
          : '';

        const date = new Date(a.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');

        const winnerInfo = (a.winner_name && (a.status === '완료' || a.status === '확인 대기중'))
          ? `<span style="font-size:12px; color:var(--sky-deep); font-weight:600;">
               ${a.status === '완료' ? '분양 완료 → ' : '확인 대기 → '}${a.winner_name}
             </span>`
          : '';

        return `
          <a href="adoption-detail.html?id=${a.id}"
            style="display:flex; align-items:center; gap:14px; padding:14px 16px;
                   border:1px solid var(--border); border-radius:var(--radius);
                   background:#fff; margin-bottom:10px; text-decoration:none;
                   ${isClosed ? 'opacity:0.6;' : ''}">
            <div style="width:56px; height:56px; border-radius:8px; flex-shrink:0;
                        background:var(--bg-sub); ${imgStyle}"></div>
            <div style="flex:1; min-width:0;">
              <div style="display:flex; align-items:center; gap:6px; margin-bottom:4px; flex-wrap:wrap;">
                <span class="adoption-type-badge ${typeClass}" style="font-size:11px; padding:2px 8px;">${typeLabel}${freeSub ? ' · ' + freeSub : ''}</span>
                <span class="adoption-status${isClosed ? ' adoption-status--closed' : a.status === '확인 대기중' ? ' adoption-status--pending' : ''}" style="font-size:11px;">${a.status || '분양중'}</span>
              </div>
              <p style="font-size:14px; font-weight:600; color:var(--text); margin:0 0 2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${a.character_name || '—'}</p>
              <p style="font-size:12px; color:var(--text-sub); margin:0 0 2px;">${a.species_name || ''}</p>
              ${winnerInfo}
            </div>
            <div style="font-size:12px; color:var(--text-mute); white-space:nowrap; flex-shrink:0;">${date}</div>
          </a>
        `;
      }).join('');
    }

    const pager = createPager(renderList);

    initPage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 캐릭터 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <!-- 메인 콘텐츠 -->
    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div class="list-page-header">
          <div>
            <h1 class="list-page-title">내 캐릭터</h1>
            <p class="list-page-count"><span id="charCount">0</span>개의 개체</p>
          </div>
        </div>

        <!-- 필터 -->
        <div class="list-controls">
          <input
            type="text"
            id="filterInput"
            class="list-search"
            placeholder="이름으로 검색..."
            oninput="filterCards()"
          >
          <select class="list-sort" id="speciesFilter" onchange="filterCards()">
            <option value="">전체 종족</option>
          </select>
        </div>

        <!-- 캐릭터 그리드 -->
        <div class="character-grid" id="charGrid"></div>
        <div id="paginationWrap"></div>

        <!-- 빈 상태 -->
        <div id="emptyState" class="empty-state-wrap" style="display:none;">
          <div class="empty-state-icon">⭐</div>
          <p class="empty-state-title">등록된 개체가 없어요</p>
          <p class="empty-state-desc">아직 소유한 개체가 없어요.</p>
        </div>

        <!-- 검색 결과 없음 -->
        <p id="noResult" class="empty-state" style="display:none;">검색 결과가 없어요.</p>

      </div>

    </main>
  </div>

  <!-- 푸터 -->
  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let allChars = [];
    const pager = createPager(renderCards);

    async function initPage() {
      const user = await getUser();
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const nickname = user.user_metadata?.display_name || user.user_metadata?.nickname || '유저';
      const { data, error } = await getMyCharacters(user.id, nickname);

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';

      if (error || !data) {
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      allChars = data;
      document.getElementById('charCount').textContent = data.length;

      if (data.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      // 종족 필터 옵션 생성
      const species = [...new Set(data.map(c => c.species_name).filter(Boolean))];
      const select  = document.getElementById('speciesFilter');
      species.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        select.appendChild(opt);
      });

      pager.load(data);
    }

    function revealSensitive(overlayEl, e) {
      e.stopPropagation(); e.preventDefault();
      const wrap = overlayEl.parentElement;
      wrap.querySelectorAll('.blurred').forEach(el => el.classList.remove('blurred'));
      overlayEl.remove();
    }

    function renderCards(list) {
      const grid = document.getElementById('charGrid');
      grid.innerHTML = list.map(c => `
        <a href="character.html?id=${c.id}" class="character-card">
          ${c.is_sensitive && c.image_url ? `
          <div style="position:relative; overflow:hidden; border-radius:var(--radius);">
            <div class="character-img blurred" style="background-image:url('${c.image_url}');background-size:cover;background-position:center;"></div>
            <div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span><span class="sensitive-overlay-label">WARNING${c.sensitive_note ? ' : ' + c.sensitive_note : ''}</span><span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>
          </div>` : `
          <div class="character-img" ${c.image_url ? `style="background-image:url('${c.image_url}');background-size:cover;background-position:center;"` : ''}></div>`}
          <div class="character-info">
            <p class="character-name">${c.name}</p>
            <p class="character-species">${c.species_name || ''}</p>
          </div>
        </a>
      `).join('');
    }

    function filterCards() {
      const q       = document.getElementById('filterInput').value.trim().toLowerCase();
      const species = document.getElementById('speciesFilter').value;

      const filtered = allChars.filter(c => {
        const matchName    = !q || c.name.toLowerCase().includes(q);
        const matchSpecies = !species || c.species_name === species;
        return matchName && matchSpecies;
      });

      document.getElementById('noResult').style.display = filtered.length === 0 ? 'block' : 'none';
      if (filtered.length === 0) {
        document.getElementById('charGrid').innerHTML = '';
        document.getElementById('paginationWrap').innerHTML = '';
        return;
      }
      pager.load(filtered);
    }

    initPage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="../images/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 디자인권 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 카드 이름 행 */
    .card-name-row { display:flex; align-items:flex-start; gap:4px; }
    .card-name-row .character-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div class="list-page-header">
          <div>
            <h1 class="list-page-title">내 디자인권</h1>
            <p class="list-page-count"><span id="slotCount">0</span>개의 디자인권</p>
          </div>
        </div>

        <div class="list-controls">
          <input type="text" id="filterInput" class="list-search" placeholder="이름으로 검색..." oninput="filterCards()">
          <select class="list-sort" id="speciesFilter" onchange="filterCards()">
            <option value="">전체 종족</option>
          </select>
          <select class="list-sort" id="sortSelect" onchange="filterCards()" style="min-width:90px;">
            <option value="slot_number">번호순</option>
            <option value="name">이름순</option>
            <option value="recent">최근 등록순</option>
          </select>
        </div>

        <div class="character-grid" id="slotGrid"></div>
        <div id="paginationWrap"></div>

        <div id="emptyState" class="empty-state-wrap" style="display:none;">
          <div class="empty-state-icon">✦</div>
          <p class="empty-state-title">등록된 디자인권이 없어요</p>
          <p class="empty-state-desc">아직 소유한 디자인권이 없어요.</p>
        </div>
        <p id="noResult" class="empty-state" style="display:none;">검색 결과가 없어요.</p>

      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; <a href="credits.html">운영진</a> &nbsp;·&nbsp; ver.2.1</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let allSlots    = [];
    let currentUser = null;
    let isInitialLoad = true;
    const pager = createPager(renderCards);

    // ── 초기화 ────────────────────────────────────────
    async function initPage() {
      currentUser = await getUser();
      if (!currentUser) { window.location.href = 'login.html'; return; }

      // owner_user_id 기준으로만 조회 (닉네임 기반 금지)
      const { data: slots, error } = await sb
        .from('slots')
        .select('id, name, slot_number, image_url, thumbnail_url, status, use_request_status, created_at, species_id')
        .eq('owner_user_id', currentUser.id)
        .order('created_at', { ascending: false });

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display  = 'block';

      if (error) {
        console.error('[my-slots] 조회 오류:', error);
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      if (!slots || !slots.length) {
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      // species 이름 별도 조회
      const speciesIds = [...new Set(slots.map(s => s.species_id).filter(Boolean))];
      const speciesMap = {};
      const speciesIdMap = {};
      if (speciesIds.length) {
        const { data: speciesList } = await sb.from('species').select('id, name').in('id', speciesIds);
        (speciesList || []).forEach(sp => {
          speciesMap[sp.id]    = sp.name;
          speciesIdMap[sp.id]  = sp.id;
        });
      }

      allSlots = slots.map(sl => ({ ...sl, speciesName: speciesMap[sl.species_id] || '' }));
      document.getElementById('slotCount').textContent = allSlots.length;

      // 종족 필터 옵션 구성
      const speciesNames = [...new Set(allSlots.map(s => s.speciesName).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ko'));
      const sel = document.getElementById('speciesFilter');
      speciesNames.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
      });

      restoreFilterState();
      isInitialLoad = true;
      filterCards();
    }

    // ── 카드 렌더링 ───────────────────────────────────
    function renderCards(list) {
      if (!list.length) {
        document.getElementById('slotGrid').innerHTML = '';
        return;
      }
      document.getElementById('slotGrid').innerHTML = list.map(sl => {
        const imgStyle  = (sl.thumbnail_url || sl.image_url)
          ? `background-image:url('${sl.thumbnail_url || sl.image_url}');background-size:cover;background-position:center;`
          : '';
        const speciesName = sl.speciesName || '';
        const isUsed      = sl.status === 'used';
        const isPending   = sl.use_request_status === 'pending';
        let badge = '';
        if (isUsed)    badge = '<span style="font-size:10px;font-weight:700;color:#64748b;background:#f1f5f9;border-radius:4px;padding:1px 5px;vertical-align:middle;margin-left:4px;">사용완료</span>';
        if (isPending) badge = '<span style="font-size:10px;font-weight:700;color:#92400e;background:#fffbeb;border-radius:4px;padding:1px 5px;vertical-align:middle;margin-left:4px;">승인대기</span>';
        return `
          <a href="slot.html?id=${sl.id}" class="character-card" style="${isUsed ? 'opacity:0.5;' : ''}">
            <div class="character-img" ${imgStyle ? `style="${imgStyle}"` : ''}></div>
            <div class="character-info">
              <div class="card-name-row">
                <p class="character-name">${escHtml(sl.name)}${badge}</p>
              </div>
              <p class="character-species">${escHtml(speciesName)}</p>
              <p class="character-owner">${sl.slot_number ? escHtml(sl.slot_number) : '<span style="color:var(--text-mute);">번호 없음</span>'}</p>
            </div>
          </a>`;
      }).join('');
    }

    // ── 필터 + 정렬 ──────────────────────────────────
    function filterCards() {
      const q       = document.getElementById('filterInput').value.trim().toLowerCase();
      const species = document.getElementById('speciesFilter').value;
      const sort    = document.getElementById('sortSelect').value;

      let filtered = allSlots.filter(sl => {
        const matchName    = !q || sl.name.toLowerCase().includes(q);
        const matchSpecies = !species || sl.speciesName === species;
        return matchName && matchSpecies;
      });

      // 정렬
      if (sort === 'name') {
        filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
      } else if (sort === 'slot_number') {
        filtered.sort((a, b) => {
          if (!a.slot_number && !b.slot_number) return 0;
          if (!a.slot_number) return 1;
          if (!b.slot_number) return -1;
          return a.slot_number.localeCompare(b.slot_number, 'ko', { numeric: true });
        });
      }
      // recent: created_at 내림차순 (기본 로드 순서)

      document.getElementById('noResult').style.display = 'none';

      if (!filtered.length) {
        document.getElementById('slotGrid').innerHTML = '';
        document.getElementById('paginationWrap').innerHTML = '';
        document.getElementById('noResult').style.display = 'block';
        return;
      }

      if (isInitialLoad) {
        isInitialLoad = false;
        pager.init(filtered);
      } else {
        saveFilterState();
        pager.load(filtered);
      }
    }

    // ── 필터 상태 저장/복원 ──────────────────────────
    function restoreFilterState() {
      const p = new URLSearchParams(location.search);
      const q       = p.get('q');
      const species = p.get('species');
      const sort    = p.get('sort');
      if (q)       document.getElementById('filterInput').value   = q;
      if (species) document.getElementById('speciesFilter').value = species;
      if (sort)    document.getElementById('sortSelect').value    = sort;
    }

    function saveFilterState() {
      const url     = new URL(location.href);
      const q       = document.getElementById('filterInput').value.trim();
      const species = document.getElementById('speciesFilter').value;
      const sort    = document.getElementById('sortSelect').value;
      if (q)       url.searchParams.set('q', q);           else url.searchParams.delete('q');
      if (species) url.searchParams.set('species', species); else url.searchParams.delete('species');
      if (sort && sort !== 'slot_number') url.searchParams.set('sort', sort); else url.searchParams.delete('sort');
      url.searchParams.delete('page');
      history.replaceState(null, '', url);
    }

    // ── 유틸 ─────────────────────────────────────────
    function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    initPage();
  </script>
</body>
</html>

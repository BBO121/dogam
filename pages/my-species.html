<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="../images/favicon.png" type="image/png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 종족 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div class="list-page-header">
          <div>
            <h1 class="list-page-title">내 종족</h1>
            <p class="list-page-count" id="speciesCount"></p>
          </div>
          <a href="species-register.html" class="btn-secondary" id="registerBtn" style="display:none;">+ 종족 등록</a>
        </div>

        <div class="species-grid species-grid--large" id="speciesGrid"></div>
        <div id="paginationWrap"></div>

        <div id="emptyState" class="empty-state-wrap" style="display:none;">
          <div class="empty-state-icon">🐾</div>
          <p class="empty-state-title">등록한 종족이 없어요</p>
          <p class="empty-state-desc" id="emptyStateDesc"></p>
          <div id="emptyStateAction"></div>
        </div>

      </div>

    </main>
  </div>

  <footer class="footer"><p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; <a href="credits.html">운영진</a> &nbsp;·&nbsp; ver.2.1</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const _qs          = new URLSearchParams(window.location.search);
    const ownerParam   = _qs.get('owner');
    const ownerIdParam = _qs.get('owner_id'); // UUID 기준 (프로필 더보기 전용)

    async function initPage() {
      const user = await getUser();
      if (!user) { window.location.href = 'login.html'; return; }

      let targetUserId = user.id;

      if (ownerIdParam) {
        // login_id → UUID 조회 (URL에 UUID 비노출)
        document.getElementById('registerBtn').style.display = 'none';

        const { data: userList } = await sb.rpc('get_all_users');
        const found = (userList || []).find(u =>
          u.login_id?.toLowerCase() === ownerIdParam.toLowerCase()
        );
        targetUserId = found?.id || null;
        const displayLabel = found?.nickname || ownerIdParam;
        document.querySelector('.list-page-title').textContent = `${displayLabel}님의 종족`;

        if (!targetUserId) {
          document.getElementById('pageLoading').style.display = 'none';
          document.getElementById('pageContent').style.display = 'block';
          document.getElementById('emptyState').style.display = 'flex';
          return;
        }

      } else if (ownerParam) {
        // 닉네임 기준 (기존 호환용)
        document.querySelector('.list-page-title').textContent = `${ownerParam}님의 종족`;
        document.getElementById('registerBtn').style.display = 'none';

        const { data: userList } = await sb.rpc('get_all_users');
        const found = (userList || []).find(u => u.nickname === ownerParam);
        targetUserId = found?.id || null;

        if (!targetUserId) {
          document.getElementById('pageLoading').style.display = 'none';
          document.getElementById('pageContent').style.display = 'block';
          document.getElementById('emptyState').style.display = 'flex';
          return;
        }
      } else {
        // 내 종족 목록
        const role = user.user_metadata?.role;
        if (role === 'species_owner' || isAdminOrStaff(role)) {
          document.getElementById('registerBtn').style.display = 'inline-flex';
        }
      }

      const { data, error } = await sb
        .from('species').select('id, name, image_url, is_sensitive, sensitive_note, age_limit')
        .eq('owner_user_id', targetUserId).order('name');

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';

      if (error || !data || data.length === 0) {
        const isOwnPage = !ownerParam && !ownerIdParam;
        if (isOwnPage) {
          const userRole = user.user_metadata?.role;
          if (userRole !== 'species_owner' && !isAdminOrStaff(userRole)) {
            document.getElementById('emptyStateDesc').innerHTML = '종족 등록은 종족주 승인 후 이용할 수 있어요.<span style="display:block;margin-top:6px;">종족을 만들고 싶다면 먼저 <strong style="color:var(--sky-dark);">종족주 신청</strong>을 해주세요.</span>';
            document.getElementById('emptyStateAction').innerHTML = '<a href="species-apply.html" class="btn-secondary" style="margin-top:12px;">종족주 신청하러 가기</a>';
          } else {
            document.getElementById('emptyStateDesc').textContent = '종족 등록 버튼으로 첫 종족을 만들어보세요.';
          }
        }
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      document.getElementById('speciesCount').textContent = `총 ${data.length}개의 종족`;

      pager.load(data);
    }

    function speciesImgHtml(s) {
      if (s.is_sensitive && s.image_url) {
        const ageBadge = s.age_limit > 0 ? `<span class="species-age-badge">${s.age_limit}세 이상</span>` : '';
        return `
        <div style="position:relative; overflow:hidden; border-radius:var(--radius);">
          <div class="species-img blurred" style="background-image:url('${s.image_url}');background-size:cover;background-position:center;"></div>
          <div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${ageBadge}${s.sensitive_note ? '<span class="sensitive-overlay-note">' + s.sensitive_note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>
        </div>`;
      }
      if (s.age_limit > 0) {
        return `<div class="species-img species-img--restricted"><span class="species-age-badge">${s.age_limit}세 이상</span></div>`;
      }
      return `<div class="species-img"${s.image_url ? ` style="background-image:url('${s.image_url}');background-size:cover;background-position:center;"` : ''}></div>`;
    }

    function renderItems(list) {
      document.getElementById('speciesGrid').innerHTML = list.map(s => `
        <a href="species.html?id=${s.id}" class="species-card">
          ${speciesImgHtml(s)}
          <div class="species-info">
            <p class="species-name">${s.name}</p>
          </div>
        </a>
      `).join('');
    }

    const pager = createPager(renderItems);

    function revealSensitive(overlayEl, e) {
      e.stopPropagation(); e.preventDefault();
      const wrap = overlayEl.parentElement;
      wrap.querySelectorAll('.blurred').forEach(el => el.classList.remove('blurred'));
      overlayEl.remove();
    }

    initPage();
  </script>
</body>
</html>

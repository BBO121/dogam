<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div style="padding-top: 24px; margin-bottom: 20px;">
        <h1 class="list-page-title">공지사항</h1>
        <div style="display:flex; align-items:center; justify-content:space-between; margin-top:6px;">
          <p class="list-page-count" id="noticeCount" style="margin-top:0;"></p>
          <div style="display:flex; align-items:center; gap:12px;">
            <button onclick="toggleView()" id="toggleBtn" class="notice-toggle-btn" style="display:none;">목록보기 ›</button>
            <a href="notice-write.html" class="btn-secondary" id="writeBtn" style="display:none;">작성하기</a>
          </div>
        </div>
      </div>

      <div id="noticeList"></div>
      <div id="paginationWrap"></div>

      <div id="emptyState" class="empty-state-wrap" style="display:none;">
        <div class="empty-state-icon">📢</div>
        <p class="empty-state-title">공지사항이 없어요</p>
      </div>

    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.2</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let _noticeData = null;
    let isListMode = false;

    async function initPage() {
      const user = await getUser();
      if (isAdminOrStaff(user?.user_metadata?.role)) {
        document.getElementById('writeBtn').style.display = 'inline-flex';
      }

      const { data, error } = await sb
        .from('notices')
        .select('*')
        .order('is_pinned', { ascending: false })
        .order('created_at', { ascending: false });

      if (error || !data || data.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      document.getElementById('noticeCount').textContent = `총 ${data.length}개`;
      document.getElementById('toggleBtn').style.display = 'inline';
      _noticeData = data;
      pager.load(data);
      const _nc = await window.incrementAchCounter?.('notice_view') || 0;
      if (_nc >= 1) await window.awardAchievement?.('first_notice');
      if (_nc >= 5) await window.awardAchievement?.('notice_5');
    }

    function renderNotices(list) {
      const container = document.getElementById('noticeList');

      if (isListMode) {
        container.className = 'notice-list';
        container.innerHTML = list.map(n => {
          const date = new Date(n.created_at).toLocaleDateString('ko-KR', {
            year: 'numeric', month: '2-digit', day: '2-digit'
          }).replace(/\. /g, '.').replace(/\.$/, '');
          return `
            <a class="notice-item" href="notice-detail.html?id=${n.id}">
              <div class="notice-header-left">
                ${n.is_pinned ? '<span class="notice-pin">고정</span>' : ''}
                <span class="notice-title">${n.title}</span>
              </div>
              <div class="notice-header-right">
                <span class="notice-date">${date}</span>
                <span class="notice-arrow-right">›</span>
              </div>
            </a>
          `;
        }).join('');
      } else {
        container.className = 'notice-full-list';
        container.innerHTML = list.map((n, i) => {
          const date = new Date(n.created_at).toLocaleDateString('ko-KR', {
            year: 'numeric', month: '2-digit', day: '2-digit'
          }).replace(/\. /g, '.').replace(/\.$/, '');
          const content = n.content.replace(/\n/g, '<br>');
          return `
            ${i > 0 ? '<div class="notice-full-divider"></div>' : ''}
            <div class="notice-full-item">
              ${n.is_pinned ? '<span class="notice-pin" style="display:inline-block; margin-bottom:10px;">고정</span>' : ''}
              <h2 class="notice-full-title">${n.title}</h2>
              <p class="notice-full-meta">${n.author || '관리자'} · ${date}</p>
              <div class="notice-full-content">${content}</div>
            </div>
          `;
        }).join('');
      }
    }

    const pager = createPager(renderNotices);

    function toggleView() {
      isListMode = !isListMode;
      document.getElementById('toggleBtn').textContent = isListMode ? '내용보기 ›' : '목록보기 ›';
      if (_noticeData) pager.load(_noticeData);
    }

    initPage();
  </script>
</body>
</html>

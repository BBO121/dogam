<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상점 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div class="list-page-header" style="margin-bottom:0;">
          <div>
            <div class="breadcrumb" style="margin-bottom:8px;">
              <a href="index.html">홈</a>
              <span>/</span>
              <span>상점</span>
            </div>
            <h1 class="list-page-title">상점</h1>
          </div>
        </div>

        <!-- 카테고리 목록 (JS 렌더) -->
        <div id="shopCategories" style="padding-bottom:40px;"></div>

      </div>
    </main>
  </div>

  <footer class="footer"><p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; <a href="credits.html">운영진</a> &nbsp;·&nbsp; ver.2.0</p></footer>

  <!-- 상품 상세 모달 -->
  <div class="modal-overlay" id="shopDetailModal" style="display:none;" onclick="if(event.target===this)closeDetailModal()">
    <div class="shop-detail-card">
      <button class="shop-detail-close" onclick="closeDetailModal()">×</button>
      <div class="shop-detail-preview" id="detailPreview"></div>
      <div class="shop-detail-info">
        <p class="shop-detail-name" id="detailName"></p>
        <p class="shop-detail-desc" id="detailDesc"></p>
        <div class="shop-detail-footer">
          <span class="shop-detail-price" id="detailPrice"></span>
          <div id="detailAction"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 구매 확인 모달 -->
  <div class="modal-overlay" id="shopModal" style="display:none;" onclick="if(event.target===this)closeShopModal()">
    <div class="modal-card">
      <p class="modal-title">구매 확인</p>
      <div class="wallet-confirm-table" id="shopModalDesc"></div>
      <p class="wallet-confirm-warning">구매 후에는 환불되지 않습니다.</p>
      <div class="modal-actions">
        <button class="btn-ghost wallet-confirm-cancel" onclick="closeShopModal()">취소</button>
        <button class="btn-submit wallet-confirm-submit" id="shopModalBtn" onclick="doPurchase()">구매</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/shop.js"></script>
</body>
</html>

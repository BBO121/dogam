<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>디자인권 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div id="slotContent">
        <p class="page-loading">불러오는 중...</p>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.2</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const slotId = new URLSearchParams(window.location.search).get('id');
    let afterDeleteHref        = 'species-list.html';
    let _showingOriginal       = false;
    let _origImgUrl            = null;
    let _wmImgUrl              = null;
    let _allTransferUsers      = [];
    let _transferType          = 'site';
    let _selectedTransferUid   = null;
    let _selectedTransferNick  = null;
    let _idToNick              = {};
    let _currentSlot           = null;
    let _speciesOwnerUid       = null;

    async function toggleOriginalImage() {
      const btn   = document.getElementById('imgToggleBtn');
      const label = document.getElementById('imgStateLabel');
      const imgEl = document.getElementById('slotMainImg');
      if (!imgEl) return;

      if (!_showingOriginal) {
        if (!_origImgUrl) {
          btn.textContent = '불러오는 중...';
          btn.disabled    = true;
          const { data, error } = await sb.from('slots')
            .select('original_image_url').eq('id', slotId).single();
          if (error || !data?.original_image_url) {
            btn.textContent = '원본 없음';
            return;
          }
          _origImgUrl = data.original_image_url;
        }
        _wmImgUrl = imgEl.src;
        imgEl.src = _origImgUrl;
        label.textContent = '원본 이미지를 보고 있습니다.';
        btn.textContent   = '워터마크 이미지 보기';
        btn.disabled      = false;
        _showingOriginal  = true;
      } else {
        imgEl.src = _wmImgUrl;
        label.textContent = '워터마크 이미지를 보고 있습니다.';
        btn.textContent   = '원본 이미지 보기';
        _showingOriginal  = false;
      }
    }

    // ── 사용 요청 / 승인 / 거절 ────────────────────────
    async function requestUse() {
      if (!confirm('이 디자인권의 사용을 종족주에게 요청할까요?')) return;

      const { error } = await sb.from('slots').update({
        use_request_status: 'pending',
        use_requested_at:   new Date().toISOString(),
      }).eq('id', slotId);

      if (error) {
        console.error('[requestUse] 오류:', error);
        showSlotError(`사용 요청에 실패했어요: ${error.message}`);
        return;
      }

      // 종족주에게 알림 전송
      const speciesOwnerNick = _speciesOwnerUid ? _idToNick[_speciesOwnerUid] : null;
      const requesterNick    = _currentSlot?.owner_user_id ? _idToNick[_currentSlot.owner_user_id] : '소유주';
      if (speciesOwnerNick) {
        await sb.from('notifications').insert({
          user_nickname: speciesOwnerNick,
          type:          'slot_use_request',
          message:       `${requesterNick}님이 디자인권 "${_currentSlot.name}" 사용을 요청했습니다.`,
          link:          `slot.html?id=${slotId}`,
          is_read:       false,
        });
      }

      window.location.reload();
    }

    async function cancelUseRequest() {
      if (!confirm('사용 요청을 취소할까요?')) return;
      const { error } = await sb.from('slots').update({
        use_request_status: 'none',
        use_requested_at:   null,
      }).eq('id', slotId);
      if (error) { console.error('[cancelUseRequest]', error); showSlotError(`취소에 실패했어요: ${error.message}`); return; }
      window.location.reload();
    }

    async function approveUseRequest() {
      if (!confirm('사용을 승인할까요? 디자인권이 "사용완료" 상태가 됩니다.')) return;
      const { error } = await sb.from('slots').update({
        status:             'used',
        use_request_status: 'approved',
      }).eq('id', slotId);
      if (error) { console.error('[approveUseRequest]', error); showSlotError(`승인에 실패했어요: ${error.message}`); return; }

      // 소유주에게 승인 알림
      const ownerNick = _currentSlot?.owner_user_id ? _idToNick[_currentSlot.owner_user_id] : null;
      if (ownerNick) {
        await sb.from('notifications').insert({
          user_nickname: ownerNick,
          type:          'slot_use_approved',
          message:       `디자인권 "${_currentSlot.name}" 사용이 승인됐습니다.`,
          link:          `slot.html?id=${slotId}`,
          is_read:       false,
        });
      }
      window.location.reload();
    }

    async function rejectUseRequest() {
      if (!confirm('사용 요청을 거절할까요?')) return;
      const { error } = await sb.from('slots').update({
        use_request_status: 'rejected',
        use_requested_at:   null,
      }).eq('id', slotId);
      if (error) { console.error('[rejectUseRequest]', error); showSlotError(`거절에 실패했어요: ${error.message}`); return; }

      // 소유주에게 거절 알림
      const ownerNick = _currentSlot?.owner_user_id ? _idToNick[_currentSlot.owner_user_id] : null;
      if (ownerNick) {
        await sb.from('notifications').insert({
          user_nickname: ownerNick,
          type:          'slot_use_rejected',
          message:       `디자인권 "${_currentSlot.name}" 사용 요청이 거절됐습니다.`,
          link:          `slot.html?id=${slotId}`,
          is_read:       false,
        });
      }
      window.location.reload();
    }

    function showSlotError(msg) {
      let errEl = document.getElementById('slotActionError');
      if (!errEl) {
        errEl = document.createElement('p');
        errEl.id = 'slotActionError';
        errEl.style.cssText = 'color:#ef4444; font-size:13px; margin:8px 0 0; padding:10px 14px; background:#fff5f5; border:1px solid #fca5a5; border-radius:8px;';
        const panel = document.querySelector('.char-info-panel');
        if (panel) panel.appendChild(errEl);
      }
      errEl.textContent = msg;
      errEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    async function revertUseComplete() {
      if (!confirm('사용완료 상태를 해제할까요?\n디자인권이 다시 사용 가능 상태로 변경됩니다.')) return;
      const { error } = await sb.from('slots').update({
        status:             'active',
        use_request_status: 'none',
        use_requested_at:   null,
      }).eq('id', slotId);
      if (error) { alert('해제에 실패했어요: ' + error.message); return; }

      // 소유주에게 알림 전송 (사이트 유저인 경우만)
      const ownerNick = _currentSlot?.owner_user_id ? _idToNick[_currentSlot.owner_user_id] : null;
      if (ownerNick) {
        await sb.from('notifications').insert({
          user_nickname: ownerNick,
          type:          'slot_revert',
          message:       `"${_currentSlot.name}" 디자인권이 다시 사용 가능 상태로 변경됐어요.`,
          link:          `slot.html?id=${slotId}`,
          is_read:       false,
        });
      }

      window.location.reload();
    }
    // ──────────────────────────────────────────────────

    // ── 소유권 이전 ────────────────────────────────────
    function openTransferModal() {
      _transferType         = 'site';
      _selectedTransferUid  = null;
      _selectedTransferNick = null;
      setTransferType('site');
      document.getElementById('transferSearch').value = '';
      document.getElementById('transferUserList').innerHTML =
        '<p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>';
      document.getElementById('transferSelectedDisplay').style.display = 'none';
      document.getElementById('transferExternalName').value = '';
      document.getElementById('transferError').textContent = '';
      document.getElementById('transferModal').style.display = 'flex';
    }

    function closeTransferModal() {
      document.getElementById('transferModal').style.display = 'none';
    }

    function setTransferType(type) {
      _transferType = type;
      const isSite = type === 'site';
      document.getElementById('transferSiteSection').style.display    = isSite ? '' : 'none';
      document.getElementById('transferExternalSection').style.display = isSite ? 'none' : '';
      const btnS = document.getElementById('btnTransferSite');
      const btnE = document.getElementById('btnTransferExternal');
      btnS.style.background  = isSite ? 'var(--sky)' : '#fff';
      btnS.style.color       = isSite ? '#fff' : 'var(--text-sub)';
      btnS.style.borderColor = isSite ? 'var(--sky)' : 'var(--border)';
      btnE.style.background  = isSite ? '#fff' : 'var(--sky)';
      btnE.style.color       = isSite ? 'var(--text-sub)' : '#fff';
      btnE.style.borderColor = isSite ? 'var(--border)' : 'var(--sky)';
    }

    function filterTransferUsers(q) {
      const el = document.getElementById('transferUserList');
      if (!q) {
        el.innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>';
        return;
      }
      const qLow = q.toLowerCase();
      const matched = _allTransferUsers.filter(u => u.nickname.toLowerCase().includes(qLow)).slice(0, 20);
      if (!matched.length) {
        el.innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">일치하는 유저가 없어요</p>';
        return;
      }
      el.innerHTML = matched.map(u => `
        <div onclick="selectTransferUser('${u.id}','${u.nickname.replace(/'/g, "\\'")}')" id="tItem_${u.id}"
          style="padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--border); transition:background 0.1s;"
          onmouseover="this.style.background='var(--sky-pale)'" onmouseout="this.style.background= _selectedTransferUid==='${u.id}' ? 'var(--sky-light)' : ''">
          ${u.nickname}
        </div>
      `).join('');
    }

    function selectTransferUser(id, nick) {
      _selectedTransferUid  = id;
      _selectedTransferNick = nick;
      document.querySelectorAll('#transferUserList > div').forEach(el => {
        el.style.background = el.id === `tItem_${id}` ? 'var(--sky-light)' : '';
        el.style.fontWeight  = el.id === `tItem_${id}` ? '600' : '';
      });
      const disp = document.getElementById('transferSelectedDisplay');
      disp.textContent = `선택됨: ${nick}`;
      disp.style.display = 'block';
    }

    async function confirmTransfer() {
      const errEl = document.getElementById('transferError');
      const btn   = document.getElementById('transferConfirmBtn');
      errEl.textContent = '';

      let owner_user_id = null;
      let owner_name    = null;

      if (_transferType === 'site') {
        if (!_selectedTransferUid) { errEl.textContent = '이전받을 유저를 선택해주세요.'; return; }
        owner_user_id = _selectedTransferUid;
      } else {
        const name = document.getElementById('transferExternalName').value.trim();
        if (!name) { errEl.textContent = '이름을 입력해주세요.'; return; }
        owner_name = name;
      }

      const toLabel = _transferType === 'site' ? _selectedTransferNick : owner_name;
      if (!confirm(`이 디자인권의 소유권을 "${toLabel}"에게 이전할까요?`)) return;

      btn.textContent = '이전 중...';
      btn.disabled    = true;

      const { error } = await sb.from('slots').update({ owner_user_id, owner_name }).eq('id', slotId);
      if (error) {
        errEl.textContent = '이전에 실패했어요: ' + error.message;
        btn.textContent = '이전하기';
        btn.disabled    = false;
        return;
      }

      closeTransferModal();
      window.location.reload();
    }
    // ──────────────────────────────────────────────────

    async function deleteSlot() {
      if (!confirm('이 디자인권을 정말 삭제할까요? 되돌릴 수 없어요.')) return;
      const { error } = await sb.from('slots').delete().eq('id', slotId);
      if (error) { alert('삭제에 실패했어요.'); return; }
      window.location.href = afterDeleteHref;
    }

    if (!slotId) {
      document.getElementById('slotContent').innerHTML = '<p class="page-loading">잘못된 접근이에요.</p>';
    } else {
      loadSlot();
    }

    async function loadSlot() {
      const user = await getUser();

      const [{ data: slot, error }, { data: siteUserData }] = await Promise.all([
        sb.from('slots')
          .select('id, species_id, name, designer, owner_user_id, owner_name, slot_number, description, image_url, thumbnail_url, trait_values, status, use_request_status, use_requested_at, created_at')
          .eq('id', slotId).single(),
        sb.rpc('get_all_users'),
      ]);

      if (error) { console.error('[slot.html] 쿼리 오류:', error); }
      if (error || !slot) {
        document.getElementById('slotContent').innerHTML = '<p class="page-loading">디자인권을 찾을 수 없어요.</p>';
        return;
      }

      const idToNick  = Object.fromEntries((siteUserData || []).filter(u => u.id && u.nickname).map(u => [u.id, u.nickname]));
      const siteNicks = new Set((siteUserData || []).map(u => u.nickname).filter(Boolean));
      _idToNick     = idToNick;
      _currentSlot  = slot;
      _allTransferUsers = (siteUserData || [])
        .map(u => ({ id: u.id || '', nickname: u.nickname || '' }))
        .filter(u => u.id && u.nickname)
        .sort((a, b) => a.nickname.localeCompare(b.nickname, 'ko'));

      // 종족 정보
      let speciesHref     = 'species-list.html';
      let speciesName     = '(종족 없음)';
      let speciesOwnerUid = null;
      const { data: sp } = await sb.from('species')
        .select('id, name, owner_user_id').eq('id', slot.species_id).single();
      if (sp) {
        speciesHref     = `species.html?id=${sp.id}`;
        speciesName     = sp.name;
        speciesOwnerUid  = sp.owner_user_id;
        _speciesOwnerUid = sp.owner_user_id;
      }
      afterDeleteHref = speciesHref;

      document.title = `${slot.name} (디자인권) — 종족연구소`;

      const userId          = user?.id || null;
      const isSlotOwner     = !!(userId && slot.owner_user_id && userId === slot.owner_user_id);
      const isSpeciesOwner  = !!(userId && speciesOwnerUid && userId === speciesOwnerUid);
      const canViewOriginal = isSlotOwner || isSpeciesOwner;

      // 소유주 표시
      let ownerDisplay;
      if (slot.owner_user_id) {
        const nick = idToNick[slot.owner_user_id];
        ownerDisplay = nick
          ? `<a href="profile.html?user=${encodeURIComponent(nick)}" style="color:inherit;text-decoration:none;">${nick}</a>`
          : '(알 수 없는 유저)';
      } else if (slot.owner_name) {
        ownerDisplay = `<span style="display:inline-block;font-size:10px;font-weight:600;color:#555;background:#e8e8e8;border-radius:4px;padding:1px 5px;margin-right:5px;vertical-align:middle;line-height:1.6;">Site-OFF</span>${slot.owner_name}`;
      } else {
        ownerDisplay = '—';
      }

      // 디자이너 표시
      let designerDisplay;
      if (slot.designer) {
        designerDisplay = siteNicks.has(slot.designer)
          ? `<a href="profile.html?user=${encodeURIComponent(slot.designer)}" style="color:inherit;text-decoration:none;">${slot.designer}</a>`
          : `<span style="display:inline-block;font-size:10px;font-weight:600;color:#555;background:#e8e8e8;border-radius:4px;padding:1px 5px;margin-right:5px;vertical-align:middle;line-height:1.6;">Site-OFF</span>${slot.designer}`;
      } else {
        designerDisplay = '—';
      }

      const registeredDate = new Date(slot.created_at).toLocaleDateString('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).replace(/\. /g, '.').replace(/\.$/, '');

      // trait_values 렌더링
      let traitHtml = '';
      if (slot.trait_values && Object.keys(slot.trait_values).length) {
        const keys = Object.keys(slot.trait_values).filter(k => slot.trait_values[k]);
        if (keys.length) {
          traitHtml = '<div class="char-info-divider"></div>' + keys.map(k => `
            <div class="char-info-row">
              <span class="char-info-label">${k}</span>
              <span class="char-info-value">${slot.trait_values[k]}</span>
            </div>`).join('');
        }
      }

      document.getElementById('slotContent').innerHTML = `
        <div class="char-page-header">
          <div class="breadcrumb">
            <a href="${speciesHref}">${speciesName}</a>
            <span>/</span>
            <span>디자인권</span>
            <span>/</span>
            <span>${slot.name}</span>
          </div>
          <h1 class="char-page-name">${slot.name}</h1>
        </div>

        <div class="char-body">
          <div class="char-img-wrap">
            <div class="char-img-area">
              ${slot.image_url
                ? `<img id="slotMainImg" src="${slot.image_url}" alt="${slot.name}" style="width:100%; height:auto; display:block;">`
                : `<div style="width:100%;aspect-ratio:3/4;background:var(--bg-sub);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--text-mute);font-size:13px;">이미지 없음</div>`}
            </div>
            ${canViewOriginal && slot.image_url ? `
            <div style="margin-top:8px; text-align:center; font-size:12px; color:var(--text-mute);">
              <span id="imgStateLabel">워터마크 이미지를 보고 있습니다.</span>
              <button id="imgToggleBtn" onclick="toggleOriginalImage()"
                style="margin-left:6px; background:none; border:none; color:var(--sky-deep); font-size:12px; cursor:pointer; text-decoration:underline; font-family:inherit; padding:0;">
                원본 이미지 보기
              </button>
            </div>` : ''}
          </div>

          <aside class="char-info-panel">
            <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;">
              <span style="display:inline-block; padding:3px 12px; border-radius:20px; background:var(--sky-light); color:var(--sky-deep); font-size:12px; font-weight:700; border:1px solid var(--sky);">디자인권</span>
              ${slot.status === 'used' ? `<span style="display:inline-block; padding:3px 12px; border-radius:20px; background:#f1f5f9; color:#64748b; font-size:12px; font-weight:700; border:1px solid #cbd5e1;">사용완료</span>` : ''}
              ${slot.use_request_status === 'pending' ? `<span style="display:inline-block; padding:3px 12px; border-radius:20px; background:#fffbeb; color:#92400e; font-size:12px; font-weight:700; border:1px solid #fde68a;">승인 대기 중</span>` : ''}
            </div>

            <div class="char-info-row">
              <span class="char-info-label">종족</span>
              <a href="${speciesHref}" class="char-info-value char-info-link">${speciesName}</a>
            </div>

            ${slot.slot_number ? `
            <div class="char-info-row">
              <span class="char-info-label">디자인권번호</span>
              <span class="char-info-value">${slot.slot_number}</span>
            </div>` : ''}

            <div class="char-info-row">
              <span class="char-info-label">디자이너</span>
              <span class="char-info-value">${designerDisplay}</span>
            </div>

            <div class="char-info-row">
              <span class="char-info-label">소유주</span>
              <span class="char-info-value">${ownerDisplay}</span>
            </div>

            <div class="char-info-row">
              <span class="char-info-label">등록일</span>
              <span class="char-info-value">${registeredDate}</span>
            </div>

            ${slot.description ? `
            <div class="char-info-divider"></div>
            <p class="char-info-desc">${slot.description}</p>` : ''}

            ${traitHtml}

            ${isSlotOwner && !isSpeciesOwner ? `
            <div class="char-info-divider"></div>
            ${slot.status === 'used' ? `
              <p style="font-size:13px; color:var(--text-mute); text-align:center; padding:4px 0;">사용완료된 디자인권입니다.</p>
            ` : slot.use_request_status === 'pending' ? `
              <div style="padding:10px 14px; background:#fffbeb; border:1px solid #fde68a; border-radius:10px; font-size:13px; color:#92400e; font-weight:500; display:flex; justify-content:space-between; align-items:center;">
                <span>종족주에게 사용 승인 요청 중</span>
                <button onclick="cancelUseRequest()" style="border:none; background:none; font-size:12px; color:#92400e; cursor:pointer; text-decoration:underline; font-family:inherit; padding:0;">취소</button>
              </div>
            ` : slot.use_request_status === 'rejected' ? `
              <div style="padding:10px 14px; background:#fff5f5; border:1px solid #fca5a5; border-radius:10px; font-size:13px; color:#b91c1c; font-weight:500; margin-bottom:10px;">
                사용 요청이 거절됐어요.
              </div>
              <button onclick="requestUse()" class="btn-secondary" style="width:100%; justify-content:center;">다시 사용 요청</button>
            ` : `
              <button onclick="requestUse()" class="btn-secondary" style="width:100%; justify-content:center;">디자인권 사용 요청</button>
            `}` : ''}

            ${isSpeciesOwner ? `
            <div class="char-info-divider"></div>
            ${slot.use_request_status === 'pending' ? `
            <div style="padding:12px 14px; background:#fffbeb; border:1px solid #fde68a; border-radius:10px; margin-bottom:12px;">
              <p style="font-size:13px; font-weight:700; color:#92400e; margin:0 0 10px;">소유주가 사용을 요청했습니다.</p>
              <div style="display:flex; gap:8px;">
                <button onclick="approveUseRequest()" class="btn-secondary" style="flex:1; justify-content:center;">승인</button>
                <button onclick="rejectUseRequest()" style="flex:1; padding:8px; border:1px solid #fca5a5; border-radius:8px; background:#fff; color:#ef4444; font-size:13px; cursor:pointer; font-family:inherit;">거절</button>
              </div>
            </div>` : ''}
            ${slot.status === 'used' ? `
            <div style="margin-bottom:12px;">
              <button onclick="revertUseComplete()"
                style="width:100%; padding:8px 16px; border:1px solid var(--border); border-radius:8px; background:#fff; font-size:13px; cursor:pointer; font-family:inherit; color:var(--text-sub);">
                사용완료 해제
              </button>
            </div>` : ''}
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <button onclick="deleteSlot()"
                style="padding:8px 16px; border:1px solid #fca5a5; border-radius:8px; background:#fff; color:#ef4444; font-size:13px; cursor:pointer; font-family:inherit;">
                삭제
              </button>
              <div style="display:flex; gap:8px;">
                <button onclick="openTransferModal()"
                  style="padding:8px 16px; border:1px solid var(--border); border-radius:8px; background:#fff; font-size:13px; cursor:pointer; font-family:inherit; color:var(--text);">
                  소유권 이전
                </button>
                <a href="slot-edit.html?id=${slotId}" class="btn-ghost">정보 수정</a>
              </div>
            </div>` : ''}
          </aside>
        </div>
      `;
    }
  </script>
  <!-- 소유권 이전 모달 -->
  <div id="transferModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:500; align-items:center; justify-content:center; padding:16px;">
    <div style="background:#fff; border-radius:16px; padding:24px; width:min(100%, 380px); max-height:82vh; display:flex; flex-direction:column; gap:14px; box-shadow:0 8px 32px rgba(0,0,0,0.18); overflow-y:auto;">
      <h3 style="margin:0; font-size:16px; font-weight:700;">소유권 이전</h3>

      <!-- 타입 탭 -->
      <div style="display:flex; gap:8px;">
        <button type="button" id="btnTransferSite" onclick="setTransferType('site')"
          style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--sky); background:var(--sky); color:#fff; font-size:13px; cursor:pointer;">
          사이트 유저
        </button>
        <button type="button" id="btnTransferExternal" onclick="setTransferType('external')"
          style="flex:1; padding:8px; border-radius:8px; border:2px solid var(--border); background:#fff; color:var(--text-sub); font-size:13px; cursor:pointer;">
          사이트 밖 유저
        </button>
      </div>

      <!-- 사이트 유저 섹션 -->
      <div id="transferSiteSection">
        <input type="text" id="transferSearch" class="form-input" placeholder="닉네임으로 검색..."
          oninput="filterTransferUsers(this.value)" autocomplete="off">
        <div id="transferUserList"
          style="border:1px solid var(--border); border-radius:10px; max-height:180px; overflow-y:auto; background:#fff; margin-top:8px;">
          <p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>
        </div>
        <p id="transferSelectedDisplay" style="margin:6px 0 0; font-size:13px; color:var(--sky-deep); display:none;"></p>
      </div>

      <!-- 사이트 밖 유저 섹션 -->
      <div id="transferExternalSection" style="display:none;">
        <input type="text" id="transferExternalName" class="form-input" placeholder="이름 입력">
        <p style="font-size:12px; color:var(--text-mute); margin-top:6px;">owner_user_id는 null로 저장되고, 이름만 표시됩니다.</p>
      </div>

      <p id="transferError" style="font-size:13px; color:#ef4444; margin:0; min-height:16px;"></p>

      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeTransferModal()">취소</button>
        <button class="btn-secondary" id="transferConfirmBtn" onclick="confirmTransfer()">이전하기</button>
      </div>
    </div>
  </div>

</body>
</html>

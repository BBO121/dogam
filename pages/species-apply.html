<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종족주 신청 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">

      <div id="pageLoading" class="page-loading">불러오는 중...</div>

      <div id="pageContent" style="display:none;">

        <div style="padding-top:24px; margin-bottom:20px;">
          <h1 class="list-page-title">종족주 신청</h1>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-top:6px;">
            <p class="list-page-count" id="applyCount" style="margin-top:0;"></p>
            <a href="species-apply-write.html" class="btn-secondary" id="writeBtn">신청하기</a>
          </div>
        </div>

        <div id="applyList"></div>
        <div id="paginationWrap"></div>

        <div id="emptyState" class="empty-state-wrap" style="display:none;">
          <div class="empty-state-icon">📋</div>
          <p class="empty-state-title">신청 내역이 없어요</p>
          <p class="empty-state-desc">종족주가 되고 싶다면 신청해보세요!</p>
        </div>

      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.1</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const STATUS_STYLE = {
      '접수됨': 'background:#f1f5f9;color:#64748b',
      '검토중': 'background:#e0f2fe;color:#0284c7',
      '승인됨': 'background:#dcfce7;color:#166534',
      '반려됨': 'background:#fee2e2;color:#dc2626',
    };

    let isAdminUser = false;

    async function initPage() {
      const user = await getUser();
      if (!user) { window.location.href = 'login.html'; return; }

      isAdminUser = isAdminOrStaff(user.user_metadata?.role);
      const nickname = user.user_metadata?.display_name || user.user_metadata?.nickname;

      // 이미 승인된 유저는 신청하기 버튼 숨김
      const isSpeciesOwner = user.user_metadata?.role === 'species_owner';
      if (isSpeciesOwner || isAdminUser) {
        document.getElementById('writeBtn').style.display = 'none';
      }

      let query = sb.from('species_applications').select('*').order('created_at', { ascending: false });
      if (!isAdminUser) query = query.eq('nickname', nickname);

      const { data, error } = await query;

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('pageContent').style.display = 'block';

      if (error || !data || data.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
        return;
      }

      document.getElementById('applyCount').textContent = `총 ${data.length}건`;
      pager.load(data);
    }

    function renderItems(list) {
      const container = document.getElementById('applyList');
      container.className = 'notice-list';
      container.innerHTML = list.map(item => {
        const date = new Date(item.created_at).toLocaleDateString('ko-KR', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        }).replace(/\. /g, '.').replace(/\.$/, '');
        const statusStyle = STATUS_STYLE[item.status] || STATUS_STYLE['접수됨'];
        return `
          <a class="notice-item" href="species-apply-detail.html?id=${item.id}">
            <div class="notice-header-left" style="gap:8px;">
              <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;${statusStyle}">${item.status || '접수됨'}</span>
              <span class="notice-title">${item.species_name}</span>
              ${isAdminUser ? `<span style="font-size:12px;color:var(--text-mute);">${item.nickname}</span>` : ''}
            </div>
            <div class="notice-header-right">
              <span class="notice-date">${date}</span>
              <span class="notice-arrow-right">›</span>
            </div>
          </a>
        `;
      }).join('');
    }

    const pager = createPager(renderItems);
    initPage();
  </script>
</body>
</html>

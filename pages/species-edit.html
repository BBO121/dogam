<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종족 정보 수정 — 도감</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">도감</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="register-wrap">

        <div class="breadcrumb" style="margin-bottom: 24px;">
          <a href="index.html">홈</a>
          <span>/</span>
          <a href="species-list.html">전체 종족</a>
          <span>/</span>
          <span id="breadcrumbName">종족</span>
          <span>/</span>
          <span>정보 수정</span>
        </div>

        <h1 class="register-title">종족 정보 수정</h1>
        <p class="register-subtitle">종족 정보를 수정해요</p>

        <div class="register-form">

          <!-- 대표 이미지 -->
          <div class="form-group">
            <label class="form-label">대표 이미지</label>
            <div class="img-upload-box" id="imgUploadBox" onclick="document.getElementById('imgInput').click()">
              <img id="imgPreview" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:10px;">
              <div id="imgPlaceholder">
                <p class="img-upload-text">클릭하여 이미지 업로드</p>
                <p class="img-upload-hint">권장 크기: 500 x 500px</p>
              </div>
            </div>
            <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="previewImage(this)">
          </div>

          <!-- 종족명 -->
          <div class="form-group">
            <label class="form-label">종족명 <span class="required">*</span></label>
            <input type="text" id="speciesName" class="form-input" placeholder="종족 이름을 입력하세요">
          </div>

          <!-- 설명 -->
          <div class="form-group">
            <label class="form-label">종족 설명</label>
            <textarea id="speciesDesc" class="form-textarea" placeholder="이 종족에 대한 설명을 입력하세요" rows="5"></textarea>
          </div>

          <!-- 커스텀 필드 -->
          <div class="form-group">
            <label class="form-label">개체 항목 설정</label>
            <p class="form-hint">이 종족의 개체를 등록할 때 입력받을 항목을 추가하세요</p>
            <div class="custom-field-list" id="customFieldList"></div>
            <button type="button" class="btn-field-add" id="addFieldBtn" onclick="addField()">+ 항목 추가</button>
          </div>

          <!-- 에러 -->
          <p class="auth-error" id="formError"></p>

          <!-- 버튼 -->
          <div class="register-actions">
            <a href="#" id="cancelBtn" class="btn-ghost">취소</a>
            <button type="button" class="btn-secondary" id="submitBtn" onclick="submitEdit()">저장하기</button>
          </div>

        </div>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 도감</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/utils.js"></script>
  <script>
    const speciesId = new URLSearchParams(window.location.search).get('id');
    let currentImageUrl = null;

    document.getElementById('cancelBtn').href = `species.html?id=${speciesId}`;

    async function init() {
      if (!speciesId) { window.location.href = 'species-list.html'; return; }

      const user = await getUser();
      if (!user) { window.location.href = 'login.html'; return; }

      const { data: s, error } = await sb.from('species').select('*').eq('id', speciesId).single();
      if (error || !s) { window.location.href = 'species-list.html'; return; }

      const isOwner = user.user_metadata?.role === 'admin' || user.user_metadata?.nickname === s.owner_nickname;
      if (!isOwner) { window.location.href = `species.html?id=${speciesId}`; return; }

      document.getElementById('breadcrumbName').textContent = s.name;
      document.getElementById('speciesName').value = s.name;
      document.getElementById('speciesDesc').value = s.description || '';

      if (s.image_url) {
        currentImageUrl = s.image_url;
        document.getElementById('imgPreview').src = s.image_url;
        document.getElementById('imgPreview').style.display = 'block';
        document.getElementById('imgPlaceholder').style.display = 'none';
      }

      if (s.custom_fields?.length) {
        s.custom_fields.forEach(f => addField(f));
      }
    }

    function previewImage(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('imgPreview').src = e.target.result;
        document.getElementById('imgPreview').style.display = 'block';
        document.getElementById('imgPlaceholder').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    function addField(value = '') {
      const list = document.getElementById('customFieldList');
      const row = document.createElement('div');
      row.className = 'custom-field-row';
      row.innerHTML = `
        <input type="text" class="form-input field-input" placeholder="항목명 (예: 속성, 나이, 서식지)" value="${value}">
        <button type="button" class="btn-field-remove" onclick="this.parentElement.remove()">✕</button>
      `;
      list.appendChild(row);
    }

    async function submitEdit() {
      const name    = document.getElementById('speciesName').value.trim();
      const desc    = document.getElementById('speciesDesc').value.trim();
      const errorEl = document.getElementById('formError');
      const btn     = document.getElementById('submitBtn');

      errorEl.textContent = '';
      if (!name) { errorEl.textContent = '종족명을 입력해주세요.'; return; }

      btn.textContent = '저장 중...';
      btn.disabled = true;

      const fields = [...document.querySelectorAll('.field-input')]
        .map(i => i.value.trim())
        .filter(v => v);

      let imageUrl = currentImageUrl;
      const imgFile = document.getElementById('imgInput').files[0];
      if (imgFile) {
        const blob     = await compressImage(imgFile);
        const fileName = `species_${Date.now()}.jpg`;
        const { error: uploadError } = await sb.storage.from('images').upload(fileName, blob, { upsert: true, contentType: 'image/jpeg' });
        if (uploadError) {
          errorEl.textContent = `이미지 업로드 실패: ${uploadError.message}`;
          btn.textContent = '저장하기';
          btn.disabled = false;
          return;
        }
        const { data: urlData } = sb.storage.from('images').getPublicUrl(fileName);
        imageUrl = urlData.publicUrl;
      }

      const { error } = await sb.from('species').update({
        name,
        description:   desc || null,
        image_url:     imageUrl,
        custom_fields: fields.length ? fields : null,
      }).eq('id', speciesId);

      if (error) {
        errorEl.textContent = `저장에 실패했어요: ${error.message}`;
        btn.textContent = '저장하기';
        btn.disabled = false;
        return;
      }

      window.location.href = `species.html?id=${speciesId}`;
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 종족 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <section class="section">

        <div class="list-page-header">
          <div>
            <h1 class="list-page-title">전체 종족</h1>
            <p class="list-page-count" id="speciesCount">불러오는 중...</p>
          </div>
          <a href="species-register.html" class="btn-secondary" id="btnRegisterSpecies" style="display:none;">+ 종족 등록</a>
        </div>

        <!-- 종족 유형 필터 -->
        <div class="species-filter-chips" id="openFilterChips">
          <button class="species-filter-chip active" data-filter="all">전체보기</button>
          <button class="species-filter-chip" data-filter="open">열린종족</button>
          <button class="species-filter-chip" data-filter="closed">닫힌종족</button>
        </div>

        <!-- 검색 + 정렬 -->
        <div class="list-controls">
          <input type="text" class="list-search" id="searchInput" placeholder="종족 이름으로 검색">
          <select class="list-sort" id="sortSelect">
            <option value="recent">최근 등록순</option>
            <option value="name">이름순</option>
          </select>
        </div>

        <div class="species-grid species-grid--large" id="speciesGrid">
          <p class="page-loading">불러오는 중...</p>
        </div>
        <div id="paginationWrap"></div>
      </section>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; <a href="credits.html">운영진</a> &nbsp;·&nbsp; ver.1.3</p>
  </footer>

  <style>
    .species-filter-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
    .species-filter-chip {
      padding:6px 14px; border:1.5px solid var(--border); border-radius:9px;
      background:#fff; font-size:13px; font-weight:600; color:var(--text-sub);
      cursor:pointer; font-family:inherit; transition:all 0.15s; white-space:nowrap;
    }
    .species-filter-chip:hover  { border-color:var(--sky-dark); color:var(--sky-dark); }
    .species-filter-chip.active { background:var(--sky-dark); border-color:var(--sky-dark); color:#fff; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/achievements.js"></script>
  <script src="../js/main.js"></script>
  <script>
    let allSpecies    = [];
    let isInitialLoad = true;
    let openFilter    = 'all';
    const pager = createPager(render);

    async function loadSpecies() {
      const { data, error } = await sb
        .from('species')
        .select('id, name, image_url, created_at, is_sensitive, sensitive_note, open_type')
        .order('created_at', { ascending: false });

      if (error || !data) {
        document.getElementById('speciesGrid').innerHTML = '<p class="page-loading">불러오기 실패</p>';
        return;
      }

      allSpecies = data;
      if (isInitialLoad) {
        const p = new URLSearchParams(location.search);
        const q = p.get('q'); const sort = p.get('sort');
        if (q)    document.getElementById('searchInput').value = q;
        if (sort) document.getElementById('sortSelect').value  = sort;
      }
      applyFilter();
    }

    async function applyFilter() {
      const q    = document.getElementById('searchInput').value.trim();
      const sort = document.getElementById('sortSelect').value;

      const qLow = q.toLowerCase();
      let list = allSpecies.filter(s => {
        if (openFilter === 'open'   && s.open_type !== 'open')   return false;
        if (openFilter === 'closed' && s.open_type !== 'closed') return false;
        return !q || s.name.toLowerCase().includes(qLow);
      });

      if (sort === 'name') {
        list = [...list].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
      }

      const countEl = document.getElementById('speciesCount');
      countEl.textContent = `총 ${list.length}개의 종족`;

      const grid = document.getElementById('speciesGrid');
      if (!list.length) {
        grid.innerHTML = '<p class="page-loading">검색 결과가 없어요</p>';
        document.getElementById('paginationWrap').innerHTML = '';
        if (q) {
          window.awardAchievement?.('no_species_search');
          const _fc = await window.incrementAchCounter?.('species_search_fail') || 0;
          if (_fc >= 10) window.awardAchievement?.('species_search_fail_10');
          if (_fc >= 5) {
            const _cfc = await window.getCounterValue?.('char_search_fail') || 0;
            if (_cfc >= 5) window.awardAchievement?.('odd_search');
          }
        }
        return;
      }

      if (isInitialLoad) {
        isInitialLoad = false;
        pager.init(list);
      } else {
        const url = new URL(location.href);
        const q    = document.getElementById('searchInput').value.trim();
        const sort = document.getElementById('sortSelect').value;
        if (q)    url.searchParams.set('q', q);       else url.searchParams.delete('q');
        if (sort) url.searchParams.set('sort', sort); else url.searchParams.delete('sort');
        url.searchParams.delete('page');
        history.replaceState(null, '', url);
        pager.load(list);
      }
    }

    function render(data) {
      const grid = document.getElementById('speciesGrid');
      grid.innerHTML = data.map(s => `
        <a href="species.html?id=${s.id}" class="species-card">
          ${s.is_sensitive && s.image_url ? `
          <div style="position:relative; overflow:hidden; border-radius:var(--radius);">
            <div class="species-img blurred" style="background-image:url('${s.image_url}'); background-size:cover; background-position:center;"></div>
            <div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${s.sensitive_note ? '<span class="sensitive-overlay-note">' + s.sensitive_note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>
          </div>` : `
          <div class="species-img" ${s.image_url ? `style="background-image:url('${s.image_url}'); background-size:cover; background-position:center;"` : ''}></div>`}
          <div class="species-info">
            <p class="species-name">${s.name}</p>
          </div>
        </a>
      `).join('');
    }

    function revealSensitive(overlayEl, e) {
      e.stopPropagation();
      e.preventDefault();
      const wrap = overlayEl.parentElement;
      wrap.querySelectorAll('.blurred').forEach(el => el.classList.remove('blurred'));
      overlayEl.remove();
    }

    document.getElementById('openFilterChips').addEventListener('click', e => {
      const btn = e.target.closest('[data-filter]');
      if (!btn) return;
      openFilter = btn.dataset.filter;
      document.querySelectorAll('#openFilterChips .species-filter-chip').forEach(el =>
        el.classList.toggle('active', el === btn)
      );
      isInitialLoad = false;
      applyFilter();
    });

    document.getElementById('searchInput').addEventListener('input', applyFilter);
    document.getElementById('sortSelect').addEventListener('change', applyFilter);

    async function initPage() {
      const user = await getUser();
      const role = user?.user_metadata?.role;
      if (isAdminOrStaff(role) || role === 'species_owner') {
        document.getElementById('btnRegisterSpecies').style.display = '';
      }
    }

    initPage();
    loadSpecies();
  </script>
</body>
</html>

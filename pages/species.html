<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>종족 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <!-- 메인 콘텐츠 -->
    <main class="main">

      <!-- 종족 상세 -->
      <section class="species-detail" id="speciesDetail">
        <p class="page-loading">불러오는 중...</p>
      </section>

      <!-- 종족주 가이드 탭 -->
      <section id="guideSection" style="display:none; padding-bottom:16px;">
        <div class="guide-tabs">
          <div class="guide-tab-nav" id="guideTabNav"></div>
          <div class="guide-tab-panels" id="guideTabPanels"></div>
        </div>
      </section>

      <!-- 소속 개체 목록 -->
      <section class="section" id="charactersSection" style="display:none;">
        <div class="section-header">
          <h2>소속 개체 <span class="count-badge" id="charCount">0</span></h2>
          <div style="display:flex; gap:8px; align-items:center;">
            <select id="charSort" class="list-sort" style="margin:0;">
              <option value="recent">최근 등록순</option>
              <option value="name">이름순</option>
              <option value="charNumber">개체번호순</option>
            </select>
            <button id="manageBtn" style="display:none; padding:6px 14px; border:1px solid var(--border); border-radius:8px; background:#fff; font-size:13px; cursor:pointer; color:var(--text-sub);" onclick="toggleManage()">관리</button>
          </div>
        </div>
        <!-- 관리 모드 액션 바 -->
        <div id="manageBar" style="display:none; margin-bottom:12px; padding:10px 14px; background:var(--sky-pale); border-radius:10px; border:1px solid var(--sky-light); align-items:center; gap:12px; flex-wrap:wrap;">
          <span id="selectedCount" style="font-size:13px; color:var(--text-sub);">0개 선택됨</span>
          <button onclick="selectAll()" style="padding:4px 12px; border:1px solid var(--border); border-radius:6px; background:#fff; font-size:12px; cursor:pointer;">전체 선택</button>
          <button onclick="deselectAll()" style="padding:4px 12px; border:1px solid var(--border); border-radius:6px; background:#fff; font-size:12px; cursor:pointer;">전체 해제</button>
          <button id="deleteSelectedBtn" onclick="deleteSelected()" disabled style="padding:4px 12px; border:none; border-radius:6px; background:#ef4444; color:#fff; font-size:12px; cursor:pointer; opacity:0.4;">선택 삭제</button>
          <button onclick="toggleManage()" style="padding:4px 12px; border:1px solid var(--border); border-radius:6px; background:#fff; font-size:12px; cursor:pointer; margin-left:auto;">취소</button>
        </div>
        <!-- 분류 필터 -->
        <div id="categoryFilterBar" style="display:none; flex-wrap:wrap; gap:6px; margin-bottom:14px;"></div>
        <div class="character-grid" id="characterGrid"></div>
      </section>

    </main>
  </div>

  <!-- 소유권 이전 모달 -->
  <div id="transferModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:500; align-items:center; justify-content:center; padding:16px;">
    <div style="background:#fff; border-radius:16px; padding:24px; width:min(100%, 380px); max-height:80vh; display:flex; flex-direction:column; gap:14px; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <h3 style="margin:0; font-size:16px; font-weight:700;">소유권 이전</h3>
      <p id="transferInfo" style="margin:0; font-size:13px; color:var(--text-sub);"></p>
      <input type="text" class="form-input" id="transferSearch" placeholder="닉네임으로 검색..." oninput="filterTransferUsers(this.value)" autocomplete="off">
      <div id="transferUserList" style="border:1px solid var(--border); border-radius:10px; max-height:180px; overflow-y:auto; background:#fff;">
        <p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>
      </div>
      <p id="transferSelectedDisplay" style="margin:0; font-size:13px; color:var(--sky-deep); display:none;"></p>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn-ghost" onclick="closeTransferModal()">취소</button>
        <button class="btn-secondary" id="transferConfirmBtn" onclick="confirmTransfer()">이전하기</button>
      </div>
    </div>
  </div>

  <!-- 푸터 -->
  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.1</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const speciesId = new URLSearchParams(window.location.search).get('id');
    let allChars       = [];
    let isOwner        = false;
    let manageMode     = false;
    let activeCategory = null;
    let siteUserNicks  = new Set();
    let nickToId       = {};
    let idToNick       = {};

    // 소유권 이전 모달 상태
    let transferCharId      = null;
    let transferCharName    = null;
    let transferFromOwner   = null;
    let transferToNick      = null;

    if (!speciesId) {
      document.getElementById('speciesDetail').innerHTML = '<p class="page-loading">잘못된 접근이에요.</p>';
    } else {
      loadPage();
    }

    async function loadPage() {
      const user = await getUser();
      const userNickname = user?.user_metadata?.display_name || user?.user_metadata?.nickname || null;
      const isAdminUser  = isAdminOrStaff(user?.user_metadata?.role);

      // 종족 정보
      const { data: s, error } = await sb
        .from('species')
        .select('*')
        .eq('id', speciesId)
        .single();

      if (error || !s) {
        document.getElementById('speciesDetail').innerHTML = '<p class="page-loading">종족을 찾을 수 없어요.</p>';
        return;
      }

      document.title = `${s.name} — 종족연구소`;

      const speciesUserId = user?.id || null;
      isOwner = !!(speciesUserId && s.owner_user_id && speciesUserId === s.owner_user_id);

      // 사이트 유저 목록 로드 (닉네임 최신화 + 오프사이트 판별용)
      const { data: userList } = await sb.rpc('get_all_users');
      if (userList) userList.forEach(u => {
        if (u.nickname) siteUserNicks.add(u.nickname);
        if (u.nickname && u.id) { nickToId[u.nickname] = u.id; idToNick[u.id] = u.nickname; }
      });

      const registeredDate = new Date(s.created_at).toLocaleDateString('ko-KR', {
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).replace(/\. /g, '.').replace(/\.$/, '');

      const fields = s.custom_fields?.length
        ? s.custom_fields.map(f => `<span class="field-tag">${f}</span>`).join('')
        : '';

      const ownerDisplayNick = s.owner_user_id
        ? (idToNick[s.owner_user_id] || s.owner_nickname)
        : s.owner_nickname;

      document.getElementById('speciesDetail').innerHTML = `
        <div class="species-detail-top">
          ${s.is_sensitive && s.image_url ? `
          <div style="position:relative; overflow:hidden; border-radius:var(--radius);">
            <div class="species-detail-img blurred" style="background-image:url('${s.image_url}'); background-size:cover; background-position:center;"></div>
            <div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${s.sensitive_note ? '<span class="sensitive-overlay-note">' + s.sensitive_note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>
          </div>` : `
          <div class="species-detail-img" ${s.image_url ? `style="background-image:url('${s.image_url}'); background-size:cover; background-position:center;"` : ''}></div>`}
          <div class="species-detail-info">
            <div class="breadcrumb">
              <a href="index.html">홈</a>
              <span>/</span>
              <a href="species-list.html">전체 종족</a>
              <span>/</span>
              <span>${s.name}</span>
            </div>
            <h1 class="species-detail-name">${s.name}</h1>
            <div class="species-detail-meta">
              <div class="meta-item">
                <span class="meta-label">종족주</span>
                <span class="meta-value">${ownerDisplayNick
                  ? (s.owner_user_id
                      ? `<a href="profile.html?user=${encodeURIComponent(ownerDisplayNick)}" class="meta-link">${ownerDisplayNick}</a>`
                      : ownerDisplayNick)
                  : '—'}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">등록일</span>
                <span class="meta-value">${registeredDate}</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">개체 수</span>
                <span class="meta-value" id="charCountMeta">—</span>
              </div>
              ${s.link ? `
              <div class="meta-item">
                <span class="meta-label">연관링크</span>
                <span class="meta-value"><a href="${s.link}" target="_blank" rel="noopener noreferrer" class="meta-link">${s.link}</a></span>
              </div>` : ''}
              ${s.design_rights ? `
              <div class="meta-item">
                <span class="meta-label">디자인권</span>
                <span class="meta-value">${s.design_rights}</span>
              </div>` : ''}
            </div>
            <div style="margin-top:16px; padding:14px 16px; background:var(--sky-pale); border-radius:10px; border:1px solid var(--sky-light);">
              <p style="font-size:13px; font-weight:700; color:var(--text); margin-bottom:8px;">📜 분양 규칙</p>
              <div style="display:flex; flex-direction:column; gap:6px;">
                ${[['재분양', s.allow_resale], ['무료분양', s.allow_free_adoption], ['유료/경매', s.allow_paid_adoption], ['기타분양', s.allow_other_adoption]].map(([label, val]) =>
                  `<div style="display:flex; gap:8px; align-items:center; font-size:13px;"><span style="color:var(--text-sub); width:64px; flex-shrink:0;">${label}</span><span style="font-weight:600; color:${val !== false ? 'var(--sky-deep)' : '#ef4444'};">${val !== false ? '가능' : '불가능'}</span></div>`
                ).join('')}
              </div>
            </div>
            ${s.description ? `<div class="species-detail-desc ql-display">${typeof DOMPurify!=='undefined' ? DOMPurify.sanitize(s.description) : s.description}</div>` : ''}
            ${isOwner ? `
            <div class="species-detail-actions">
              <a href="character-register.html?species_id=${speciesId}&species=${encodeURIComponent(s.name)}" class="btn-secondary">개체 등록</a>
              <a href="bulk-import.html?species_id=${speciesId}&species=${encodeURIComponent(s.name)}" class="btn-ghost">일괄 등록</a>
              <a href="species-edit.html?id=${speciesId}" class="btn-ghost">종족 정보 수정</a>
              <button onclick="deleteSpecies()" class="btn-danger">종족 삭제</button>
            </div>` : ''}
          </div>
        </div>
        ${fields ? `
        <div class="species-fields">
          <h3 class="species-fields-title">개체 항목</h3>
          <div class="species-fields-list">${fields}</div>
        </div>` : ''}
      `;

      // 종족주 가이드 탭
      if (s.guide?.length) {
        const guideLabels = { worldview: '세계관', settings: '설정', design_guide: '디자인 가이드', tos: '종족용 TOS' };
        const tabNav    = document.getElementById('guideTabNav');
        const tabPanels = document.getElementById('guideTabPanels');

        s.guide.forEach((g, i) => {
          const label = g.type === 'custom' ? g.title : guideLabels[g.type];

          const btn = document.createElement('button');
          btn.className = 'guide-tab-btn';
          btn.textContent = label;
          btn.onclick = () => switchGuideTab(i);
          tabNav.appendChild(btn);

          const panel = document.createElement('div');
          panel.className = 'guide-tab-panel';
          panel.innerHTML = `
            ${g.image_url ? `<img class="guide-panel-img" src="${g.image_url}" alt="${label}">` : ''}
            ${g.content ? `<div class="guide-section-text ql-display">${typeof DOMPurify!=='undefined' ? DOMPurify.sanitize(g.content) : g.content}</div>` : ''}
          `;
          tabPanels.appendChild(panel);
        });

        document.getElementById('guideSection').style.display = '';
      }

      // 소속 개체
      const { data: chars } = await sb
        .from('characters')
        .select('id, name, species_name, owner_nickname, owner_user_id, image_url, created_at, is_sensitive, sensitive_note, char_categories, char_number')
        .eq('species_name', s.name)
        .order('created_at', { ascending: false });

      allChars = chars || [];
      renderCategoryFilter();
      const saved = localStorage.getItem('speciesCharSort');
      if (['recent', 'name', 'charNumber'].includes(saved)) {
        document.getElementById('charSort').value = saved;
      }
      renderChars();

      const countEl = document.getElementById('charCountMeta');
      if (countEl) countEl.textContent = `${allChars.length}마리`;

      document.getElementById('charactersSection').style.display = '';
      if (isOwner) document.getElementById('manageBtn').style.display = '';
    }

    function renderCategoryFilter() {
      const seen = new Set();
      const cats = [];
      allChars.forEach(c => (c.char_categories || []).forEach(cat => {
        if (!cat.label || seen.has(cat.label)) return;
        seen.add(cat.label);
        cats.push(cat);
      }));

      const bar = document.getElementById('categoryFilterBar');
      if (!cats.length) { bar.style.display = 'none'; return; }

      bar.style.display = 'flex';
      bar.innerHTML = '';

      const allBtn = document.createElement('button');
      allBtn.id = 'filterBtn_all';
      allBtn.textContent = '전체';
      allBtn.style.cssText = `padding:5px 14px; border-radius:20px; border:2px solid var(--border); background:var(--text); color:#fff; font-size:13px; font-weight:600; cursor:pointer;`;
      allBtn.onclick = () => { activeCategory = null; updateFilterButtons(); renderChars(); };
      bar.appendChild(allBtn);

      cats.forEach(cat => {
        const r = parseInt(cat.color.slice(1,3),16), g = parseInt(cat.color.slice(3,5),16), b = parseInt(cat.color.slice(5,7),16);
        const tc = (0.299*r+0.587*g+0.114*b)/255 > 0.5 ? '#000' : '#fff';
        const btn = document.createElement('button');
        btn.dataset.catLabel = cat.label;
        btn.textContent = cat.label;
        btn.style.cssText = `padding:5px 14px; border-radius:20px; border:2px solid ${cat.color}; background:#fff; color:var(--text); font-size:13px; font-weight:600; cursor:pointer;`;
        btn.dataset.color = cat.color;
        btn.dataset.tc = tc;
        btn.onclick = () => { activeCategory = cat.label; updateFilterButtons(); renderChars(); };
        bar.appendChild(btn);
      });
    }

    function updateFilterButtons() {
      const allBtn = document.getElementById('filterBtn_all');
      if (allBtn) {
        allBtn.style.background = activeCategory === null ? 'var(--text)' : '#fff';
        allBtn.style.color      = activeCategory === null ? '#fff' : 'var(--text)';
      }
      document.querySelectorAll('#categoryFilterBar [data-cat-label]').forEach(btn => {
        const isActive = btn.dataset.catLabel === activeCategory;
        btn.style.background = isActive ? btn.dataset.color : '#fff';
        btn.style.color      = isActive ? btn.dataset.tc : 'var(--text)';
      });
    }

    function renderChars() {
      const sort  = document.getElementById('charSort').value;
      let list = [...allChars];

      if (activeCategory !== null) {
        list = list.filter(c => (c.char_categories || []).some(cat => cat.label === activeCategory));
      }

      if (sort === 'name') {
        list.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
      } else if (sort === 'charNumber') {
        const getGroup = str => {
          if (!str) return 4;
          if (/\d/.test(str)) return 0;
          if (/^[a-zA-Z]/.test(str)) return 1;
          if (/^[가-힣ᄀ-ᇿ㄰-㆏]/.test(str)) return 2;
          return 3;
        };
        const firstNum = str => { const m = str.match(/\d+/); return parseInt(m[0], 10); };
        list.sort((a, b) => {
          const aStr = a.char_number || '';
          const bStr = b.char_number || '';
          const aG = getGroup(aStr);
          const bG = getGroup(bStr);
          if (aG !== bG) return aG - bG;
          if (aG === 0) {
            const diff = firstNum(aStr) - firstNum(bStr);
            return diff !== 0 ? diff : aStr.localeCompare(bStr, 'ko');
          }
          if (aG === 4) return 0;
          return aStr.localeCompare(bStr, 'ko');
        });
      }

      document.getElementById('charCount').textContent = list.length;

      const grid = document.getElementById('characterGrid');
      if (!list.length) {
        grid.innerHTML = '<p class="page-loading">등록된 개체가 없어요.</p>';
        return;
      }

      grid.innerHTML = list.map(c => `
        <div style="position:relative;" id="card_${c.id}">
          ${manageMode ? `
          <label style="position:absolute; top:8px; left:8px; z-index:2; cursor:pointer;">
            <input type="checkbox" class="char-checkbox" data-id="${c.id}" onchange="onCheckChange()"
              style="width:18px; height:18px; cursor:pointer; accent-color:var(--sky);">
          </label>` : ''}
          <a href="${manageMode ? 'javascript:void(0)' : `character.html?id=${c.id}`}" class="character-card"
            style="${manageMode ? 'cursor:default;' : ''}"
            onclick="${manageMode ? `toggleCheck('${c.id}'); return false;` : ''}">
            ${c.is_sensitive && c.image_url ? `
            <div style="position:relative; overflow:hidden; border-radius:var(--radius);">
              <div class="character-img blurred" style="background-image:url('${c.image_url}'); background-size:cover; background-position:center;"></div>
              <div class="sensitive-overlay" onclick="revealSensitive(this,event)"><div style="display:flex;flex-direction:column;align-items:center;gap:5px;"><svg width="28" height="26" viewBox="0 0 28 26" fill="none"><path d="M14 2L26 24H2L14 2Z" stroke="#b91c1c" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><line x1="14" y1="9" x2="14" y2="16" stroke="#b91c1c" stroke-width="2" stroke-linecap="round"/><circle cx="14" cy="20" r="1.2" fill="#b91c1c"/></svg><span style="color:#b91c1c;font-size:16px;font-weight:700;">민감한 요소</span>${c.sensitive_note ? '<span class="sensitive-overlay-note">' + c.sensitive_note + '</span>' : ''}<span class="sensitive-overlay-hint">누르면 이미지가 보여요</span></div></div>
            </div>` : `
            <div class="character-img" ${c.image_url ? `style="background-image:url('${c.image_url}'); background-size:cover; background-position:center;"` : ''}></div>`}
            <div class="character-info">
              <p class="character-name">${c.name}</p>
              <p class="character-species">${c.species_name || ''}</p>
              <p class="character-owner">소유주: ${(c.owner_user_id && idToNick[c.owner_user_id]) || c.owner_nickname || '—'}</p>
            </div>
          </a>
        </div>
      `).join('');
    }

    function toggleManage() {
      manageMode = !manageMode;
      const manageBar = document.getElementById('manageBar');
      const manageBtn = document.getElementById('manageBtn');
      manageBar.style.display = manageMode ? 'flex' : 'none';
      manageBtn.textContent   = manageMode ? '완료' : '관리';
      manageBtn.style.color   = manageMode ? 'var(--sky-deep)' : 'var(--text-sub)';
      renderChars();
    }

    function toggleCheck(id) {
      const cb = document.querySelector(`.char-checkbox[data-id="${id}"]`);
      if (cb) { cb.checked = !cb.checked; onCheckChange(); }
    }

    function onCheckChange() {
      const checked = document.querySelectorAll('.char-checkbox:checked').length;
      document.getElementById('selectedCount').textContent = `${checked}개 선택됨`;
      const btn = document.getElementById('deleteSelectedBtn');
      btn.disabled = checked === 0;
      btn.style.opacity = checked === 0 ? '0.4' : '1';
    }

    function selectAll() {
      document.querySelectorAll('.char-checkbox').forEach(cb => cb.checked = true);
      onCheckChange();
    }

    function deselectAll() {
      document.querySelectorAll('.char-checkbox').forEach(cb => cb.checked = false);
      onCheckChange();
    }

    async function deleteSelected() {
      const checked = [...document.querySelectorAll('.char-checkbox:checked')];
      if (!checked.length) return;
      if (!confirm(`선택한 ${checked.length}개의 개체를 정말 삭제할까요?`)) return;

      const ids = checked.map(cb => cb.dataset.id);
      const { error } = await sb.from('characters').delete().in('id', ids);
      if (error) { alert('삭제에 실패했어요.'); return; }

      allChars = allChars.filter(c => !ids.includes(String(c.id)));
      manageMode = false;
      document.getElementById('manageBar').style.display = 'none';
      document.getElementById('manageBtn').textContent = '관리';
      document.getElementById('manageBtn').style.color = 'var(--text-sub)';
      renderChars();

      const countEl = document.getElementById('charCountMeta');
      if (countEl) countEl.textContent = `${allChars.length}마리`;
    }

    function revealSensitive(overlayEl, e) {
      e.stopPropagation();
      e.preventDefault();
      const wrap = overlayEl.parentElement;
      wrap.querySelectorAll('.blurred').forEach(el => el.classList.remove('blurred'));
      overlayEl.remove();
    }

    document.getElementById('charSort').addEventListener('change', () => {
      localStorage.setItem('speciesCharSort', document.getElementById('charSort').value);
      renderChars();
    });

    // ── 소유권 이전 모달 ──────────────────────
    function openTransferModal(charId, charName, currentOwner) {
      transferCharId    = charId;
      transferCharName  = charName;
      transferFromOwner = currentOwner;
      transferToNick    = null;

      document.getElementById('transferInfo').textContent = `"${charName}" — 현재 소유주: ${currentOwner}`;
      document.getElementById('transferSearch').value = '';
      document.getElementById('transferUserList').innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>';
      document.getElementById('transferSelectedDisplay').style.display = 'none';
      document.getElementById('transferConfirmBtn').textContent = '이전하기';
      document.getElementById('transferConfirmBtn').disabled = false;
      document.getElementById('transferModal').style.display = 'flex';
    }

    function closeTransferModal() {
      document.getElementById('transferModal').style.display = 'none';
    }

    function filterTransferUsers(q) {
      const el = document.getElementById('transferUserList');
      if (!q) {
        el.innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">닉네임을 입력하세요</p>';
        return;
      }
      const qLow = q.toLowerCase();
      const matched = [...siteUserNicks].filter(nick => nick.toLowerCase().includes(qLow)).slice(0, 20);
      if (!matched.length) {
        el.innerHTML = '<p style="padding:12px; color:var(--text-mute); font-size:13px;">일치하는 유저가 없어요</p>';
        return;
      }
      el.innerHTML = matched.map(nick => `
        <div onclick="selectTransferUser('${nick}')" id="tItem_${nick.replace(/'/g,'')}"
          style="padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid var(--border); transition:background 0.1s;"
          onmouseover="this.style.background='var(--sky-pale)'" onmouseout="this.style.background= transferToNick==='${nick}' ? 'var(--sky-light)' : ''">
          ${nick}
        </div>
      `).join('');
    }

    function selectTransferUser(nick) {
      transferToNick = nick;
      document.querySelectorAll('#transferUserList > div').forEach(el => {
        const isSelected = el.id === `tItem_${nick.replace(/'/g,'')}`;
        el.style.background = isSelected ? 'var(--sky-light)' : '';
        el.style.fontWeight  = isSelected ? '600' : '';
      });
      const disp = document.getElementById('transferSelectedDisplay');
      disp.textContent = `선택됨: ${nick}`;
      disp.style.display = 'block';
    }

    async function confirmTransfer() {
      if (!transferToNick) { alert('이전받을 유저를 선택해주세요.'); return; }
      if (!confirm(`"${transferCharName}"의 소유권을\n${transferFromOwner} → ${transferToNick}\n으로 이전할까요?`)) return;

      const btn = document.getElementById('transferConfirmBtn');
      btn.textContent = '이전 중...';
      btn.disabled = true;

      const { data: updated, error } = await sb.from('characters').update({
        owner_nickname: transferToNick,
        owner_user_id:  nickToId[transferToNick] || null,
        owner_contact:  null,
      }).eq('id', transferCharId).select('id');

      if (error || !updated?.length) {
        alert('이전에 실패했어요: ' + (error?.message || 'DB에 반영되지 않았어요. Supabase에서 SQL을 먼저 실행했는지 확인해주세요.'));
        btn.textContent = '이전하기';
        btn.disabled = false;
        return;
      }

      const char = allChars.find(c => String(c.id) === String(transferCharId));
      await logTransfer({
        character_name: transferCharName,
        species_name:   char?.species_name || '',
        from_nickname:  transferFromOwner,
        from_user_id:   char?.owner_user_id || null,
        to_nickname:    transferToNick,
        to_user_id:     nickToId[transferToNick] || null,
        method:         '종족주 소유권이전',
      });

      // 로컬 데이터 반영
      if (char) {
        char.owner_nickname = transferToNick;
        char.owner_contact  = null;
      }

      closeTransferModal();
      renderChars();
    }

    function switchGuideTab(idx) {
      document.querySelectorAll('.guide-tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
      document.querySelectorAll('.guide-tab-panel').forEach((panel, i) => panel.classList.toggle('active', i === idx));
    }

    async function deleteSpecies() {
      const charCount = allChars.length;
      const msg = charCount > 0
        ? `이 종족을 삭제하면 소속 개체 ${charCount}마리는 삭제되지 않아요.\n종족을 정말 삭제할까요?`
        : '이 종족을 정말 삭제할까요?';
      if (!confirm(msg)) return;

      const { data: deleted, error } = await sb.from('species').delete().eq('id', speciesId).select();
      if (error) { alert('삭제에 실패했어요.\n\n' + error.message); return; }
      if (!deleted || deleted.length === 0) { alert('삭제 권한이 없어요.\nSupabase DELETE 정책을 추가해주세요.'); return; }

      alert('종족이 삭제됐어요.');
      window.location.href = 'species-list.html';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>약관 편집 — 종족연구소</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <style>
    .quill-wrap .ql-toolbar {
      border-radius: 9px 9px 0 0;
      border: 1.5px solid var(--border);
      border-bottom: none;
      font-family: inherit;
    }
    .quill-wrap .ql-toolbar:focus-within,
    .quill-wrap:focus-within .ql-toolbar { border-color: var(--sky); }
    .quill-wrap .ql-container {
      border-radius: 0 0 9px 9px;
      border: 1.5px solid var(--border);
      min-height: 400px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.7;
    }
    .quill-wrap:focus-within .ql-container { border-color: var(--sky); }
    .quill-wrap .ql-editor { min-height: 400px; }
    .quill-wrap .ql-editor.ql-blank::before { color: #CBD5E1; font-style: normal; }
    .ql-snow .ql-picker.ql-size .ql-picker-label::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item::before { content: '보통'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="12px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="12px"]::before { content: '작게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="14px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="14px"]::before { content: '조금 작게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="18px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="18px"]::before { content: '조금 크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="20px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="20px"]::before { content: '크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="24px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="24px"]::before { content: '더 크게'; }
    .ql-snow .ql-picker.ql-size .ql-picker-label[data-value="28px"]::before,
    .ql-snow .ql-picker.ql-size .ql-picker-item[data-value="28px"]::before { content: '제목 크기'; }
    .terms-hint {
      background: #F0F9FF;
      border: 1.5px solid #BAE6FD;
      border-radius: 9px;
      padding: 12px 16px;
      font-size: 13px;
      color: #0369A1;
      margin-bottom: 20px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">종족연구소</a>
      <nav class="header-nav">
        <a href="login.html" class="btn-login">로그인</a>
      </nav>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main">
      <div class="register-wrap">

        <div class="breadcrumb" style="margin-bottom: 24px;">
          <a href="index.html">홈</a>
          <span>/</span>
          <a href="admin.html">어드민</a>
          <span>/</span>
          <span>약관 편집</span>
        </div>

        <h1 class="register-title">약관 편집</h1>

        <div class="terms-hint">
          여기서 수정한 내용이 <strong>약관 페이지</strong>에 바로 반영돼요.<br>
          저장 후 <a href="terms.html" target="_blank" style="color:inherit; text-decoration:underline;">약관 페이지</a>에서 결과를 확인할 수 있어요.
        </div>

        <div id="pageLoading" style="padding: 40px 0; text-align: center; color: var(--text-mute);">불러오는 중...</div>

        <form class="register-form" id="termsForm" style="display:none;">

          <div class="form-group">
            <label class="form-label">약관 내용 <span class="required">*</span></label>
            <div class="quill-wrap">
              <div id="termsEditor"></div>
            </div>
          </div>

          <p class="auth-error" id="saveError"></p>
          <p class="form-hint" id="saveSuccess" style="display:none; color: #16A34A;">저장됐어요.</p>

          <div class="register-actions">
            <a href="admin.html" class="btn-ghost">어드민으로</a>
            <button type="submit" class="btn-secondary" id="submitBtn">저장하기</button>
          </div>

        </form>
      </div>
    </main>
  </div>

  <footer class="footer">
    <p>© 2026 종족연구소 &nbsp;·&nbsp; <a href="terms.html">약관</a> &nbsp;·&nbsp; ver.1.1</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/sidebar.js"></script>
  <script src="../js/notifications.js"></script>
  <script src="../js/main.js"></script>
  <script>
    const SizeStyle = Quill.import('attributors/style/size');
    SizeStyle.whitelist = ['12px', '14px', '16px', '18px', '20px', '24px', '28px'];
    Quill.register(SizeStyle, true);
    Quill.register(Quill.import('attributors/style/align'), true);

    const quill = new Quill('#termsEditor', {
      theme: 'snow',
      placeholder: '약관 내용을 입력하세요',
      modules: {
        toolbar: [
          [{ size: ['12px', '14px', false, '18px', '20px', '24px', '28px'] }],
          ['bold', 'italic', 'underline'],
          [{ color: [] }],
          [{ align: [] }],
          [{ list: 'ordered' }, { list: 'bullet' }],
          ['link', 'clean'],
        ],
      },
    });

    async function initPage() {
      const user = await getUser();
      if (!user || user.user_metadata?.role !== 'admin') {
        window.location.href = 'index.html';
        return;
      }

      const { data, error } = await sb
        .from('site_content')
        .select('content')
        .eq('key', 'terms')
        .single();

      document.getElementById('pageLoading').style.display = 'none';
      document.getElementById('termsForm').style.display = 'block';

      if (data && data.content) {
        quill.clipboard.dangerouslyPasteHTML(data.content);
      }
    }

    document.getElementById('termsForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const content = quill.root.innerHTML.trim();
      const isEmpty = quill.getText().trim().length === 0;
      const errorEl   = document.getElementById('saveError');
      const successEl = document.getElementById('saveSuccess');
      const btn       = document.getElementById('submitBtn');

      errorEl.textContent = '';
      successEl.style.display = 'none';

      if (isEmpty) { errorEl.textContent = '내용을 입력해주세요.'; return; }

      btn.textContent = '저장 중...';
      btn.disabled = true;

      const { error } = await sb
        .from('site_content')
        .upsert({ key: 'terms', content, updated_at: new Date().toISOString() }, { onConflict: 'key' });

      if (error) {
        console.error('[terms save error]', error);
        errorEl.textContent = `저장에 실패했어요. (${error.message})`;
      } else {
        successEl.style.display = 'block';
        setTimeout(() => { successEl.style.display = 'none'; }, 3000);
      }

      btn.textContent = '저장하기';
      btn.disabled = false;
    });

    initPage();
  </script>
</body>
</html>
